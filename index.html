<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG X | Premium Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Unbounded:wght@400;900&display=swap');
        
        :root { --accent: #ffffff; --bg: #0a0a0b; --card: #161618; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .unbounded { font-family: 'Unbounded', sans-serif; }

        /* Эстетика карточек */
        .premium-card {
            background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px; transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
        }
        .premium-card:hover { border-color: rgba(255, 255, 255, 0.2); transform: translateY(-4px); }

        /* Кнопки */
        .btn-black {
            background: #fff; color: #000; font-weight: 700; border-radius: 18px;
            transition: 0.3s; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;
        }
        .btn-black:hover { opacity: 0.9; transform: scale(1.02); }

        .btn-outline {
            border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 18px;
            font-weight: 600; font-size: 11px; transition: 0.3s;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        /* Анимация вкладок */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        /* Кастомный скролл */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-16">

    <script>
        const REQUISITES = {
            card: "2202 0000 0000 0000", // Сюда свой номер
            support: "https://t.me/sswckk",
            starsPrice: { "10": 5, "250": 120, "1000": 500 } // Пример курса Звёзд
        };
    </script>

    <div id="auth" class="fixed inset-0 z-[100] bg-black flex items-center justify-center hidden">
        <div class="max-w-xs w-full text-center">
            <h2 class="unbounded text-2xl mb-10 tracking-tighter">DOG X</h2>
            <input type="text" id="nameInp" placeholder="USER_ID" class="w-full bg-[#111] border border-white/5 p-5 rounded-2xl mb-4 text-center outline-none focus:border-white/20 uppercase text-xs font-bold tracking-widest">
            <button onclick="login()" class="w-full py-5 btn-black">Инициализировать</button>
        </div>
    </div>

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-24">
        <div class="unbounded font-black text-xl tracking-tighter">DOG X</div>
        <div class="flex gap-8 text-[10px] font-bold uppercase tracking-widest opacity-60">
            <button onclick="showTab('home')" class="hover:opacity-100 transition">Shop</button>
            <button onclick="showTab('me')" class="hover:opacity-100 transition">Account</button>
            <div id="adm" class="hidden text-white border border-white px-2 rounded tracking-tighter cursor-pointer" onclick="showTab('admin')">ROOT</div>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-5xl mx-auto">
        <div class="mb-20">
            <h1 class="unbounded text-4xl md:text-7xl font-black mb-6 tracking-tighter leading-none italic uppercase">Fast.<br>Secure.<br>Invisible.</h1>
            <div class="flex items-center gap-4 opacity-40">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold uppercase tracking-widest" id="ticker">Status: All nodes operational</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20">
            <div class="premium-card p-10 flex flex-col justify-between">
                <div>
                    <h3 class="text-[10px] font-bold uppercase opacity-30 mb-8 tracking-widest">Lite Access</h3>
                    <div class="unbounded text-4xl mb-10">10₽</div>
                </div>
                <button onclick="openPay(10)" class="w-full py-4 btn-outline">Select</button>
            </div>
            
            <div class="premium-card p-10 border-white/20 bg-white/[0.02] flex flex-col justify-between relative overflow-hidden">
                <div class="absolute top-4 right-4 text-[8px] bg-white text-black px-2 py-0.5 rounded-full font-black uppercase">Most Popular</div>
                <div>
                    <h3 class="text-[10px] font-bold uppercase opacity-30 mb-8 tracking-widest">Premium Core</h3>
                    <div class="unbounded text-4xl mb-10">250₽</div>
                </div>
                <button onclick="openPay(250)" class="w-full py-4 btn-black">Select Pro</button>
            </div>

            <div class="premium-card p-10 flex flex-col justify-between">
                <div>
                    <h3 class="text-[10px] font-bold uppercase opacity-30 mb-8 tracking-widest">Infinite</h3>
                    <div class="unbounded text-4xl mb-10">1000₽</div>
                </div>
                <button onclick="openPay(1000)" class="w-full py-4 btn-outline">Select</button>
            </div>
        </div>
    </main>

    <section id="me" class="tab-content max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="premium-card p-10 text-center">
                <div class="w-20 h-20 bg-white text-black rounded-3xl mx-auto mb-6 flex items-center justify-center text-3xl font-black unbounded" id="uAv">?</div>
                <h2 class="unbounded text-sm font-bold mb-1 tracking-tighter uppercase" id="uN">User</h2>
                <p class="text-[10px] opacity-40 mb-10 uppercase tracking-widest">Member since 2026</p>
                <input type="password" id="rootKey" placeholder="ROOT KEY" class="w-full bg-white/5 p-4 rounded-xl text-[9px] text-center mb-4 outline-none border border-white/5 focus:border-white/20">
                <button onclick="checkRoot()" class="w-full py-3 text-[9px] font-bold uppercase opacity-40 hover:opacity-100 transition underline tracking-widest">System Login</button>
            </div>
            <div class="md:col-span-2 space-y-6">
                <div class="premium-card p-10">
                    <h3 class="text-[10px] font-bold uppercase opacity-30 mb-8 tracking-widest">Active Tunnels</h3>
                    <div id="kList" class="space-y-4">
                        <p class="text-[11px] opacity-20 italic">No active connections found...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-4xl mx-auto">
        <div class="premium-card p-12">
            <h2 class="unbounded text-xl mb-12 italic">ADMIN_CONTROL</h2>
            <div class="space-y-12">
                <div>
                    <label class="text-[10px] font-black uppercase opacity-30 mb-4 block">System Broadcast</label>
                    <input type="text" id="admT" class="w-full bg-white/5 border border-white/5 p-5 rounded-2xl outline-none focus:border-white/20 text-xs">
                    <button onclick="setT()" class="mt-4 px-8 py-3 btn-black">Broadcast</button>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <input type="number" id="p1" class="bg-white/5 p-4 rounded-xl text-center text-xs border border-white/5">
                    <input type="number" id="p2" class="bg-white/5 p-4 rounded-xl text-center text-xs border border-white/5">
                    <input type="number" id="p3" class="bg-white/5 p-4 rounded-xl text-center text-xs border border-white/5">
                </div>
                <button onclick="saveA()" class="w-full py-4 btn-outline">Update System Data</button>
            </div>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_db')) || { prices: [10, 250, 1000], ticker: "SYSTEM STATUS: SECURE" };
        let u = JSON.parse(localStorage.getItem('dog_u')) || null;

        window.onload = () => { if(!u) document.getElementById('auth').classList.remove('hidden'); else render(); };

        function login() {
            const n = document.getElementById('nameInp').value;
            if(n.length < 2) return;
            u = { name: n, keys: [] };
            localStorage.setItem('dog_u', JSON.stringify(u));
            location.reload();
        }

        function render() {
            document.getElementById('uN').innerText = u.name;
            document.getElementById('uAv').innerText = u.name[0].toUpperCase();
            document.getElementById('ticker').innerText = db.ticker;
            // Admin inputs
            document.getElementById('p1').value = db.prices[0];
            document.getElementById('p2').value = db.prices[1];
            document.getElementById('p3').value = db.prices[2];
            document.getElementById('admT').value = db.ticker;
            
            const list = document.getElementById('kList');
            if(u.keys.length > 0) {
                list.innerHTML = u.keys.map(k => `
                    <div class="flex justify-between items-center p-5 bg-white/[0.03] rounded-2xl border border-white/5">
                        <p class="text-[10px] font-mono opacity-50 truncate mr-4">${k}</p>
                        <button onclick="navigator.clipboard.writeText('${k}'); Swal.fire('Copied','','success')" class="text-xs hover:text-white opacity-40 hover:opacity-100"><i class="fas fa-copy"></i></button>
                    </div>
                `).join('');
            }
        }

        function openPay(amt) {
            Swal.fire({
                title: 'PAYMENT METHOD',
                background: '#0a0a0b', color: '#fff',
                showConfirmButton: false,
                html: `
                    <div class="space-y-3 p-4">
                        <button onclick="payCard(${amt})" class="w-full p-6 premium-card flex justify-between items-center hover:bg-white/5">
                            <span class="text-[10px] font-black uppercase tracking-widest">Bank Card / СБП</span>
                            <i class="fas fa-credit-card opacity-20"></i>
                        </button>
                        <button onclick="payStars(${amt})" class="w-full p-6 premium-card flex justify-between items-center hover:bg-white/5">
                            <span class="text-[10px] font-black uppercase tracking-widest text-[#ffad00]">Telegram Stars</span>
                            <i class="fas fa-star text-[#ffad00]"></i>
                        </button>
                    </div>
                `
            });
        }

        function payCard(amt) {
            Swal.fire({
                title: amt + ' RUB',
                background: '#0a0a0b', color: '#fff',
                html: `
                    <div class="p-8 premium-card">
                        <p class="text-[9px] opacity-30 mb-4 uppercase font-bold tracking-[3px]">Send to Card Number:</p>
                        <p class="text-lg font-black mb-6 tracking-tighter unbounded">${REQUISITES.card}</p>
                        <p class="text-[9px] opacity-20 italic">After payment, send receipt to support</p>
                    </div>
                `,
                footer: `<a href="${REQUISITES.support}" target="_blank" class="w-full py-4 btn-black text-center">Contact Support</a>`,
                showConfirmButton: false
            });
            // Симуляция получения ключа
            giveKey(amt);
        }

        function payStars(amt) {
            const stars = REQUISITES.starsPrice[amt] || 50;
            Swal.fire({
                title: 'PAY WITH STARS',
                background: '#0a0a0b', color: '#fff',
                text: `Invoice for ${stars} Stars will be sent to your Telegram chat.`,
                confirmButtonText: 'PAY NOW',
                confirmButtonColor: '#fff',
                showCancelButton: true
            }).then((res) => { if(res.isConfirmed) giveKey(amt); });
        }

        function giveKey(amt) {
            setTimeout(() => {
                const k = `vless://${btoa(Math.random()).substring(0,24)}@dog-x.node:443?security=reality&sni=google.com#DOGX_${amt}RUB`;
                u.keys.unshift(k);
                localStorage.setItem('dog_u', JSON.stringify(u));
                render();
            }, 3000);
        }

        function checkRoot() {
            if(document.getElementById('rootKey').value === '67АРТЁМ67') {
                document.getElementById('adm').classList.remove('hidden');
                showTab('admin');
            }
        }

        function setT() {
            db.ticker = document.getElementById('admT').value;
            localStorage.setItem('dog_db', JSON.stringify(db));
            render();
        }

        function saveA() {
            db.prices = [document.getElementById('p1').value, document.getElementById('p2').value, document.getElementById('p3').value];
            localStorage.setItem('dog_db', JSON.stringify(db));
            location.reload();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
