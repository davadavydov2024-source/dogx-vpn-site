<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | v41 Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const app = initializeApp(firebaseConfig);
        const db_firebase = getDatabase(app);

        window.db = {}; window.allUsers = {}; window.allTickets = {};
        window.mySecret = localStorage.getItem('dog_v41_secret');
        window.user = null;

        const dbRef = ref(db_firebase, 'dog_system_v41');
        const usersRef = ref(db_firebase, 'dog_users_v41');
        const supportRef = ref(db_firebase, 'dog_support_v41');

        onValue(dbRef, (s) => { window.db = s.val() || { products: [], broadcast: {}, gold_numbers: {}, logs: [] }; renderProducts(); renderGlobalBC(); if(window.isAdminOpen) loadAdmin(); });
        onValue(usersRef, (s) => { window.allUsers = s.val() || {}; if (window.mySecret && window.allUsers[window.mySecret]) { window.user = window.allUsers[window.mySecret]; updateUI(); } });
        onValue(supportRef, (s) => { window.allTickets = s.val() || {}; if(window.isAdminOpen) renderAdminSupport(); });

        window.saveSystem = () => set(dbRef, window.db);
        window.saveUser = async (u) => { await set(ref(db_firebase, 'dog_users_v41/' + window.mySecret), u); };
        window.addLog = (txt) => { if(!window.db.logs) window.db.logs = []; window.db.logs.unshift({t: Date.now(), txt}); window.saveSystem(); };
        window.adminReply = (tId, m) => { if(!m.trim()) return; window.allTickets[tId].msgs.push({text:m, sender:'admin'}); set(ref(db_firebase, 'dog_support_v41/'+tId), window.allTickets[tId]); };
        window.sendTicket = (m) => { const tId = window.mySecret; if(!window.allTickets[tId]) window.allTickets[tId]={userNick:window.user.nick, userId: window.user.id, msgs:[]}; window.allTickets[tId].msgs.push({text:m, sender:'user'}); set(ref(db_firebase, 'dog_support_v41/'+tId), window.allTickets[tId]); };
        window.firebase_db_mod = { set, ref, getDatabase };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #090b10; --card: #12161f; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .vip-border { border: 1px solid #fbbf24 !important; box-shadow: 0 0 15px rgba(251,191,36,0.1); }
        .chat-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .chat-modal.active { display: flex; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#090b10]/80 backdrop-blur-md z-50">
        <div><div class="text-2xl font-black text-blue-500 italic uppercase">DOG X</div><div id="userDisplay" class="text-[8px] opacity-40 uppercase tracking-widest">v41 Fixed System</div></div>
        <div class="flex gap-4 text-[10px] font-black uppercase">
            <button onclick="showTab('home')">Маркет</button>
            <button onclick="showTab('me')">Профиль</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <div id="globalBC" class="hidden player-card p-4 mb-4 border-amber-500/30 overflow-hidden">
            <img id="bcImgDisplay" src="" class="w-full h-32 object-cover rounded-xl mb-3 hidden">
            <p id="bcTextDisplay" class="text-xs font-bold mb-2"></p>
            <div id="bcBtnBox"></div>
        </div>
        <h2 class="text-lg font-black italic uppercase">Сервера</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-3"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center" id="profileCard">
            <p id="userRank" class="text-[9px] text-blue-400 font-black uppercase mb-1">Стандартный аккаунт</p>
            <h3 class="text-5xl font-black text-white mb-6" id="userBal">0₽</h3>
            <div class="grid grid-cols-2 gap-2 mb-2">
                <button onclick="topUp()" class="py-4 bg-blue-600 rounded-2xl text-[10px] font-black uppercase">Пополнить</button>
                <button onclick="openSwitchAcc()" class="py-4 bg-white/5 rounded-2xl text-[10px] font-black uppercase border border-white/10">Аккаунты</button>
            </div>
            <button onclick="openSupport()" class="w-full py-3 bg-blue-600/10 text-blue-400 rounded-xl text-[9px] font-bold uppercase border border-blue-500/20">Связаться с поддержкой</button>
            <button onclick="createNewAccount()" class="w-full mt-3 py-3 text-[9px] font-bold uppercase opacity-30 italic">Создать Elite аккаунт</button>
        </div>

        <div class="space-y-3">
            <button onclick="showTransferCode()" class="w-full p-4 player-card flex justify-between items-center">
                <span class="text-xs font-bold uppercase">Инструкция и Ключ</span>
                <i class="fa-solid fa-key opacity-30 text-blue-400"></i>
            </button>
            <div class="flex gap-2">
                <input type="text" id="promoInp" placeholder="Код / Номер / Промо" class="flex-1 p-4 player-card bg-transparent text-center text-xs outline-none border-blue-500/10">
                <button onclick="checkInput()" class="px-6 bg-blue-600 rounded-2xl text-[10px] font-black uppercase">OK</button>
            </div>
        </div>
        <div id="keysList" class="space-y-3"></div>
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6 border-red-500/20">
            <h2 class="text-red-500 font-black text-xs uppercase italic text-center">Admin Panel v41</h2>
            
            <div class="space-y-2">
                <p class="text-[9px] font-black opacity-40 uppercase">Золотые Номера</p>
                <div class="flex gap-2">
                    <input id="adm_gold_num" class="flex-1 p-3 bg-black/40 rounded-xl text-[10px]" placeholder="888-000">
                    <select id="adm_gold_rank" class="bg-black/40 rounded-xl text-[10px] px-2 text-amber-500 font-bold"><option value="VIP">VIP</option><option value="ELITE">ELITE</option></select>
                    <button onclick="addGoldNumber()" class="bg-amber-600 px-4 rounded-xl text-[10px] font-bold">ADD</button>
                </div>
                <div id="gold_nums_list" class="max-h-24 overflow-y-auto space-y-1"></div>
            </div>

            <div class="space-y-2">
                <p class="text-[9px] font-black opacity-40 uppercase">Юзеры (Ник : Пароль)</p>
                <div id="adm_users_list" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
                <div class="flex gap-2">
                    <input id="adm_uid" class="flex-1 p-3 bg-black/40 rounded-xl text-[10px]" placeholder="SEC Ключ">
                    <input id="adm_sum" type="number" class="w-20 p-3 bg-black/40 rounded-xl text-[10px]" placeholder="₽">
                    <button onclick="adminChangeBalance()" class="bg-blue-600 px-4 rounded-xl text-[10px] font-bold">OK</button>
                </div>
            </div>

            <div class="p-4 bg-amber-500/5 rounded-2xl space-y-3">
                <p class="text-[9px] font-black text-amber-500 uppercase italic">Реклама</p>
                <input type="file" id="adFile" class="hidden" onchange="uploadAdPhoto(this)">
                <button onclick="document.getElementById('adFile').click()" class="w-full py-3 bg-white/5 border border-dashed border-amber-500/30 rounded-xl text-[9px] font-bold">Выбрать фото</button>
                <textarea id="adm_bc_text" class="w-full p-2 bg-black/40 rounded text-[10px]" placeholder="Текст..."></textarea>
                <button onclick="toggleStatus('bc')" class="w-full py-3 bg-amber-600 text-black text-[10px] font-black rounded uppercase">Запустить</button>
            </div>

            <div id="adminSupportList" class="space-y-3"></div>
            <div id="admin_stocks" class="space-y-4"></div>
            <button onclick="addTariff()" class="w-full py-4 border border-dashed border-white/10 rounded-2xl text-[10px] font-black">+ Тариф</button>
            <div id="adm_logs" class="max-h-32 overflow-y-auto text-[8px] bg-black/40 p-2 rounded-xl"></div>
            <button onclick="saveAdmin()" class="w-full py-6 bg-red-600 rounded-3xl text-sm font-black uppercase italic">Сохранить всё</button>
        </div>
    </section>

    <div id="chatModal" class="chat-modal">
        <div class="player-card w-full max-w-sm p-6 space-y-4 relative">
            <button onclick="closeSupport()" class="absolute top-4 right-4 opacity-40"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="text-xs font-black uppercase text-blue-400">Support Chat</h3>
            <div id="supportChatBox" class="h-64 overflow-y-auto space-y-2 flex flex-col pr-2 text-[10px]"></div>
            <div class="flex gap-2">
                <input type="text" id="supportInp" placeholder="Сообщение..." class="flex-1 bg-black/40 p-3 rounded-xl text-xs outline-none">
                <button onclick="sendUserMsg()" class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </div>

    <script>
        window.isAdminOpen = false;

        function updateUI() {
            if(!window.user) return;
            document.getElementById('userDisplay').innerText = `${window.user.nick} | ID: ${window.user.id}`;
            document.getElementById('userBal').innerText = window.user.bal.toFixed(0) + '₽';
            document.getElementById('userRank').innerText = window.user.rank || "Стандартный аккаунт";
            const pc = document.getElementById('profileCard');
            if(window.user.rank === 'VIP' || window.user.rank === 'ELITE') pc.classList.add('vip-border');
            else pc.classList.remove('vip-border');
            renderKeys();
        }

        // Фикс двойной регистрации
        async function initUser() {
            if(window.mySecret) return;
            let accs = JSON.parse(localStorage.getItem('dog_v41_accs') || '[]');
            if(accs.length >= 5) return Swal.fire('Лимит аккаунтов!','','error');
            
            const { value: v } = await Swal.fire({
                title: 'Регистрация',
                html: '<input id="s-n" class="swal2-input" placeholder="Ник"><input id="s-p" type="password" class="swal2-input" placeholder="Пароль">',
                background: '#090b10', color: '#fff', confirmButtonText: 'Создать', allowOutsideClick: false,
                preConfirm: () => {
                    const n = document.getElementById('s-n').value;
                    const p = document.getElementById('s-p').value;
                    if(!n || !p) { Swal.showValidationMessage('Заполните все поля!'); return false; }
                    return [n, p];
                }
            });

            if(!v) return;
            const sec = 'SEC-' + Math.random().toString(36).substr(2,12).toUpperCase();
            window.mySecret = sec; 
            localStorage.setItem('dog_v41_secret', sec);
            accs.push({nick: v[0], secret: sec}); 
            localStorage.setItem('dog_v41_accs', JSON.stringify(accs));

            window.user = { id: Math.floor(Math.random()*900000+100000), nick: v[0], pass: v[1], bal: 0, keys: [], rank: 'Стандарт', secret: sec };
            await window.saveUser(window.user);
            location.reload(); 
        }
        setTimeout(() => { if(!window.mySecret) initUser(); }, 1200);

        function openSwitchAcc() {
            let accs = JSON.parse(localStorage.getItem('dog_v41_accs') || '[]');
            let html = accs.map(a => `<button onclick="switchAcc('${a.secret}')" class="w-full p-4 mb-2 player-card text-left flex justify-between items-center ${a.secret===window.mySecret?'border-blue-500':''}">
                <span>${a.nick}</span> ${a.secret===window.mySecret?'<i class="fa-solid fa-check text-blue-500"></i>':''}
            </button>`).join('');
            Swal.fire({ title: 'Аккаунты', html: `<div class="mt-4">${html}</div>`, showConfirmButton: false, background: '#12161f', color: '#fff' });
        }
        window.switchAcc = (sec) => { localStorage.setItem('dog_v41_secret', sec); location.reload(); };

        async function createNewAccount() {
            let accs = JSON.parse(localStorage.getItem('dog_v41_accs') || '[]');
            if(accs.length >= 5) return Swal.fire('Лимит!','','error');
            const { value: goldNum } = await Swal.fire({ title: 'Активация номера', input: 'text', background: '#12161f', color: '#fff' });
            if(window.db.gold_numbers && window.db.gold_numbers[goldNum]) {
                const rank = window.db.gold_numbers[goldNum];
                const { value: v } = await Swal.fire({ title: `Регистрация (${rank})`, html: '<input id="n-n" class="swal2-input" placeholder="Ник"><input id="n-p" type="password" class="swal2-input" placeholder="Пароль">', preConfirm: () => [document.getElementById('n-n').value, document.getElementById('n-p').value]});
                const sec = 'SEC-' + Math.random().toString(36).substr(2,12).toUpperCase();
                window.mySecret = sec; localStorage.setItem('dog_v41_secret', sec);
                accs.push({nick: v[0], secret: sec}); localStorage.setItem('dog_v41_accs', JSON.stringify(accs));
                window.user = { id: Math.floor(Math.random()*900000+100000), nick: v[0], pass: v[1], bal: 0, keys: [], rank: rank, secret: sec };
                window.addLog(`Активирован номер ${goldNum}`);
                await window.saveUser(window.user); location.reload();
            } else { Swal.fire('Ошибка','Номер не найден','error'); }
        }

        function showTransferCode() {
            Swal.fire({
                title: 'ПЕРЕНОС',
                html: `<div class="text-left text-[11px] space-y-3 uppercase">
                    <p>Ключ для переноса:</p>
                    <div class="bg-black/60 p-4 rounded-xl font-mono text-blue-400 select-all text-center border border-blue-500/10">${window.mySecret}</div>
                    <p>Инструкция: введите этот ключ на новом устройстве в поле в профиле.</p>
                </div>`,
                background: '#12161f', color: '#fff'
            });
        }

        function checkInput() { 
            const val = document.getElementById('promoInp').value.trim();
            if(val === 'KALUBXQ') { document.getElementById('adminBtn').classList.remove('hidden'); Swal.fire('Admin!','','success'); }
            else if(window.allUsers[val]) { 
                let accs = JSON.parse(localStorage.getItem('dog_v41_accs') || '[]');
                if(!accs.find(a => a.secret === val)) { accs.push({nick: window.allUsers[val].nick, secret: val}); localStorage.setItem('dog_v41_accs', JSON.stringify(accs)); }
                window.mySecret=val; localStorage.setItem('dog_v41_secret',val); location.reload(); 
            } else { Swal.fire('Код не найден','','error'); }
        }

        function loadAdmin() {
            window.isAdminOpen = true;
            const uL = document.getElementById('adm_users_list');
            uL.innerHTML = Object.keys(window.allUsers).map(s => `<div onclick="document.getElementById('adm_uid').value='${s}'" class="p-3 bg-white/5 rounded-2xl flex justify-between text-[10px] mb-1">
                <span><b>${window.allUsers[s].nick}</b> <br>Pass: ${window.allUsers[s].pass}</span>
                <span class="text-green-500 font-bold">${window.allUsers[s].bal}₽</span>
            </div>`).join('');
            const gL = document.getElementById('gold_nums_list');
            gL.innerHTML = Object.keys(window.db.gold_numbers || {}).map(n => `<div class="flex justify-between text-[10px] bg-white/5 p-2 rounded-xl"><span>${n} - ${window.db.gold_numbers[n]}</span><i class="fa-solid fa-trash text-red-500" onclick="delete window.db.gold_numbers['${n}']; window.saveSystem(); loadAdmin();"></i></div>`).join('');
            document.getElementById('adm_logs').innerHTML = (window.db.logs || []).map(l => `<div class="text-[7px] opacity-40">${l.txt}</div>`).join('');
            renderAdminSupport();
        }

        function renderProducts() {
            const g = document.getElementById('productsGrid');
            g.innerHTML = (window.db.products || []).map(p => {
                if(p.vip && (!window.user || (window.user.rank !== 'VIP' && window.user.rank !== 'ELITE'))) return '';
                const fin = p.discount > 0 ? p.pr - (p.pr * p.discount / 100) : p.pr;
                return `<div class="player-card p-5 flex justify-between items-center ${p.vip?'border-amber-500/40':''}">
                    <div><h4 class="font-black text-[13px] uppercase ${p.vip?'text-amber-500':''}">${p.name}</h4><p class="text-[9px] opacity-40">${p.h} ЧАСОВ</p></div>
                    <button onclick="buyKey(${p.id})" class="px-6 py-3 bg-blue-600 rounded-2xl text-[11px] font-black">${fin.toFixed(0)}₽</button>
                </div>`;
            }).join('');
        }

        function saveAdmin() {
            window.db.broadcast = { text: document.getElementById('adm_bc_text').value, img: window.db.broadcast?.img || '', active: window.db.broadcast?.active || false };
            window.saveSystem(); Swal.fire('Сохранено!','','success');
        }

        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id === 'admin') loadAdmin(); else window.isAdminOpen=false; }
        function openSupport() { document.getElementById('chatModal').classList.add('active'); renderSupportChat(); }
        function closeSupport() { document.getElementById('chatModal').classList.remove('active'); }
        function sendUserMsg() { const i = document.getElementById('supportInp'); if(!i.value.trim()) return; window.sendTicket(i.value.trim()); i.value=''; setTimeout(renderSupportChat, 300); }
        function renderSupportChat() { const b = document.getElementById('supportChatBox'); if(!window.mySecret || !window.allTickets[window.mySecret]) return b.innerHTML='<p class="text-center py-20 opacity-20 italic">Пусто</p>'; b.innerHTML = window.allTickets[window.mySecret].msgs.map(m => `<div class="p-3 rounded-2xl max-w-[85%] ${m.sender==='user'?'bg-blue-600 ml-auto':'bg-amber-500 text-black font-bold mr-auto'} mb-1">${m.text}</div>`).join(''); b.scrollTop = b.scrollHeight; }
        function renderAdminSupport() { const l = document.getElementById('adminSupportList'); const tks = Object.keys(window.allTickets); l.innerHTML = tks.map(id => `<div class="p-3 bg-white/5 rounded-2xl space-y-2"><div class="flex justify-between text-[8px] font-black text-blue-400"><span>${window.allTickets[id].userNick}</span></div><div class="max-h-24 overflow-y-auto text-[9px]">${window.allTickets[id].msgs.map(m=>`<div><b>${m.sender}:</b> ${m.text}</div>`).join('')}</div><div class="flex gap-2"><input id="r_${id}" class="flex-1 bg-black/40 text-[9px] p-2 rounded-xl" placeholder="Ответ..."><button onclick="window.adminReply('${id}',document.getElementById('r_${id}').value);document.getElementById('r_${id}').value=''" class="bg-blue-600 px-4 rounded-xl text-[9px] font-bold">OK</button></div></div>`).join(''); }
        function buyKey(id) { const p = window.db.products.find(x=>x.id===id); const pr = p.discount>0?(p.pr-(p.pr*p.discount/100)):p.pr; if(window.user.bal < pr) return Swal.fire('Недостаточно средств','','error'); window.user.bal -= pr; window.user.keys.unshift({name: p.name, key: "DOG-"+Math.random().toString(36).substr(2,8).toUpperCase()}); window.saveUser(window.user); Swal.fire('Успех!','','success'); }
        function renderKeys() { const l = document.getElementById('keysList'); if(!window.user.keys?.length) return l.innerHTML=''; l.innerHTML = window.user.keys.map(k => `<div class="player-card p-4 border-l-4 border-blue-600 mb-2"><p class="text-[9px] opacity-40 font-black uppercase mb-1">${k.name}</p><div class="text-[11px] font-mono text-blue-300 select-all">${k.key}</div></div>`).join(''); }
        function renderGlobalBC() { const bc = window.db.broadcast; const el = document.getElementById('globalBC'); if(!bc?.active) return el.classList.add('hidden'); el.classList.remove('hidden'); document.getElementById('bcTextDisplay').innerText = bc.text; const img = document.getElementById('bcImgDisplay'); if(bc.img) { img.src=bc.img; img.classList.remove('hidden'); } }
        function topUp() { Swal.fire({ title: 'ПОПОЛНЕНИЕ', text: 'Пишите админу: @sswckk', icon: 'info', background: '#12161f', color: '#fff' }); }
        function uploadAdPhoto(i) { const r = new FileReader(); r.onloadend = () => { window.db.broadcast.img = r.result; Swal.fire('Готово!','','success'); }; r.readAsDataURL(i.files[0]); }
        function toggleStatus(t) { if(t==='bc') window.db.broadcast.active = !window.db.broadcast.active; window.saveSystem(); loadAdmin(); }
        function adminChangeBalance() { const s = document.getElementById('adm_uid').value; const m = parseFloat(document.getElementById('adm_sum').value); if(window.allUsers[s]) { window.allUsers[s].bal += m; window.firebase_db_mod.set(window.firebase_db_mod.ref(window.firebase_db_mod.getDatabase(), 'dog_users_v41/'+s), window.allUsers[s]); } }
        function addGoldNumber() { const n = document.getElementById('adm_gold_num').value; const r = document.getElementById('adm_gold_rank').value; if(n) { if(!window.db.gold_numbers) window.db.gold_numbers={}; window.db.gold_numbers[n]=r; window.saveSystem(); loadAdmin(); } }
        function addTariff() { if(!window.db.products) window.db.products=[]; window.db.products.push({id:Date.now(), name:"Сервер", pr:100, h:24, vip:false, discount:0}); window.saveSystem(); loadAdmin(); }
    </script>
</body>
</html>
