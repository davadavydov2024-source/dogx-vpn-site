<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | v49 FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Проверь эти данные в своей консоли Firebase!
        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db_data = { products: [], broadcast: {active:false}, push: {time:0} };
        window.allUsers = {};
        window.mySecret = localStorage.getItem('dog_v49_sec');
        window.user = null;

        // Слушатели
        onValue(ref(db, 'system_v49'), (s) => { 
            window.db_data = s.val() || window.db_data; 
            renderProducts(); renderBC(); checkPush();
        });

        onValue(ref(db, 'users_v49'), (s) => { 
            window.allUsers = s.val() || {}; 
            if (window.mySecret && window.allUsers[window.mySecret]) {
                window.user = window.allUsers[window.mySecret];
                updateUI();
            } else if (window.mySecret) {
                localStorage.removeItem('dog_v49_sec');
                location.reload();
            }
        });

        // Глобальные методы
        window.saveSys = () => set(ref(db, 'system_v49'), window.db_data);
        window.saveUsr = (u, sec) => set(ref(db, 'users_v49/' + (sec || window.mySecret)), u);
        window.delUsr = (sec) => remove(ref(db, 'users_v49/' + sec));
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { background: #05070a; color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: #0f121a; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .inp { background: #000; border: 1px solid #222; border-radius: 12px; padding: 12px; font-size: 12px; color: #fff; width: 100%; outline: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#05070a]/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-lg italic">D</div>
            <div>
                <h1 class="text-lg font-black italic uppercase leading-none">DOG <span class="text-blue-500">X</span></h1>
                <p id="topId" class="text-[8px] opacity-40 font-bold tracking-widest mt-1">CONNECTING...</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="setTab('home')" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="fa-solid fa-house text-xs"></i></button>
            <button onclick="setTab('me')" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="fa-solid fa-user text-xs"></i></button>
            <button id="admB" onclick="setTab('admin')" class="hidden w-10 h-10 rounded-full bg-red-500/10 text-red-500 border border-red-500/20 flex items-center justify-center"><i class="fa-solid fa-crown text-xs"></i></button>
        </div>
    </header>

    <main id="home" class="tab active px-6 space-y-5">
        <div id="bcBox" class="hidden glass overflow-hidden">
            <img id="bcImg" class="w-full h-40 object-cover hidden">
            <div class="p-4 text-[11px] font-bold italic opacity-90" id="bcTxt"></div>
        </div>
        <h2 class="text-xl font-black italic uppercase">Доступные <span class="text-blue-500">Сервера</span></h2>
        <div id="pGrid" class="space-y-3"></div>
    </main>

    <section id="me" class="tab px-6 space-y-6">
        <div class="glass p-8 text-center">
            <p id="uRank" class="text-[9px] text-blue-400 font-bold uppercase tracking-widest mb-1">Standard</p>
            <h3 class="text-5xl font-black mb-6" id="uBal">0₽</h3>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="Swal.fire('Оплата','Пиши: @sswckk','info')" class="btn-blue py-4 rounded-2xl text-[10px] font-bold uppercase italic shadow-lg shadow-blue-500/20">Пополнить</button>
                <button onclick="showSec()" class="bg-white/5 border border-white/10 py-4 rounded-2xl text-[10px] font-bold uppercase italic">Мой Ключ</button>
            </div>
        </div>

        <div class="space-y-3">
            <p class="text-[10px] font-black opacity-30 uppercase ml-1">Вход по секретному ключу</p>
            <div class="flex gap-2">
                <input type="text" id="loginInp" placeholder="SEC-XXXX-XXXX" class="flex-1 inp text-center font-bold">
                <button onclick="doLogin()" class="btn-blue px-6 rounded-xl text-[10px] font-bold uppercase">Вход</button>
            </div>
            <button onclick="showHelp()" class="w-full text-center text-[9px] text-blue-500 font-bold underline uppercase py-2">Зачем это нужно?</button>
        </div>
        <div id="keyList" class="space-y-2 pb-10"></div>
    </section>

    <section id="admin" class="tab px-6 space-y-6">
        <div class="glass p-6 space-y-6">
            <h2 class="text-red-500 font-black text-center text-xs tracking-widest uppercase">Admin Panel v49</h2>

            <div class="space-y-2">
                <p class="text-[10px] font-bold opacity-30 uppercase italic">Управление пользователями</p>
                <div id="admUsers" class="max-h-40 overflow-y-auto space-y-2 border-b border-white/5 pb-4"></div>
                <input id="admTId" class="inp" placeholder="Введите ID (цифры)">
                <div class="grid grid-cols-2 gap-2">
                    <input id="admTBal" type="number" class="inp" placeholder="Баланс ₽">
                    <input id="admTNick" class="inp" placeholder="Новый Ник">
                </div>
                <button onclick="admUpdate()" class="w-full py-3 bg-red-600 rounded-xl text-[10px] font-bold uppercase">Обновить по ID</button>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-blue-400 uppercase italic">📣 Рассылка (Push)</p>
                    <input id="pushT" class="inp" placeholder="Текст для всех...">
                    <button onclick="admPush()" class="w-full py-3 bg-blue-600 rounded-xl text-[10px] font-bold uppercase">Отправить</button>
                </div>
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-amber-500 uppercase italic">🖼️ Баннер</p>
                    <input id="bcT" class="inp" placeholder="Текст баннера...">
                    <button onclick="admBC()" id="bcBtn" class="w-full py-3 rounded-xl text-[10px] font-bold uppercase"></button>
                </div>
            </div>

            <button onclick="admAddP()" class="w-full py-4 border border-dashed border-white/20 rounded-xl text-[10px] font-bold uppercase">+ Добавить сервер</button>
            <div id="admProds" class="space-y-2"></div>
            
            <button onclick="admSave()" class="w-full py-5 bg-green-600 rounded-2xl text-[11px] font-black uppercase italic shadow-lg shadow-green-600/20">Сохранить v49</button>
        </div>
    </section>

    <script>
        function setTab(t) { document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); document.getElementById(t).classList.add('active'); if(t==='admin') renderAdm(); }
        
        function updateUI() {
            if(!window.user) return;
            document.getElementById('topId').innerText = `${window.user.nick} • ID: ${window.user.id}`;
            document.getElementById('uBal').innerText = (window.user.bal || 0).toFixed(0) + '₽';
            document.getElementById('uRank').innerText = window.user.rank === 'VIP' ? '💎 VIP MEMBER' : 'STANDARD USER';
            
            const kL = document.getElementById('keyList');
            kL.innerHTML = (window.user.keys || []).map(k => `<div class="glass p-4 border-l-4 border-blue-500 flex justify-between items-center"><span class="text-[10px] font-bold opacity-60">${k.name}</span><span class="text-xs font-mono text-blue-400 font-bold">${k.key}</span></div>`).join('');
        }

        async function init() {
            if(window.mySecret) return;
            const { value: v } = await Swal.fire({
                title: 'РЕГИСТРАЦИЯ',
                html: '<input id="n" class="swal2-input" placeholder="Ник"><input id="p" type="password" class="swal2-input" placeholder="Пароль">',
                background: '#05070a', color: '#fff', preConfirm: () => [document.getElementById('n').value, document.getElementById('p').value]
            });
            if(!v || !v[0]) return;
            const sec = 'SEC-' + Math.random().toString(36).substr(2,9).toUpperCase();
            const u = { id: Math.floor(Math.random()*900000+100000), nick: v[0], pass: v[1], bal: 0, keys: [], rank: 'Standard', secret: sec };
            window.mySecret = sec; localStorage.setItem('dog_v49_sec', sec);
            await window.saveUsr(u); location.reload();
        }
        setTimeout(init, 1000);

        function doLogin() {
            const val = document.getElementById('loginInp').value.trim();
            if(val === 'KALUBXQ') { document.getElementById('admB').classList.remove('hidden'); return; }
            if(window.allUsers[val]) { window.mySecret = val; localStorage.setItem('dog_v49_sec', val); location.reload(); }
            else { Swal.fire('Ошибка','Ключ не найден','error'); }
        }

        function renderProducts() {
            const g = document.getElementById('pGrid');
            g.innerHTML = (window.db_data.products || []).map(p => `
                <div class="glass p-5 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-blue-500"><i class="fa-solid fa-server text-xs"></i></div>
                        <div><h4 class="text-xs font-black uppercase italic">${p.name}</h4><p class="text-[8px] font-bold text-blue-500">${p.h} ЧАСОВ</p></div>
                    </div>
                    <button onclick="buyP(${p.id})" class="btn-blue px-6 py-3 rounded-xl text-[10px] font-black italic shadow-lg">${p.pr}₽</button>
                </div>`).join('');
        }

        function buyP(id) {
            const p = window.db_data.products.find(x => x.id === id);
            if(window.user.bal < p.pr) return Swal.fire('Мало средств','','error');
            window.user.bal -= p.pr;
            const k = `${p.pref}-${Math.random().toString(36).substr(2,6).toUpperCase()}`;
            if(!window.user.keys) window.user.keys = [];
            window.user.keys.unshift({name: p.name, key: k});
            window.saveUsr(window.user); Swal.fire('Куплено!','Ключ в профиле','success');
        }

        function renderAdm() {
            document.getElementById('admUsers').innerHTML = Object.keys(window.allUsers).map(s => `
                <div class="p-3 bg-white/5 rounded-xl flex justify-between items-center text-[10px]">
                    <div onclick="document.getElementById('admTId').value='${window.allUsers[s].id}'"><b>${window.allUsers[s].nick}</b> <span class="text-blue-500">ID: ${window.allUsers[s].id}</span></div>
                    <button onclick="window.delUsr('${s}')" class="text-red-500 opacity-40"><i class="fa-solid fa-trash"></i></button>
                </div>`).join('');
            
            document.getElementById('admProds').innerHTML = (window.db_data.products || []).map(p => `
                <div class="p-4 bg-white/5 rounded-xl space-y-2">
                    <input id="pn_${p.id}" value="${p.name}" class="inp">
                    <div class="grid grid-cols-2 gap-2"><input id="pp_${p.id}" value="${p.pr}" class="inp"><input id="pk_${p.id}" value="${p.pref}" class="inp"></div>
                </div>`).join('');

            const b = document.getElementById('bcBtn');
            b.innerText = window.db_data.broadcast.active ? "ВЫКЛЮЧИТЬ БАННЕР" : "ВКЛЮЧИТЬ БАННЕР";
            b.className = window.db_data.broadcast.active ? "w-full py-3 rounded-xl text-[10px] font-bold uppercase bg-red-600" : "w-full py-3 rounded-xl text-[10px] font-bold uppercase bg-green-600";
        }

        function admUpdate() {
            const id = parseInt(document.getElementById('admTId').value);
            const sec = Object.keys(window.allUsers).find(s => window.allUsers[s].id === id);
            if(!sec) return Swal.fire('Ошибка','ID не найден','error');
            const u = window.allUsers[sec];
            u.bal = parseFloat(document.getElementById('admTBal').value) || u.bal;
            u.nick = document.getElementById('admTNick').value || u.nick;
            window.saveUsr(u, sec); Swal.fire('Ок','','success'); renderAdm();
        }

        function admPush() { const t = document.getElementById('pushT').value; if(!t) return; window.db_data.push = {text: t, time: Date.now()}; window.saveSys(); Swal.fire('Ок','','success'); }
        function admBC() { window.db_data.broadcast.active = !window.db_data.broadcast.active; window.db_data.broadcast.text = document.getElementById('bcT').value; window.saveSys(); renderAdm(); }
        function admAddP() { if(!window.db_data.products) window.db_data.products=[]; window.db_data.products.push({id:Date.now(), name:"Новый", pr:100, h:24, pref:"DOG"}); renderAdm(); }
        function admSave() { (window.db_data.products || []).forEach(p => { p.name=document.getElementById(`pn_${p.id}`).value; p.pr=parseInt(document.getElementById(`pp_${p.id}`).value); p.pref=document.getElementById(`pk_${p.id}`).value; }); window.saveSys(); Swal.fire('Сохранено','','success'); }

        function checkPush() { const lp = localStorage.getItem('lp_49'); if(window.db_data.push?.time > (lp || 0)) { Swal.fire({ title: 'NEWS', text: window.db_data.push.text, background: '#0f121a', color: '#fff' }); localStorage.setItem('lp_49', window.db_data.push.time); } }
        function renderBC() { const bc = window.db_data.broadcast; const el = document.getElementById('bcBox'); if(!bc.active) return el.classList.add('hidden'); el.classList.remove('hidden'); document.getElementById('bcTxt').innerText = bc.text; }
        function showSec() { Swal.fire({ title: 'КЛЮЧ ВХОДА', html: `<div class="bg-black/40 p-5 rounded-xl font-mono text-red-400 select-all border border-white/5">${window.mySecret}</div>`, background: '#05070a', color: '#fff' }); }
        function showHelp() { Swal.fire({ title: 'ИНСТРУКЦИЯ', html: `<div class="text-left text-[11px] opacity-60 leading-relaxed"><p>1. Скопируй <b>Ключ Входа</b> в профиле.</p><p>2. На другом устройстве вставь его в поле входа.</p><p>3. Нажми кнопку Вход — и все данные перенесутся!</p></div>`, background: '#0f121a', color: '#fff' }); }
    </script>
</body>
</html>
