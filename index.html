<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG X | Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        
        :root { --accent: #3b82f6; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --glow: rgba(59, 130, 246, 0); }
        body.dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --glow: rgba(59, 130, 246, 0.4); }

        body { background-color: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; transition: 0.3s ease; }
        .ui-card { background: var(--card); border-radius: 28px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px var(--glow); transition: 0.3s; }
        
        /* Анимация кнопок */
        .btn-anim {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .btn-anim:hover { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 0 20px var(--glow); }
        .btn-anim:active { transform: scale(0.95); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .dark .neon-border { border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="auth" class="fixed inset-0 z-[100] bg-white dark:bg-slate-900 flex items-center justify-center hidden">
        <div class="max-w-xs w-full text-center p-8 ui-card neon-border">
            <h2 class="text-3xl font-black mb-8 italic">DOG <span class="text-blue-500">X</span></h2>
            <input type="text" id="uNameInp" placeholder="Твой ник" class="w-full bg-slate-100 dark:bg-slate-800 p-5 rounded-2xl mb-4 text-center outline-none font-bold uppercase border border-transparent focus:border-blue-500 transition">
            <button onclick="login()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl btn-anim">ВОЙТИ</button>
        </div>
    </div>

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-10 p-4 ui-card neon-border">
        <div class="font-black text-xl italic">DOG <span class="text-blue-500">X</span></div>
        <div class="flex gap-4 sm:gap-8 text-xs font-bold uppercase tracking-widest">
            <button onclick="tab('home')" class="hover:text-blue-500 transition">Магазин</button>
            <button onclick="tab('me')" class="hover:text-blue-500 transition">Кабинет</button>
            <button id="admBtn" onclick="tab('admin')" class="hidden text-red-500">Админ</button>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-5xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tighter">Лучший VPN от <span class="text-blue-500">sswckk</span></h1>
            <p id="topMsg" class="opacity-50 text-sm">Все системы в норме</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="ui-card p-10 flex flex-col justify-between neon-border">
                <h3 class="text-[10px] font-black opacity-30 uppercase mb-4">Пробный</h3>
                <div id="pr1" class="text-5xl font-black mb-8">10₽</div>
                <button onclick="buy(0)" class="w-full py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold btn-anim">КУПИТЬ</button>
            </div>
            <div class="ui-card p-10 bg-blue-600 text-white flex flex-col justify-between border-none shadow-2xl shadow-blue-500/20">
                <h3 class="text-[10px] font-black opacity-50 uppercase mb-4">Популярный</h3>
                <div id="pr2" class="text-5xl font-black mb-8 text-white">250₽</div>
                <button onclick="buy(1)" class="w-full py-4 bg-white text-blue-600 rounded-2xl font-bold btn-anim">АКТИВИРОВАТЬ</button>
            </div>
            <div class="ui-card p-10 flex flex-col justify-between neon-border">
                <h3 class="text-[10px] font-black opacity-30 uppercase mb-4">Навсегда</h3>
                <div id="pr3" class="text-5xl font-black mb-8">1000₽</div>
                <button onclick="buy(2)" class="w-full py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold btn-anim">КУПИТЬ</button>
            </div>
        </div>
    </main>

    <section id="me" class="tab-content max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="ui-card p-8 text-center neon-border">
                <div class="w-24 h-24 bg-blue-500 text-white rounded-[2rem] mx-auto mb-6 flex items-center justify-center text-4xl font-black shadow-xl shadow-blue-500/30" id="ava">?</div>
                <h2 class="text-2xl font-black mb-1" id="name">USER</h2>
                <div class="text-3xl font-black text-blue-500 mb-6" id="bal">0.00₽</div>
                
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="topUp()" class="py-4 bg-blue-600 text-white rounded-2xl text-[10px] font-black uppercase btn-anim">Пополнить</button>
                    <button onclick="toggleTheme()" class="py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-[10px] font-black uppercase btn-anim">Тема</button>
                </div>

                <div class="flex gap-2 mb-10">
                    <input type="text" id="promoInput" placeholder="Промокод" class="w-full bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl text-xs border border-transparent focus:border-blue-500 outline-none">
                    <button onclick="usePromo()" class="px-5 bg-slate-900 dark:bg-white dark:text-black text-white rounded-2xl btn-anim"><i class="fas fa-check"></i></button>
                </div>

                <input type="password" id="admKey" placeholder="ROOT KEY" class="w-full bg-transparent p-2 text-center text-[8px] outline-none opacity-10 focus:opacity-100">
                <button onclick="checkAdmin()" class="text-[8px] font-bold opacity-30 uppercase mt-2">Панель управления</button>
            </div>
            
            <div class="md:col-span-2 ui-card p-8 neon-border">
                <h3 class="text-xs font-black opacity-30 uppercase mb-8 tracking-widest text-center md:text-left">Мои подключения</h3>
                <div id="keys" class="space-y-4">
                    <p class="text-center text-gray-400 py-20 italic text-sm">У вас пока нет активных ключей</p>
                </div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-5xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="ui-card p-8 space-y-4 neon-border">
                <h2 class="font-black text-red-500 uppercase">Глобальные настройки</h2>
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="aP1" class="p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl text-center text-xs font-bold">
                    <input type="number" id="aP2" class="p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl text-center text-xs font-bold">
                    <input type="number" id="aP3" class="p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl text-center text-xs font-bold">
                </div>
                <input type="text" id="aCard" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl text-xs font-bold">
                <input type="text" id="aTick" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl text-xs font-bold">
                <input type="number" step="0.1" id="aRate" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl text-xs font-bold">
                <button onclick="saveAdmin()" class="w-full py-5 bg-red-500 text-white font-black rounded-2xl btn-anim">СОХРАНИТЬ ПАРАМЕТРЫ</button>
            </div>

            <div class="ui-card p-8 neon-border">
                <h2 class="font-black uppercase mb-6">Создать денежный код</h2>
                <div class="flex gap-2 mb-8">
                    <input type="text" id="pName" placeholder="НАЗВАНИЕ" class="flex-1 p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl text-xs font-black uppercase">
                    <input type="number" id="pVal" placeholder="СУММА" class="w-24 p-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl text-xs text-center font-bold">
                    <button onclick="addPromo()" class="px-6 bg-blue-600 text-white rounded-2xl btn-anim"><i class="fas fa-plus"></i></button>
                </div>
                <div id="promoList" class="space-y-3 max-h-64 overflow-y-auto pr-2"></div>
            </div>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_v8_db')) || {
            prices: [10, 250, 1000], card: "2202 ... (sswckk)", msg: "VPN активен и защищен", rate: 1.5, promos: []
        };
        let user = JSON.parse(localStorage.getItem('dog_v8_user')) || null;
        let theme = localStorage.getItem('dog_theme') || 'light';

        window.onload = () => { 
            if(!user) document.getElementById('auth').classList.remove('hidden'); 
            else { sync(); if(theme === 'dark') document.body.classList.add('dark'); }
        };

        function login() {
            const n = document.getElementById('uNameInp').value.trim();
            if(n) { user = { name: n, bal: 0, keys: [] }; save(); location.reload(); }
        }

        function sync() {
            document.getElementById('name').innerText = user.name.toUpperCase();
            document.getElementById('ava').innerText = user.name[0].toUpperCase();
            document.getElementById('bal').innerText = user.bal.toFixed(2) + '₽';
            document.getElementById('topMsg').innerText = db.msg;
            document.getElementById('pr1').innerText = db.prices[0] + '₽';
            document.getElementById('pr2').innerText = db.prices[1] + '₽';
            document.getElementById('pr3').innerText = db.prices[2] + '₽';
            
            // Админка
            document.getElementById('aP1').value = db.prices[0];
            document.getElementById('aP2').value = db.prices[1];
            document.getElementById('aP3').value = db.prices[2];
            document.getElementById('aCard').value = db.card;
            document.getElementById('aTick').value = db.msg;
            document.getElementById('aRate').value = db.rate;

            renderKeys();
            renderPromos();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            theme = document.body.classList.contains('dark') ? 'dark' : 'light';
            localStorage.setItem('dog_theme', theme);
        }

        function topUp() {
            Swal.fire({
                title: 'ПОПОЛНЕНИЕ БАЛАНСА',
                background: theme === 'dark' ? '#1e293b' : '#fff',
                color: theme === 'dark' ? '#fff' : '#000',
                html: `
                    <div class="p-4 space-y-4">
                        <input type="number" id="topAmt" placeholder="Сумма в рублях" class="w-full p-4 rounded-2xl border text-center font-bold text-xl">
                        <div class="text-[10px] opacity-50 uppercase font-black">Реквизиты sswckk:</div>
                        <div class="p-4 bg-slate-100 dark:bg-slate-700 rounded-xl font-mono text-sm">${db.card}</div>
                        <p class="text-[10px] italic opacity-40">После оплаты напишите @sswckk и ваш баланс обновится</p>
                    </div>
                `,
                confirmButtonText: 'Я ОПЛАТИЛ',
                confirmButtonColor: '#3b82f6'
            });
        }

        function buy(idx) {
            const cost = parseInt(db.prices[idx]);
            const stars = Math.ceil(cost * db.rate);
            Swal.fire({
                title: 'ОПЛАТА ТАРИФА',
                background: theme === 'dark' ? '#1e293b' : '#fff',
                color: theme === 'dark' ? '#fff' : '#000',
                showConfirmButton: false,
                html: `
                    <div class="space-y-3 p-2">
                        <button onclick="pay('BAL', ${cost})" class="w-full p-5 ui-card flex justify-between items-center hover:bg-blue-500/10 btn-anim"><span>Личный баланс (${user.bal}₽)</span><i class="fas fa-wallet"></i></button>
                        <button onclick="pay('CARD', ${cost})" class="w-full p-5 ui-card flex justify-between items-center hover:bg-blue-500/10 btn-anim"><span>Карта (sswckk)</span><i class="fas fa-credit-card"></i></button>
                        <button onclick="pay('STARS', ${cost})" class="w-full p-5 ui-card flex justify-between items-center hover:bg-blue-500/10 btn-anim"><span>Звезды (★ ${stars})</span><i class="fas fa-star text-amber-500"></i></button>
                    </div>
                `
            });
        }

        function pay(m, a) {
            if(m === 'BAL') {
                if(user.bal >= a) { user.bal -= a; addK(a); save(); Swal.fire('Успех!', 'Ключ добавлен в кабинет', 'success').then(() => location.reload()); }
                else Swal.fire('Ошибка', 'Не хватает денег на балансе', 'error');
            } else {
                Swal.fire('Ожидание оплаты', 'Свяжитесь с @sswckk для подтверждения', 'info');
            }
        }

        function addK(a) { user.keys.unshift(`vless://${Math.random().toString(36).substring(5)}@dogx.pro#${a}RUB`); }

        function usePromo() {
            const c = document.getElementById('promoInput').value.toUpperCase();
            const i = db.promos.findIndex(p => p.code === c);
            if(i !== -1) {
                const v = db.promos[i].val;
                user.bal += v;
                db.promos.splice(i, 1);
                save();
                Swal.fire('Ура!', `Начислено ${v}₽`, 'success').then(() => location.reload());
            } else Swal.fire('Упс!', 'Код неверный', 'error');
        }

        function checkAdmin() {
            if(document.getElementById('admKey').value === '67АРТЁМ67') {
                document.getElementById('admBtn').classList.remove('hidden');
                tab('admin');
            }
        }

        function renderKeys() {
            const l = document.getElementById('keys');
            if(user.keys.length > 0) {
                l.innerHTML = user.keys.map(k => `
                    <div class="flex justify-between items-center p-5 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-black/5 neon-border">
                        <p class="text-[10px] font-mono truncate mr-4 opacity-60">${k}</p>
                        <button onclick="navigator.clipboard.writeText('${k}'); Swal.fire('Готово','Скопировано','success')" class="text-blue-500 font-black text-[10px]">COPY</button>
                    </div>
                `).join('');
            }
        }

        function addPromo() {
            const n = document.getElementById('pName').value.toUpperCase();
            const v = parseInt(document.getElementById('pVal').value);
            if(n && v) { db.promos.push({code: n, val: v}); save(); renderPromos(); }
        }

        function renderPromos() {
            document.getElementById('promoList').innerHTML = db.promos.map((p, i) => `
                <div class="flex justify-between items-center p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl text-[10px] font-black">
                    <span>${p.code} (+${p.val}₽)</span>
                    <button onclick="db.promos.splice(${i},1); save(); renderPromos();" class="text-red-500">УДАЛИТЬ</button>
                </div>
            `).join('');
        }

        function saveAdmin() {
            db.prices = [document.getElementById('aP1').value, document.getElementById('aP2').value, document.getElementById('aP3').value];
            db.card = document.getElementById('aCard').value;
            db.msg = document.getElementById('aTick').value;
            db.rate = document.getElementById('aRate').value;
            save(); location.reload();
        }

        function save() { localStorage.setItem('dog_v8_db', JSON.stringify(db)); localStorage.setItem('dog_v8_user', JSON.stringify(user)); }
        function tab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
