<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X VPN PRO</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/733/733641.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .neo-blue { color: #3b82f6; text-shadow: 0 0 10px rgba(59,130,246,0.5); }
        .btn-buy { background: #3b82f6; color: #fff; border-radius: 16px; font-weight: 800; transition: 0.2s; }
        .btn-buy:active { transform: scale(0.95); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .badge-sale { background: #ef4444; color: #fff; font-size: 8px; padding: 2px 6px; border-radius: 6px; position: absolute; top: -10px; right: 10px; }
    </style>
</head>
<body class="p-3">

    <div id="broadcast" class="max-w-xl mx-auto mb-3 hidden">
        <div class="bg-blue-600/20 border border-blue-500/50 p-3 rounded-2xl text-[10px] text-center font-bold text-blue-400 italic">
            <i class="fas fa-bullhorn mr-2"></i> <span id="bcText">Важное уведомление для всех!</span>
        </div>
    </div>

    <nav class="max-w-xl mx-auto flex justify-between items-center mb-4 p-4 glass">
        <div class="font-black text-lg italic">DOG <span class="neo-blue">X</span></div>
        <div class="flex gap-5 text-[9px] font-black uppercase tracking-tighter">
            <button onclick="showTab('home')">МАРКЕТ</button>
            <button onclick="showTab('me')">ПРОФИЛЬ</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500">ADMIN</button>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-xl mx-auto space-y-3">
        <div id="products" class="grid grid-cols-1 gap-3">
            </div>
    </main>

    <section id="me" class="tab-content max-w-xl mx-auto space-y-3">
        <div class="glass p-6 text-center">
            <div class="text-[10px] opacity-40 uppercase mb-1">Баланс счета</div>
            <div class="text-4xl font-black mb-6 neo-blue" id="userBal">0.00₽</div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="showTopUp()" class="py-4 btn-buy text-[10px]">ПОПОЛНИТЬ</button>
                <button onclick="installApp()" class="py-4 glass text-[10px] font-bold">PWA APP</button>
            </div>
            <div class="mt-6 pt-6 border-t border-white/5 space-y-3">
                <input type="text" id="promoInp" placeholder="КОД ИЛИ ПАРОЛЬ" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-center text-xs font-bold outline-none focus:border-blue-500" oninput="checkAdmin()">
                <button onclick="usePromo()" class="text-[9px] font-black opacity-30 uppercase">Активировать</button>
            </div>
        </div>
        <div id="keysList" class="space-y-2"></div>
    </section>

    <section id="admin" class="tab-content max-w-xl mx-auto space-y-3">
        <div class="glass p-5 space-y-4">
            <h2 class="font-black text-red-500 text-xs uppercase">Управление рассылкой</h2>
            <input id="a_bc" class="w-full p-3 bg-white/5 rounded-xl text-xs" placeholder="Текст рассылки...">
            
            <h2 class="font-black text-blue-500 text-xs uppercase pt-4">Цены и Скидки</h2>
            <div id="a_prices_list" class="space-y-2"></div>

            <h2 class="font-black text-green-500 text-xs uppercase pt-4">Реквизиты</h2>
            <input id="a_card" class="w-full p-3 bg-white/5 rounded-xl text-xs" placeholder="Номер карты / Ник">

            <h2 class="font-black text-orange-500 text-xs uppercase pt-4">Склады ключей</h2>
            <textarea id="a_ios" class="w-full h-24 bg-white/5 rounded-xl p-3 text-[9px] font-mono" placeholder="iPhone ключи..."></textarea>
            <textarea id="a_and" class="w-full h-24 bg-white/5 rounded-xl p-3 text-[9px] font-mono" placeholder="Android ключи..."></textarea>
            
            <button onclick="saveAdmin()" class="w-full py-4 btn-buy bg-red-600">СОХРАНИТЬ ВСЁ</button>
        </div>
    </section>

    <script>
        // Инициализация базы данных
        let db = JSON.parse(localStorage.getItem('dog_v15_db')) || {
            broadcast: "VPN Снова онлайн! Покупай выгодно.",
            card: "sswckk (Т-Банк)",
            products: [
                { id: 0, name: "ПРОБНИК", price: 10, oldPrice: 50, hours: 24, desc: "24 часа теста" },
                { id: 1, name: "МЕСЯЦ", price: 250, oldPrice: 400, hours: 720, desc: "30 дней безлимита" },
                { id: 2, name: "НАВСЕГДА", price: 1000, oldPrice: 2500, hours: 99999, desc: "Личный VIP канал" }
            ],
            stock_ios: [],
            stock_and: [],
            promos: []
        };
        let user = JSON.parse(localStorage.getItem('dog_v15_user')) || { name: "Artyom", bal: 0, keys: [] };

        window.onload = () => { sync(); };

        function sync() {
            // Рассылка
            if(db.broadcast) {
                document.getElementById('broadcast').classList.remove('hidden');
                document.getElementById('bcText').innerText = db.broadcast;
            }
            
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            renderProducts();
            renderKeys();
            loadAdminFields();
        }

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = db.products.map(p => `
                <div class="glass p-5 flex justify-between items-center relative overflow-visible">
                    ${p.oldPrice > p.price ? `<div class="badge-sale">ВЫГОДА ${(100 - (p.price/p.oldPrice*100)).toFixed(0)}%</div>` : ''}
                    <div>
                        <h3 class="text-[10px] font-black opacity-40 uppercase">${p.name}</h3>
                        <div class="flex items-end gap-2">
                            <span class="text-2xl font-black">${p.price}₽</span>
                            ${p.oldPrice > p.price ? `<span class="text-[10px] line-through opacity-30 mb-1">${p.oldPrice}₽</span>` : ''}
                        </div>
                    </div>
                    <button onclick="buyKey(${p.id})" class="px-6 py-3 btn-buy text-[10px]">КУПИТЬ</button>
                </div>
            `).join('');
        }

        function buyKey(id) {
            const p = db.products.find(x => x.id === id);
            Swal.fire({
                title: 'ВЫБЕРИ ОС',
                background: '#0a0a0a', color: '#fff',
                showCancelButton: true,
                confirmButtonText: 'iPhone',
                cancelButtonText: 'Android',
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#22c55e'
            }).then((result) => {
                const plat = result.isConfirmed ? 'ios' : 'and';
                const stockKey = plat === 'ios' ? 'stock_ios' : 'stock_and';

                if(user.bal < p.price) return Swal.fire('Ошибка','Пополни баланс','error');
                if(db[stockKey].length === 0) return Swal.fire('Пусто','Ключи закончились','warning');

                const key = db[stockKey].shift();
                user.bal -= p.price;
                user.keys.unshift({ key: key, plat: plat, expire: Date.now() + (p.hours * 3600000) });
                save();
                Swal.fire('Успех!','Ключ в профиле','success').then(() => sync());
            });
        }

        function showTopUp() {
            Swal.fire({
                title: 'ПОПОЛНЕНИЕ',
                background: '#0a0a0a', color: '#fff',
                html: `
                    <div class="space-y-3">
                        <input id="sumRub" type="number" placeholder="Сумма (5-1000₽)" class="w-full p-3 glass text-center font-bold">
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="pay('⭐ 15')" class="p-3 glass text-[10px]">⭐ 15 Звезд</button>
                            <button onclick="pay('⭐ 50')" class="p-3 glass text-[10px]">⭐ 50 Звезд</button>
                        </div>
                        <button onclick="pay(document.getElementById('sumRub').value)" class="w-full py-3 btn-buy">ОПЛАТИТЬ</button>
                    </div>`,
                showConfirmButton: false
            });
        }

        function pay(amt) {
            Swal.fire({
                title: 'РЕКВИЗИТЫ',
                background: '#0a0a0a', color: '#fff',
                html: `Оплата: <b>${amt}</b><br><br><span class="neo-blue font-black">${db.card}</span><br><br>Скинь чек @sswckk`
            });
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            list.innerHTML = user.keys.map(k => `
                <div class="glass p-4 border-white/5">
                    <div class="flex justify-between text-[8px] font-black opacity-30 mb-2">
                        <span>${k.plat === 'ios' ? 'APPLE IPHONE' : 'ANDROID OS'}</span>
                        <span class="text-blue-500">АКТИВЕН</span>
                    </div>
                    <div class="text-[9px] font-mono break-all mb-3 bg-black/50 p-3 rounded-lg border border-white/5 select-all">${k.key}</div>
                    <button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('Ок','','success')" class="w-full py-2 bg-white/5 text-[9px] font-black uppercase rounded-lg">Копировать</button>
                </div>
            `).join('');
        }

        // --- АДМИН ЛОГИКА ---
        function checkAdmin() { if(document.getElementById('promoInp').value === 'kalubxq') document.getElementById('adminBtn').classList.remove('hidden'); }
        
        function loadAdminFields() {
            document.getElementById('a_bc').value = db.broadcast;
            document.getElementById('a_card').value = db.card;
            document.getElementById('a_ios').value = db.stock_ios.join('\n');
            document.getElementById('a_and').value = db.stock_and.join('\n');
            
            const pList = document.getElementById('a_prices_list');
            pList.innerHTML = db.products.map(p => `
                <div class="grid grid-cols-3 gap-2">
                    <input id="p_${p.id}_name" value="${p.name}" class="p-2 glass text-[9px]">
                    <input id="p_${p.id}_pr" value="${p.price}" class="p-2 glass text-[9px]">
                    <input id="p_${p.id}_old" value="${p.oldPrice}" class="p-2 glass text-[9px]">
                </div>
            `).join('');
        }

        function saveAdmin() {
            db.broadcast = document.getElementById('a_bc').value;
            db.card = document.getElementById('a_card').value;
            db.stock_ios = document.getElementById('a_ios').value.split('\n').filter(l => l.length > 5);
            db.stock_and = document.getElementById('a_and').value.split('\n').filter(l => l.length > 5);
            
            db.products.forEach(p => {
                p.name = document.getElementById(`p_${p.id}_name`).value;
                p.price = parseInt(document.getElementById(`p_${p.id}_pr`).value);
                p.oldPrice = parseInt(document.getElementById(`p_${p.id}_old`).value);
            });

            save();
            location.reload();
        }

        function installApp() {
            Swal.fire({
                title: 'УСТАНОВКА',
                background: '#0a0a0a', color: '#fff',
                text: "Нажми 'Поделиться' -> 'На экран Домой'",
                confirmButtonColor: '#3b82f6'
            });
        }

        function save() { 
            localStorage.setItem('dog_v15_db', JSON.stringify(db)); 
            localStorage.setItem('dog_v15_user', JSON.stringify(user)); 
        }
        function showTab(id) { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }
    </script>
</body>
</html>
