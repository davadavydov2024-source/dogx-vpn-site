<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | v62 OFFLINE ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { background: #010204; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; }
        .tab { display: none; }
        .tab.active { display: block; animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .btn-overlord { background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%); font-weight: 900; text-transform: uppercase; transition: 0.3s; box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4); }
        .btn-overlord:active { transform: scale(0.9); }
        .nav-bar { background: rgba(1, 2, 4, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { color: rgba(255,255,255,0.2); transition: 0.3s; }
        .nav-item.active { color: #818cf8; transform: translateY(-5px); }
        .gold-num { background: linear-gradient(90deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .unbound { font-family: 'Unbounded', sans-serif; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#010204]/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-dog text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter unbound">DOG <span class="text-indigo-500 text-2xl">X</span></h1>
                <p id="topInfo" class="text-[9px] font-bold opacity-30 uppercase tracking-[2px]">СИСТЕМА: ГОТОВА</p>
            </div>
        </div>
        <button onclick="toggleChat(true)" class="relative w-12 h-12 glass flex items-center justify-center">
            <i class="fa-solid fa-headset text-lg opacity-40"></i>
            <div id="notif-dot" class="hidden absolute top-2 right-2 w-3 h-3 bg-red-600 rounded-full border-2 border-[#010204]"></div>
        </button>
    </header>

    <main id="home" class="tab active px-6 space-y-6">
        <div id="bc-box" class="hidden glass overflow-hidden h-44 relative">
            <img id="bc-img" class="w-full h-full object-cover opacity-30">
            <div class="absolute inset-0 bg-gradient-to-t from-[#010204] via-transparent"></div>
            <div class="absolute bottom-5 left-5 right-5"><p id="bc-text" class="text-xs font-bold italic"></p></div>
        </div>
        <div id="product-list" class="space-y-4 pb-10"></div>
    </main>

    <section id="me" class="tab px-6 space-y-6">
        <div class="glass p-10 text-center">
            <p id="u-rank" class="text-[10px] font-black text-indigo-500 tracking-[6px] uppercase mb-2">ПОЛЬЗОВАТЕЛЬ</p>
            <h3 class="text-7xl font-black italic mb-10 tracking-tighter" id="u-bal">0₽</h3>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="showPay()" class="btn-overlord py-5 rounded-3xl text-[12px]">ПОПОЛНИТЬ</button>
                <button onclick="Swal.fire('ID', 'Твой ID: ' + window.user.id, 'info')" class="bg-white/5 py-5 rounded-3xl text-[12px] font-bold">ИНФО</button>
            </div>
        </div>

        <div class="glass p-6 space-y-4">
            <p class="text-[9px] font-black opacity-30 uppercase text-center">ПАНЕЛЬ УПРАВЛЕНИЯ (CODE/NUMBERS)</p>
            <input type="password" id="admin-input" oninput="verifyAdmin(this.value)" class="w-full bg-black/40 border border-white/5 rounded-2xl p-5 text-center text-xs tracking-[8px] outline-none" placeholder="••••••">
        </div>

        <div id="user-keys" class="space-y-3 pb-20"></div>
    </section>

    <section id="admin" class="tab px-6 space-y-6 pb-40">
        <div class="text-center py-6">
            <h2 class="unbound text-sm font-black text-indigo-500 tracking-[10px]">ОБЪЕКТ: АДМИН</h2>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <div class="glass p-4"><p class="text-[7px] opacity-40 uppercase">Юзеры</p><p id="st-users" class="text-lg font-black">0</p></div>
            <div class="glass p-4"><p class="text-[7px] opacity-40 uppercase">Касса</p><p id="st-cash" class="text-lg font-black text-green-500">0</p></div>
        </div>

        <div class="glass p-6 space-y-4">
            <p class="text-[10px] font-black text-indigo-400 uppercase">Управление Юзером</p>
            <input id="ad-u-id" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-xs" placeholder="ID Юзера">
            <div class="grid grid-cols-2 gap-2">
                <input id="ad-u-bal" class="bg-black/40 p-3 rounded-xl text-[10px]" placeholder="Баланс">
                <input id="ad-u-rank" class="bg-black/40 p-3 rounded-xl text-[10px]" placeholder="Ранг">
            </div>
            <button onclick="adUpdateUser()" class="w-full py-3 bg-indigo-600 rounded-xl text-[10px] font-black uppercase">Применить</button>
        </div>

        <div class="glass p-6 space-y-4">
            <div class="flex justify-between items-center">
                <p class="text-[10px] font-black text-purple-400 uppercase">Товары</p>
                <button onclick="adAddProd()" class="text-[10px] font-black">+ ДОБАВИТЬ</button>
            </div>
            <div id="ad-prods" class="space-y-4"></div>
        </div>

        <div class="glass p-6 space-y-4">
            <p class="text-[10px] font-black text-amber-500 uppercase">Система</p>
            <button onclick="adToggleBC()" id="bc-btn" class="w-full py-3 bg-white/5 rounded-xl text-[10px] font-bold">БАННЕР: ВЫКЛ</button>
            <textarea id="ad-bc-text" class="w-full bg-black/40 p-3 rounded-xl text-xs h-20" placeholder="Текст баннера..."></textarea>
            <div id="ad-logs" class="bg-black/20 p-3 h-32 overflow-y-auto text-[8px] font-mono opacity-40"></div>
            <button onclick="saveAllData()" class="w-full py-6 btn-overlord rounded-[40px] text-[10px]">СИНХРОНИЗИРОВАТЬ v62</button>
        </div>
    </section>

    <nav class="nav-bar fixed bottom-0 left-0 right-0 h-24 flex justify-around items-center px-10 z-[60]">
        <button onclick="setTab('home')" id="btn-home" class="nav-item active flex flex-col items-center gap-1">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Главная</span>
        </button>
        <button onclick="setTab('me')" id="btn-me" class="nav-item flex flex-col items-center gap-1">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Профиль</span>
        </button>
    </nav>

    <script>
        // --- ДВИЖОК ДАННЫХ ---
        let storage = JSON.parse(localStorage.getItem('dogx_v62')) || {
            users: {},
            products: [{id: 1, name: "PREMIUM ACCOUNT", pr: 500, stock: ["KEY-123", "KEY-456"]}],
            system: { logs: [], bc: {active: false, text: "Добро пожаловать в DOG X!"}, totalCash: 0 }
        };

        let user = null;
        let myId = localStorage.getItem('dogx_myid');

        function save() {
            localStorage.setItem('dogx_v62', JSON.stringify(storage));
            if(user) storage.users[user.id] = user;
            updateUI();
        }

        // --- ИНИЦИАЛИЗАЦИЯ ---
        window.onload = () => {
            if(!myId) {
                myId = 'ID-' + Math.floor(Math.random()*900000);
                localStorage.setItem('dogx_myid', myId);
            }
            if(!storage.users[myId]) {
                storage.users[myId] = { id: myId, nick: 'User', bal: 0, rank: 'Юзер', purchases: [] };
            }
            user = storage.users[myId];
            renderProducts();
            updateUI();
        };

        function verifyAdmin(v) { if(v.toUpperCase() === 'KALUBXQ') setTab('admin'); }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-' + t)?.classList.add('active');
            if(t === 'admin') renderAdmin();
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = user.bal.toLocaleString() + '₽';
            document.getElementById('u-rank').innerText = user.rank.toUpperCase();
            document.getElementById('topInfo').innerText = `ID: ${user.id} • ${user.rank}`;
            
            document.getElementById('user-keys').innerHTML = user.purchases.map(p => `
                <div class="glass p-5 flex justify-between items-center">
                    <div><p class="text-[9px] font-black text-indigo-400 uppercase">${p.name}</p><p class="text-xs font-mono font-bold">${p.key}</p></div>
                    <button onclick="copy('${p.key}')" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center"><i class="fa-solid fa-copy text-[10px]"></i></button>
                </div>`).join('');
            
            const bc = storage.system.bc;
            document.getElementById('bc-box').classList.toggle('hidden', !bc.active);
            document.getElementById('bc-text').innerText = bc.text;
        }

        function renderProducts() {
            document.getElementById('product-list').innerHTML = storage.products.map(p => `
                <div class="glass p-6 flex justify-between items-center">
                    <div><h4 class="text-sm font-black uppercase italic">${p.name}</h4><p class="text-[9px] font-bold text-indigo-400">В НАЛИЧИИ: ${p.stock.length}</p></div>
                    <button onclick="buyP(${p.id})" class="btn-overlord px-8 py-4 rounded-2xl text-[11px] font-black">${p.pr}₽</button>
                </div>`).join('');
        }

        function buyP(id) {
            const p = storage.products.find(x => x.id === id);
            if(user.bal < p.pr) return Swal.fire('Упс', 'Не хватает денег', 'error');
            if(p.stock.length === 0) return Swal.fire('Склад', 'Разобрали всё!', 'warning');
            
            const key = p.stock.shift();
            user.bal -= p.pr;
            user.purchases.unshift({name: p.name, key: key});
            addLog(`Покупка: ${user.id} купил ${p.name}`);
            save();
            Swal.fire('Успешно!', 'Загляни в профиль за ключом', 'success');
        }

        // --- АДМИНКА ---
        function renderAdmin() {
            document.getElementById('st-users').innerText = Object.keys(storage.users).length;
            let cash = 0; Object.values(storage.users).forEach(u => cash += u.bal);
            document.getElementById('st-cash').innerText = cash.toLocaleString() + '₽';
            
            document.getElementById('ad-prods').innerHTML = storage.products.map(p => `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 space-y-2">
                    <input id="ap-n-${p.id}" value="${p.name}" class="bg-transparent text-xs font-bold w-full">
                    <input id="ap-p-${p.id}" value="${p.pr}" class="w-full bg-black/40 p-2 rounded-lg text-[10px]">
                    <textarea id="ap-s-${p.id}" class="w-full bg-black/60 p-2 rounded-lg text-[9px] h-12" placeholder="Ключи через запятую">${p.stock.join(',')}</textarea>
                    <button onclick="adDelP(${p.id})" class="text-red-500 text-[8px] uppercase font-bold">Удалить</button>
                </div>`).join('');
            
            document.getElementById('ad-logs').innerHTML = storage.system.logs.map(l => `<div>${l}</div>`).join('');
            document.getElementById('bc-btn').innerText = storage.system.bc.active ? 'БАННЕР: ВКЛ' : 'БАННЕР: ВЫКЛ';
        }

        function adUpdateUser() {
            const id = document.getElementById('ad-u-id').value;
            const target = storage.users[id];
            if(!target) return Swal.fire('Ошибка', 'ID не найден', 'error');
            const nb = document.getElementById('ad-u-bal').value;
            if(nb) target.bal = parseInt(nb);
            const nr = document.getElementById('ad-u-rank').value;
            if(nr) target.rank = nr;
            save();
            Swal.fire('Готово', 'Юзер обновлен', 'success');
        }

        function saveAllData() {
            storage.products.forEach(p => {
                p.name = document.getElementById(`ap-n-${p.id}`).value;
                p.pr = parseInt(document.getElementById(`ap-p-${p.id}`).value);
                const s = document.getElementById(`ap-s-${p.id}`).value;
                p.stock = s.split(',').filter(x => x.length > 0);
            });
            storage.system.bc.text = document.getElementById('ad-bc-text').value;
            save();
            renderProducts();
            Swal.fire('СИНХРО', 'Данные в LocalStorage сохранены!', 'success');
        }

        function adAddProd() {
            storage.products.push({id: Date.now(), name: "НОВЫЙ ТОВАР", pr: 100, stock: []});
            renderAdmin();
        }

        function adToggleBC() { storage.system.bc.active = !storage.system.bc.active; renderAdmin(); }
        function addLog(t) { storage.system.logs.unshift(`[${new Date().toLocaleTimeString()}] ${t}`); if(storage.system.logs.length > 20) storage.system.logs.pop(); }
        function copy(t) { navigator.clipboard.writeText(t); Swal.fire({title:'Скопировано', toast:true, position:'top', timer:1000, showConfirmButton:false, icon:'success'}); }
        function showPay() { Swal.fire('ОПЛАТА', 'Твой ID: ' + user.id + '<br>Напиши @sswckk для начисления', 'info'); }
        function toggleChat() { Swal.fire('ПОДДЕРЖКА', 'Связь с @sswckk временно через Telegram', 'info'); }
    </script>
</body>
</html>
