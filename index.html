<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Professional Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .swal2-popup { border-radius: 24px !important; background: #191c24 !important; color: #fff !important; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center">
        <div>
            <div class="text-2xl font-extrabold tracking-tighter text-blue-500 italic">DOG X</div>
            <div id="userDisplay" class="text-[9px] font-bold opacity-40 uppercase tracking-widest mt-1">ID: #----</div>
        </div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-sm font-bold opacity-60">Маркет</button>
            <button onclick="showTab('me')" class="text-sm font-bold opacity-60">Кабинет</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-sm font-bold">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <h2 class="text-xl font-extrabold">Тарифы VPN</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center relative border-b-4 border-blue-600/20">
            <p class="text-[10px] opacity-40 font-bold uppercase mb-2">Баланс</p>
            <h3 class="text-5xl font-extrabold mb-8 text-blue-500" id="userBal">0.00₽</h3>
            <div class="flex gap-2">
                <button onclick="topUp()" class="flex-1 py-4 btn-primary text-xs shadow-lg shadow-blue-500/20">ПОПОЛНИТЬ</button>
                <button onclick="installApp()" class="flex-1 py-4 player-card text-xs font-bold uppercase">Инфо</button>
            </div>
        </div>
        <h3 class="text-lg font-bold px-2">Мои ключи</h3>
        <div id="keysList" class="space-y-3"></div>
        <input type="text" id="promoInp" oninput="checkPass()" placeholder="Промокод или Пароль" class="w-full p-4 player-card bg-transparent text-center text-sm outline-none border border-white/5 focus:border-blue-500/50">
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6">
            <h2 class="text-red-500 font-black italic uppercase">Управление складом</h2>
            
            <div class="space-y-4 p-4 bg-white/5 rounded-2xl">
                <h3 class="text-[10px] font-black opacity-40 uppercase text-blue-400">Финансы</h3>
                <div class="flex gap-2">
                    <input id="target_id" class="flex-1 p-3 player-card bg-transparent text-xs" placeholder="ID юзера">
                    <input id="target_sum" class="w-20 p-3 player-card bg-transparent text-xs" placeholder="+/-">
                </div>
                <button onclick="adminGift()" class="w-full py-3 btn-primary bg-green-600 text-[10px]">ИЗМЕНИТЬ БАЛАНС</button>
            </div>

            <div id="admin_stocks" class="space-y-6">
                </div>

            <button onclick="saveAdmin()" class="w-full py-5 btn-primary bg-red-600 uppercase italic shadow-lg shadow-red-900/40">Сохранить всё</button>
        </div>
    </section>

    <script>
        let allUsers = JSON.parse(localStorage.getItem('dog_users_db')) || {};
        let db = JSON.parse(localStorage.getItem('dog_v23_db')) || {
            card: "sswckk",
            products: [
                { id: 0, name: "ПРОБНЫЙ", pr: 10, h: 24, icon: "⚡", stock: { ios: [], and: [] } },
                { id: 1, name: "МЕСЯЦ", pr: 250, h: 720, icon: "💎", stock: { ios: [], and: [] } },
                { id: 2, name: "ГОДОВОЙ", pr: 1000, h: 8760, icon: "👑", stock: { ios: [], and: [] } }
            ]
        };
        let user = JSON.parse(localStorage.getItem('dog_v23_me')) || null;

        window.onload = () => { if(!user) initUser(); else sync(); };

        async function initUser() {
            const { value: nick } = await Swal.fire({ title: 'DOG X', input: 'text', inputPlaceholder: 'Никнейм...', background: '#191c24', color: '#fff', allowOutsideClick: false });
            const id = Math.floor(1000 + Math.random() * 9000);
            user = { id, nick: nick || 'Юзер', bal: 0, keys: [] };
            allUsers[id] = user; save(); sync();
        }

        function sync() {
            if(allUsers[user.id]) user = allUsers[user.id];
            document.getElementById('userDisplay').innerText = `${user.nick} | #${user.id}`;
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            renderProducts(); renderKeys(); loadAdmin();
        }

        function renderProducts() {
            document.getElementById('productsGrid').innerHTML = db.products.map(p => `
                <div class="player-card p-5 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="text-3xl">${p.icon}</div>
                        <div><h4 class="font-extrabold text-sm uppercase">${p.name}</h4><p class="text-[10px] opacity-40">${p.h} часов</p></div>
                    </div>
                    <div class="text-right">
                        <div class="font-extrabold text-lg">${p.pr}₽</div>
                        <button onclick="buyKey(${p.id})" class="mt-2 px-6 py-2 btn-primary text-[10px] uppercase">Купить</button>
                    </div>
                </div>`).join('');
        }

        function buyKey(id) {
            const p = db.products.find(x => x.id === id);
            if(user.bal < p.pr) return Swal.fire('Ошибка', 'Пополни баланс!', 'error');
            
            Swal.fire({
                title: 'ВЫБЕРИ УСТРОЙСТВО', background: '#191c24', color: '#fff',
                showCancelButton: true, confirmButtonText: 'iOS', cancelButtonText: 'Android'
            }).then((r) => {
                const os = r.isConfirmed ? 'ios' : 'and';
                if(p.stock[os].length === 0) return Swal.fire('Пусто', 'Ключей этого типа нет в наличии', 'warning');
                
                const key = p.stock[os].shift();
                user.bal -= p.pr;
                user.keys.unshift({ key, name: `${p.name} (${os.toUpperCase()})`, expire: Date.now() + (p.h * 3600000) });
                allUsers[user.id] = user; save(); sync();

                Swal.fire({
                    title: 'ГОТОВО!',
                    html: `<div class="text-left space-y-3 p-2">
                        <p class="text-[11px] font-bold text-green-400">ВАШ КЛЮЧ В ПРОФИЛЕ!</p>
                        <p class="text-[12px] font-black text-blue-500 uppercase">Инструкция Happ Plus:</p>
                        <div class="text-[10px] space-y-1 opacity-70">
                            1. Скопируй ключ в "Кабинете"<br>2. В Happ Plus нажми "+"<br>3. Выбери "Import from Clipboard"<br>4. Нажми кнопку Connect
                        </div>
                    </div>`, showConfirmButton: true
                });
            });
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            if(user.keys.length === 0) { list.innerHTML = `<div class="p-10 text-center opacity-20 text-xs">Нет активных подписок</div>`; return; }
            list.innerHTML = user.keys.map(k => `
                <div class="player-card p-4 border-l-2 border-blue-500">
                    <div class="flex justify-between text-[10px] font-bold mb-2"><span>${k.name}</span><span class="opacity-40">${new Date(k.expire).toLocaleDateString()}</span></div>
                    <div class="bg-black/40 p-3 rounded-lg text-[9px] font-mono break-all mb-3 select-all">${k.key}</div>
                    <button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('Ок','','success')" class="w-full py-2 bg-white/5 rounded-lg text-[10px] font-bold">КОПИРОВАТЬ</button>
                </div>`).join('');
        }

        function loadAdmin() {
            const container = document.getElementById('admin_stocks');
            container.innerHTML = db.products.map(p => `
                <div class="p-4 bg-white/5 rounded-2xl space-y-3">
                    <h4 class="text-[10px] font-black uppercase text-blue-400">Тариф: ${p.name}</h4>
                    <div class="grid grid-cols-2 gap-2">
                        <textarea id="stock_${p.id}_ios" class="h-24 p-2 player-card bg-transparent text-[8px]" placeholder="Ключи iOS...">${p.stock.ios.join('\n')}</textarea>
                        <textarea id="stock_${p.id}_and" class="h-24 p-2 player-card bg-transparent text-[8px]" placeholder="Ключи Android...">${p.stock.and.join('\n')}</textarea>
                    </div>
                    <div class="flex gap-2">
                        <input id="price_${p.id}" value="${p.pr}" class="w-1/2 p-2 player-card bg-transparent text-xs" placeholder="Цена">
                        <input id="hour_${p.id}" value="${p.h}" class="w-1/2 p-2 player-card bg-transparent text-xs" placeholder="Часы">
                    </div>
                </div>
            `).join('');
        }

        function saveAdmin() {
            db.products.forEach(p => {
                p.stock.ios = document.getElementById(`stock_${p.id}_ios`).value.split('\n').filter(l => l.length > 5);
                p.stock.and = document.getElementById(`stock_${p.id}_and`).value.split('\n').filter(l => l.length > 5);
                p.pr = parseInt(document.getElementById(`price_${p.id}`).value);
                p.h = parseInt(document.getElementById(`hour_${p.id}`).value);
            });
            save(); location.reload();
        }

        function adminGift() {
            const id = document.getElementById('target_id').value;
            const sum = parseFloat(document.getElementById('target_sum').value);
            if(allUsers[id]) { allUsers[id].bal += sum; save(); sync(); Swal.fire('Ok','','success'); }
        }

        function checkPass() { if(document.getElementById('promoInp').value === 'kalubxq') document.getElementById('adminBtn').classList.remove('hidden'); }
        function topUp() { Swal.fire({ title: 'ОПЛАТА', background: '#191c24', color: '#fff', html: `Реквизиты: ${db.card}<br><br><a href="https://t.me/sswckk" class="text-blue-500 font-bold">@sswckk</a>`, showConfirmButton: false }); }
        function installApp() { Swal.fire({ title: 'Happ Plus', background: '#191c24', color: '#fff', text: 'Лучший клиент для VPN на iOS и Android', confirmButtonColor: '#5865f2' }); }
        function save() { 
            localStorage.setItem('dog_v23_db', JSON.stringify(db)); 
            localStorage.setItem('dog_v23_me', JSON.stringify(user));
            localStorage.setItem('dog_users_db', JSON.stringify(allUsers));
        }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
