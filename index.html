<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | v100 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { background: #010204; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-main { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); font-weight: 800; }
        .unbound { font-family: 'Unbounded', sans-serif; }
        input, textarea { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 12px !important; }
    </style>
</head>
<body class="pb-36">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#010204]/90 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-shield-dog text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-black italic unbound uppercase tracking-tighter">DOG <span class="text-indigo-500 text-xl">X</span></h1>
                <p class="text-[7px] font-black opacity-30 tracking-[3px]">v100 ULTIMATE EDITION</p>
            </div>
        </div>
        <div id="u-top-nick" class="text-[9px] font-black opacity-40 bg-white/5 px-3 py-1 rounded-full uppercase">...</div>
    </header>

    <main id="home" class="tab active px-6 space-y-6">
        <div id="ad-banner" class="hidden glass overflow-hidden relative min-h-[140px]">
            <img id="ad-banner-img" class="w-full h-40 object-cover opacity-50">
            <div class="absolute inset-0 bg-gradient-to-t from-[#010204]"></div>
            <div class="absolute bottom-4 left-4 right-4">
                <p id="ad-banner-text" class="text-xs font-bold italic text-white"></p>
            </div>
        </div>

        <div class="flex justify-between items-center px-2">
            <h2 class="text-[10px] font-black opacity-20 uppercase tracking-[4px]">Доступные товары</h2>
            <i class="fa-solid fa-fire text-orange-500/20"></i>
        </div>
        <div id="product-list" class="space-y-4"></div>
    </main>

    <section id="me" class="tab px-6 space-y-6">
        <div class="glass p-8 text-center border-indigo-500/10">
            <p id="u-rank" class="text-[8px] font-black text-indigo-500 tracking-[5px] mb-2 uppercase">USER</p>
            <h3 class="text-6xl font-black italic mb-8" id="u-bal">0₽</h3>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showPay()" class="btn-main py-4 rounded-2xl text-[10px]">ПОПОЛНИТЬ</button>
                <button onclick="setTab('admin_login')" class="bg-white/5 py-4 rounded-2xl text-[10px] font-bold border border-white/5">АДМИН</button>
            </div>
        </div>
        <div id="my-keys" class="space-y-3 pb-10"></div>
    </section>

    <section id="admin_login" class="tab px-6 pt-10">
        <div class="glass p-6 space-y-4">
            <p class="text-[10px] font-black text-center opacity-40 tracking-[5px]">ВВЕДИТЕ КОД ДОСТУПА</p>
            <input type="password" id="adm-pass" oninput="checkAdm(this.value)" class="w-full p-5 text-center tracking-[15px] outline-none text-xl" placeholder="••••••">
        </div>
    </section>

    <section id="admin" class="tab px-6 space-y-6 pb-40">
        <div class="text-center py-4"><h2 class="unbound text-[10px] font-black text-indigo-500 tracking-[8px]">COMMAND CENTER v100</h2></div>

        <div class="glass p-5 space-y-4 border-indigo-500/20">
            <p class="text-[10px] font-black text-indigo-400 uppercase">📊 Аналитика Юзеров (Пароли)</p>
            <div class="flex gap-2">
                <input id="ad-search" class="flex-1 p-3 text-xs" placeholder="ID (напр. DX-123)">
                <button onclick="adSearch()" class="bg-indigo-600 px-4 rounded-xl"><i class="fa-solid fa-eye"></i></button>
            </div>
            <div id="ad-res" class="hidden bg-black/60 p-4 rounded-2xl text-[10px] font-mono space-y-1"></div>
            <div class="grid grid-cols-2 gap-2">
                <input id="ad-n-nick" class="p-2 text-[10px]" placeholder="Новый Ник">
                <input id="ad-n-id" class="p-2 text-[10px]" placeholder="Новый ID">
                <input id="ad-n-bal" class="p-2 text-[10px]" placeholder="Новый Баланс">
                <button onclick="adUpdateU()" class="bg-white/10 rounded font-bold text-[9px]">ОБНОВИТЬ</button>
            </div>
            <button onclick="adDelU()" class="w-full py-2 bg-red-900/20 text-red-500 text-[8px] font-black rounded border border-red-500/10 uppercase">Удалить аккаунт</button>
        </div>

        <div class="glass p-5 space-y-4">
            <p class="text-[10px] font-black text-amber-500 uppercase">📢 Реклама и Рассылка</p>
            <div class="space-y-2">
                <p class="text-[8px] opacity-40 uppercase">Настройка баннера</p>
                <input id="ad-bc-img" class="w-full p-2 text-[10px]" placeholder="URL Фото баннера">
                <textarea id="ad-bc-text" class="w-full p-2 h-16 text-[10px]" placeholder="Текст баннера..."></textarea>
                <button onclick="adTogBC()" id="bc-btn" class="w-full py-2 bg-white/5 rounded text-[9px] font-bold">БАННЕР: ВЫКЛ</button>
            </div>
            <hr class="opacity-5">
            <div class="space-y-2">
                <p class="text-[8px] opacity-40 uppercase">Массовая рассылка (Push)</p>
                <input id="ad-push-img" class="w-full p-2 text-[10px]" placeholder="URL Фото для рассылки">
                <textarea id="ad-push-text" class="w-full p-2 h-16 text-[10px]" placeholder="Текст рассылки..."></textarea>
                <button onclick="adDoPush()" class="w-full py-3 bg-amber-600 rounded-xl text-[10px] font-black uppercase shadow-lg">Запустить рассылку 🚀</button>
            </div>
        </div>

        <div class="glass p-5 space-y-4">
            <p class="text-[10px] font-black text-indigo-400 uppercase">📦 Управление товарами</p>
            <button onclick="adAddP()" class="w-full py-2 bg-white/5 rounded-lg text-[9px] font-bold">+ НОВЫЙ ТОВАР 🏷️</button>
            <div id="ad-plist" class="space-y-4"></div>
        </div>

        <button onclick="globalSave()" class="w-full py-6 btn-main rounded-[35px] text-[11px] italic shadow-2xl uppercase">Синхронизировать v100</button>
    </section>

    <nav class="nav-bar fixed bottom-0 left-0 right-0 h-24 flex justify-around items-center px-10 z-[60] bg-[#010204]/95 border-t border-white/5">
        <button onclick="setTab('home')" id="btn-home" class="nav-item active flex flex-col items-center gap-1 opacity-40">
            <i class="fa-solid fa-shop text-xl"></i>
            <span class="text-[8px] font-black uppercase">Магазин</span>
        </button>
        <button onclick="setTab('me')" id="btn-me" class="nav-item flex flex-col items-center gap-1 opacity-40">
            <i class="fa-solid fa-circle-user text-xl"></i>
            <span class="text-[8px] font-black uppercase">Профиль</span>
        </button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('dogx_v100')) || {
            users: {},
            prods: [{id: 1, name: "🚀 ПРЕМИУМ ТАРИФ", pr: 1000, stock: ["KEY-123"]}],
            sys: { 
                bc: {active: true, text: "ДОБРО ПОЖАЛОВАТЬ В DOG X v100!", img: "https://i.imgur.com/8QzQ5XG.png"},
                push: {text: "", img: "", ver: 0}
            }
        };

        let me = null;

        function init() {
            const uid = localStorage.getItem('dogx_uid');
            if(!uid) return showAuth();
            me = db.users[uid];
            if(!me) { localStorage.clear(); location.reload(); }
            checkPush();
            render();
        }

        // --- УМНАЯ АВТОРИЗАЦИЯ (РЕГИСТРАЦИЯ + ВХОД) ---
        async function showAuth() {
            const { value: mode } = await Swal.fire({
                title: 'DOG X v100',
                text: 'Выберите действие для доступа к системе',
                background: '#010204', color: '#fff',
                showCancelButton: true,
                confirmButtonText: 'РЕГИСТРАЦИЯ',
                cancelButtonText: 'У МЕНЯ ЕСТЬ АККАУНТ',
                confirmButtonColor: '#6366f1',
                cancelButtonColor: '#1f2937'
            });

            if(mode) { // РЕГИСТРАЦИЯ
                const { value: res } = await Swal.fire({
                    title: 'СОЗДАТЬ АККАУНТ',
                    html: '<input id="r-n" class="swal2-input" placeholder="Придумайте Ник"><input id="r-p" type="password" class="swal2-input" placeholder="Придумайте Пароль">',
                    background: '#010204', color: '#fff', confirmButtonText: 'ГОТОВО',
                    preConfirm: () => [document.getElementById('r-n').value, document.getElementById('r-p').value]
                });
                if(res && res[0] && res[1]) {
                    const id = 'DX-' + Math.random().toString(36).substr(2, 5).toUpperCase();
                    db.users[id] = { id, nick: res[0], pass: res[1], bal: 0, rank: 'User', items: [], date: new Date().toLocaleDateString() };
                    saveAndLoad(id);
                }
            } else { // ВХОД В СУЩЕСТВУЮЩИЙ
                const { value: res } = await Swal.fire({
                    title: 'ВХОД В СИСТЕМУ',
                    html: '<input id="l-n" class="swal2-input" placeholder="Ваш Ник"><input id="l-p" type="password" class="swal2-input" placeholder="Ваш Пароль">',
                    background: '#010204', color: '#fff', confirmButtonText: 'ВОЙТИ',
                    preConfirm: () => [document.getElementById('l-n').value, document.getElementById('l-p').value]
                });
                if(res) {
                    const user = Object.values(db.users).find(u => u.nick === res[0] && u.pass === res[1]);
                    if(user) {
                        saveAndLoad(user.id);
                    } else {
                        Swal.fire('Ошибка', 'Неверный ник или пароль!', 'error').then(showAuth);
                    }
                }
            }
        }

        function saveAndLoad(id) {
            localStorage.setItem('dogx_uid', id);
            localStorage.setItem('dogx_v100', JSON.stringify(db));
            location.reload();
        }

        function render() {
            if(!me) return;
            document.getElementById('u-bal').innerText = me.bal.toLocaleString() + '₽';
            document.getElementById('u-top-nick').innerText = me.nick;
            document.getElementById('u-rank').innerText = me.rank;

            const bc = db.sys.bc;
            document.getElementById('ad-banner').classList.toggle('hidden', !bc.active);
            document.getElementById('ad-banner-img').src = bc.img;
            document.getElementById('ad-banner-text').innerText = bc.text;

            document.getElementById('product-list').innerHTML = db.prods.map(p => `
                <div class="glass p-6 flex justify-between items-center">
                    <div><h4 class="text-sm font-black uppercase italic unbound">${p.name}</h4><p class="text-indigo-500 font-black">${p.pr}₽</p></div>
                    <button onclick="buyP(${p.id})" class="btn-main px-8 py-4 rounded-2xl text-[10px] font-black italic">КУПИТЬ</button>
                </div>`).join('');

            document.getElementById('my-keys').innerHTML = (me.items || []).map(i => `
                <div class="glass p-4 border-l-2 border-indigo-500 flex justify-between">
                    <div><p class="text-[8px] opacity-40 uppercase">${i.name}</p><p class="text-xs font-mono font-bold">${i.key}</p></div>
                    <i class="fa-solid fa-check text-indigo-500 opacity-20"></i>
                </div>`).join('');
        }

        function buyP(id) {
            const p = db.prods.find(x => x.id === id);
            if(me.bal < p.pr) return Swal.fire('ОШИБКА', 'Пополните баланс у @sswckk', 'error');
            if(!p.stock || p.stock.length === 0) return Swal.fire('УПС', 'Товар закончился', 'warning');
            const key = p.stock.shift();
            me.bal -= p.pr;
            me.items.unshift({name: p.name, key});
            localStorage.setItem('dogx_v100', JSON.stringify(db));
            render();
            Swal.fire('УСПЕХ', 'Товар добавлен в профиль!', 'success');
        }

        // --- АДМИНКА ---
        function checkAdm(v) { if(v.toUpperCase() === 'KALUBXQ') setTab('admin'); }
        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.style.opacity = '0.4');
            document.getElementById(t).classList.add('active');
            if(document.getElementById('btn-' + t)) document.getElementById('btn-' + t).style.opacity = '1';
            if(t === 'admin') renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('ad-bc-img').value = db.sys.bc.img;
            document.getElementById('ad-bc-text').value = db.sys.bc.text;
            document.getElementById('bc-btn').innerText = db.sys.bc.active ? 'БАННЕР: ВКЛ' : 'БАННЕР: ВЫКЛ';
            document.getElementById('ad-plist').innerHTML = db.prods.map(p => `
                <div class="bg-white/5 p-4 rounded-xl space-y-2 border border-white/5">
                    <input id="ap-n-${p.id}" value="${p.name}" class="w-full bg-transparent font-bold">
                    <input id="ap-p-${p.id}" type="number" value="${p.pr}" class="w-full p-2">
                    <textarea id="ap-s-${p.id}" class="w-full h-10 text-[9px]" placeholder="Ключи (через запятую)">${p.stock.join(',')}</textarea>
                </div>`).join('');
        }

        function adSearch() {
            const sid = document.getElementById('ad-search').value;
            const u = db.users[sid];
            const r = document.getElementById('ad-res');
            r.classList.remove('hidden');
            if(!u) { r.innerText = 'ЮЗЕР НЕ НАЙДЕН'; return; }
            r.innerHTML = `НИК: ${u.nick} | PASS: ${u.pass} | БАЛАНС: ${u.bal}₽ | ID: ${u.id}`;
            document.getElementById('ad-n-nick').value = u.nick;
            document.getElementById('ad-n-id').value = u.id;
            document.getElementById('ad-n-bal').value = u.bal;
            window.targetUid = sid;
        }

        function adUpdateU() {
            const u = db.users[window.targetUid];
            const nid = document.getElementById('ad-n-id').value;
            u.nick = document.getElementById('ad-n-nick').value;
            u.bal = parseInt(document.getElementById('ad-n-bal').value);
            if (nid !== u.id) {
                u.id = nid;
                db.users[nid] = u;
                delete db.users[window.targetUid];
            }
            localStorage.setItem('dogx_v100', JSON.stringify(db));
            Swal.fire('OK', 'Данные обновлены', 'success');
        }

        function adDoPush() {
            db.sys.push.text = document.getElementById('ad-push-text').value;
            db.sys.push.img = document.getElementById('ad-push-img').value;
            db.sys.push.ver += 1;
            localStorage.setItem('dogx_v100', JSON.stringify(db));
            Swal.fire('РАССЫЛКА', 'Отправлено всем пользователям!', 'success');
        }

        function globalSave() {
            db.sys.bc.img = document.getElementById('ad-bc-img').value;
            db.sys.bc.text = document.getElementById('ad-bc-text').value;
            db.prods.forEach(p => {
                p.name = document.getElementById(`ap-n-${p.id}`).value;
                p.pr = parseInt(document.getElementById(`ap-p-${p.id}`).value);
                p.stock = document.getElementById(`ap-s-${p.id}`).value.split(',').filter(x => x);
            });
            localStorage.setItem('dogx_v100', JSON.stringify(db));
            location.reload();
        }

        function adTogBC() { db.sys.bc.active = !db.sys.bc.active; renderAdmin(); }
        function checkPush() {
            const lastVer = localStorage.getItem('push_v') || 0;
            if (db.sys.push.ver > lastVer && db.sys.push.text) {
                Swal.fire({ title: 'НОВОСТИ', text: db.sys.push.text, imageUrl: db.sys.push.img, background: '#010204', color: '#fff' });
                localStorage.setItem('push_v', db.sys.push.ver);
            }
        }
        function adAddP() { db.prods.push({id: Date.now(), name: "🆕 ТОВАР", pr: 500, stock: []}); renderAdmin(); }
        function showPay() { Swal.fire('ПОПОЛНИТЬ', 'Твой ID: ' + me.id + '<br>Напиши @sswckk для пополнения', 'info'); }
        init();
    </script>
</body>
</html>
