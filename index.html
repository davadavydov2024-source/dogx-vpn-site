<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Global Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const app = initializeApp(firebaseConfig);
        const db_firebase = getDatabase(app);

        // Глобальные переменные
        window.db = {};
        window.allUsers = {};
        window.user = JSON.parse(localStorage.getItem('dog_v29_me')) || null;

        // ССЫЛКИ НА ПУТИ В БАЗЕ
        const dbRef = ref(db_firebase, 'dog_system_db');
        const usersRef = ref(db_firebase, 'dog_users');

        // СЛУШАТЕЛЬ ОБНОВЛЕНИЙ (МАГИЯ СИНХРОНИЗАЦИИ)
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.db = data;
                renderProducts();
                renderGlobalBC();
                renderFooterAd();
                if(document.getElementById('admin').classList.contains('active')) loadAdmin();
            } else {
                // Инициализация пустой базы при первом запуске
                const initialDb = {
                    card: "sswckk",
                    broadcast: { text: "", img: "", active: false },
                    footerAd: { text: "", img: "", active: false, url: "", btnText: "" },
                    products: [{ id: 1, name: "START", pr: 150, h: 720, icon: "🛡️", discount: 0, stock: { ios: [], and: [] } }],
                    promos: []
                };
                set(dbRef, initialDb);
            }
        });

        onValue(usersRef, (snapshot) => {
            window.allUsers = snapshot.val() || {};
            if (window.user && window.allUsers[window.user.id]) {
                window.user = window.allUsers[window.user.id];
                localStorage.setItem('dog_v29_me', JSON.stringify(window.user));
                updateUI();
            }
        });

        // ФУНКЦИИ СОХРАНЕНИЯ В ОБЛАКО
        window.saveSystem = () => set(dbRef, window.db);
        window.saveUser = (u) => set(ref(db_firebase, 'dog_users/' + u.id), u);
        window.updateAllUsers = () => set(usersRef, window.allUsers);

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .footer-ad { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: var(--card); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px; display: none; }
        .ad-btn { background: var(--accent); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="pb-32">

    <div id="globalBC" class="max-w-xl mx-auto m-4 hidden">
        <div class="player-card border border-amber-500/30 p-4 flex items-center gap-4">
            <img id="bcImgDisplay" src="" class="w-14 h-14 rounded-xl object-cover hidden border border-amber-500/20">
            <div class="flex-1">
                <p class="text-[10px] font-black text-amber-500 uppercase mb-1">Объявление</p>
                <div id="bcTextDisplay" class="text-[11px] font-bold"></div>
            </div>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div><div class="text-2xl font-extrabold text-blue-500 uppercase italic">Dog X</div><div id="userDisplay" class="text-[9px] opacity-40 uppercase">Загрузка...</div></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-xs font-bold opacity-60">Маркет</button>
            <button onclick="showTab('me')" class="text-xs font-bold opacity-60">Профиль</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-xs font-bold uppercase">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <h2 class="text-xl font-extrabold italic">Тарифы</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center border-b-4 border-blue-600/20">
            <p class="text-[10px] opacity-40 uppercase mb-2">Баланс</p>
            <h3 class="text-5xl font-extrabold text-blue-500" id="userBal">0.00₽</h3>
            <div class="flex gap-2 mt-6"><button onclick="topUp()" class="flex-1 py-4 btn-primary text-xs uppercase">Пополнить</button></div>
        </div>
        <div id="keysList" class="space-y-3"></div>
        <input type="text" id="promoInp" placeholder="Промокод или Пароль" class="w-full p-4 player-card bg-transparent text-center text-sm">
        <button onclick="checkInput()" class="w-full py-4 btn-primary bg-white/5 text-[10px] uppercase">Проверить</button>
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6 border border-red-500/20">
            <h2 class="text-red-500 font-black uppercase">Admin Cloud</h2>
            
            <div class="space-y-4 p-4 bg-blue-500/5 rounded-2xl">
                <p class="text-[10px] font-bold text-blue-400">РЕКЛАМА ВНИЗУ</p>
                <textarea id="a_footer_text" class="w-full h-16 p-3 player-card bg-transparent text-xs" placeholder="Текст..."></textarea>
                <input id="a_footer_btn_text" class="w-full p-3 player-card bg-transparent text-[10px]" placeholder="Текст кнопки">
                <input id="a_footer_url" class="w-full p-3 player-card bg-transparent text-[10px]" placeholder="Ссылка">
                <button onclick="document.getElementById('footerFile').click()" class="w-full py-2 bg-white/5 rounded-lg text-[9px]">ФОТО РЕКЛАМЫ</button>
                <button onclick="window.db.footerAd.active = !window.db.footerAd.active; saveSystem();" id="f_status_btn" class="w-full py-2 bg-white/5 rounded-lg text-[9px]">СТАТУС</button>
                <input type="file" id="footerFile" class="hidden" accept="image/*" onchange="handleImg(this, 'footer')">
            </div>

            <div class="space-y-4 p-4 bg-amber-500/5 rounded-2xl">
                <p class="text-[10px] font-bold text-amber-500">РАССЫЛКА</p>
                <textarea id="a_bc_text" class="w-full h-20 p-3 player-card bg-transparent text-xs" placeholder="Текст..."></textarea>
                <button onclick="window.db.broadcast.active = true; window.db.broadcast.text = document.getElementById('a_bc_text').value; saveSystem();" class="w-full py-3 btn-primary bg-amber-600 text-[10px]">ПУСК</button>
                <button onclick="window.db.broadcast.active = false; saveSystem();" class="w-full py-2 text-[9px] opacity-40">СКРЫТЬ У ВСЕХ</button>
            </div>

            <div id="admin_stocks" class="space-y-4"></div>
            <button onclick="addTariffPrompt()" class="w-full py-4 border-2 border-dashed border-blue-500/10 rounded-2xl text-[10px] opacity-40">+ ТАРИФ</button>

            <button onclick="saveAdmin()" class="w-full py-6 btn-primary bg-red-600 text-sm font-black italic">ОБНОВИТЬ ОБЛАКО</button>
        </div>
    </section>

    <div id="footerAd" class="footer-ad" onclick="handleAdClick()">
        <div class="max-w-xl mx-auto flex items-center gap-4">
            <img id="fImgDisplay" src="" class="w-10 h-10 rounded-lg object-cover hidden">
            <div id="fTextDisplay" class="text-[11px] font-bold flex-1"></div>
            <div id="fBtnContainer"></div>
        </div>
    </div>

    <script>
        function updateUI() {
            if(!window.user) { initUser(); return; }
            document.getElementById('userDisplay').innerText = `${window.user.nick} | #${window.user.id}`;
            document.getElementById('userBal').innerText = window.user.bal.toFixed(2) + '₽';
            renderKeys();
        }

        async function initUser() {
            const { value: nick } = await Swal.fire({ title: 'НИКНЕЙМ', input: 'text', background: '#191c24', color: '#fff' });
            if(!nick) return initUser();
            const id = Math.floor(1000 + Math.random() * 9000);
            window.user = { id, nick, bal: 0, keys: [] };
            localStorage.setItem('dog_v29_me', JSON.stringify(window.user));
            window.saveUser(window.user);
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if(!window.db.products) return;
            grid.innerHTML = window.db.products.map(p => `
                <div class="player-card p-5 flex justify-between items-center">
                    <div class="flex items-center gap-4"><div class="text-2xl">${p.icon}</div><div><h4 class="font-bold text-xs uppercase">${p.name}</h4><p class="text-[9px] opacity-40">${p.h} часов</p></div></div>
                    <button onclick="buyKey(${p.id})" class="px-6 py-2 btn-primary text-[10px] uppercase">${p.pr}₽</button>
                </div>
            `).join('');
        }

        function renderFooterAd() {
            const ad = window.db.footerAd;
            const box = document.getElementById('footerAd');
            if(ad && ad.active) {
                box.style.display = 'block';
                document.getElementById('fTextDisplay').innerText = ad.text;
                const img = document.getElementById('fImgDisplay');
                if(ad.img) { img.src = ad.img; img.classList.remove('hidden'); }
                const btnBox = document.getElementById('fBtnContainer');
                btnBox.innerHTML = ad.btnText ? `<button class="ad-btn">${ad.btnText}</button>` : "";
            } else { box.style.display = 'none'; }
        }

        function handleAdClick() { if(window.db.footerAd.url) window.open(window.db.footerAd.url, '_blank'); }

        function renderGlobalBC() {
            const bc = window.db.broadcast;
            const box = document.getElementById('globalBC');
            if(bc && bc.active) {
                box.classList.remove('hidden');
                document.getElementById('bcTextDisplay').innerText = bc.text;
            } else { box.classList.add('hidden'); }
        }

        function loadAdmin() {
            const ad = window.db.footerAd;
            document.getElementById('a_footer_text').value = ad.text || "";
            document.getElementById('a_footer_btn_text').value = ad.btnText || "";
            document.getElementById('a_footer_url').value = ad.url || "";
            document.getElementById('f_status_btn').innerText = ad.active ? "СТАТУС: ВКЛ" : "СТАТУС: ВЫКЛ";
            
            document.getElementById('admin_stocks').innerHTML = window.db.products.map(p => `
                <div class="p-4 bg-white/5 rounded-xl space-y-2">
                    <input id="p_n_${p.id}" value="${p.name}" class="bg-transparent text-[10px] font-bold w-full">
                    <div class="flex gap-2">
                        <input id="p_p_${p.id}" value="${p.pr}" class="bg-transparent text-[10px] w-1/2" placeholder="Цена">
                        <input id="p_h_${p.id}" value="${p.h}" class="bg-transparent text-[10px] w-1/2" placeholder="Часы">
                    </div>
                </div>
            `).join('');
        }

        function saveAdmin() {
            window.db.footerAd.text = document.getElementById('a_footer_text').value;
            window.db.footerAd.btnText = document.getElementById('a_footer_btn_text').value;
            window.db.footerAd.url = document.getElementById('a_footer_url').value;
            
            window.db.products.forEach(p => {
                p.name = document.getElementById(`p_n_${p.id}`).value;
                p.pr = parseInt(document.getElementById(`p_p_${p.id}`).value);
                p.h = parseInt(document.getElementById(`p_h_${p.id}`).value);
            });
            window.saveSystem();
            Swal.fire('ОБНОВЛЕНО', 'Данные в облаке синхронизированы', 'success');
        }

        function handleImg(input, type) {
            const reader = new FileReader();
            reader.onload = () => {
                if(type === 'footer') window.db.footerAd.img = reader.result;
                window.saveSystem();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function checkInput() {
            const val = document.getElementById('promoInp').value;
            if(val === 'kalubxq') {
                document.getElementById('adminBtn').classList.remove('hidden');
                Swal.fire('ADMIN', 'Доступ открыт', 'success');
            }
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            if(!window.user.keys || window.user.keys.length === 0) {
                list.innerHTML = `<p class="text-center opacity-20 text-[10px] uppercase">Ключей пока нет</p>`;
                return;
            }
            list.innerHTML = window.user.keys.map(k => `
                <div class="player-card p-4 border-l-2 border-blue-500">
                    <div class="flex justify-between text-[10px] font-bold uppercase mb-2"><span>${k.name}</span></div>
                    <div class="bg-black/20 p-2 rounded text-[10px] font-mono break-all">${k.key}</div>
                </div>
            `).join('');
        }

        function buyKey(id) {
            const p = window.db.products.find(x => x.id === id);
            if(window.user.bal < p.pr) return Swal.fire('ОШИБКА', 'Недостаточно средств', 'error');
            
            window.user.bal -= p.pr;
            if(!window.user.keys) window.user.keys = [];
            window.user.keys.unshift({ name: p.name, key: "KEY-" + Math.random().toString(36).substr(2, 9).toUpperCase() });
            
            window.saveUser(window.user);
            Swal.fire('УСПЕХ', 'Ключ куплен!', 'success');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'admin') loadAdmin();
        }

        function topUp() {
            Swal.fire({
                title: 'ПОПОЛНЕНИЕ',
                text: 'Для теста начислить +500₽?',
                showCancelButton: true,
                confirmButtonText: 'Да, давай'
            }).then((res) => {
                if(res.isConfirmed) {
                    window.user.bal += 500;
                    window.saveUser(window.user);
                }
            });
        }
    </script>
</body>
</html>
