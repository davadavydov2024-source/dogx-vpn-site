<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG X VPN</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/733/733641.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Manrope', sans-serif; }
        .ui-card { background: #fff; border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); }
        .btn-main { background: #2563eb; color: #fff; font-weight: 800; border-radius: 20px; transition: 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Стили для инструкции iOS */
        .step-box { background: #f1f5f9; padding: 15px; border-radius: 20px; text-align: left; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="authBox" class="fixed inset-0 z-[100] bg-white flex items-center justify-center hidden">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-4xl font-black mb-8 italic">DOG <span class="text-blue-600">X</span></h2>
            <input type="text" id="uNameInp" placeholder="Твой ник" class="w-full bg-gray-100 p-5 rounded-2xl mb-4 text-center font-bold outline-none border-2 border-transparent focus:border-blue-600">
            <button onclick="login()" class="w-full py-5 btn-main">НАЧАТЬ</button>
        </div>
    </div>

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-10 p-5 ui-card">
        <div class="font-black text-xl italic">DOG <span class="text-blue-600">X</span></div>
        <div class="flex gap-6 text-[10px] font-black uppercase tracking-widest">
            <button onclick="showTab('home')">Магазин</button>
            <button onclick="showTab('me')">Кабинет</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500">Админ</button>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-5xl mx-auto text-center">
        <h1 class="text-4xl font-extrabold mb-10">Твой быстрый VPN</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="ui-card p-10 flex flex-col justify-between">
                <span class="text-[10px] font-black text-gray-400 uppercase">Пробник</span>
                <div class="text-4xl font-black my-4">10₽</div>
                <button onclick="openBuy(0)" class="w-full py-4 btn-main">ВЫБРАТЬ</button>
            </div>
            <div class="ui-card p-10 border-blue-100 bg-blue-50/20 flex flex-col justify-between">
                <span class="text-[10px] font-black text-blue-600 uppercase">Месяц</span>
                <div class="text-4xl font-black my-4">250₽</div>
                <button onclick="openBuy(1)" class="w-full py-4 btn-main">ВЫБРАТЬ</button>
            </div>
            <div class="ui-card p-10 flex flex-col justify-between">
                <span class="text-[10px] font-black text-gray-400 uppercase">Навсегда</span>
                <div class="text-4xl font-black my-4">1000₽</div>
                <button onclick="openBuy(2)" class="w-full py-4 btn-main">ВЫБРАТЬ</button>
            </div>
        </div>
    </main>

    <section id="me" class="tab-content max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="ui-card p-8 text-center">
                <div class="text-2xl font-black text-blue-600 mb-6" id="userBal">0.00₽</div>
                
                <button onclick="installApp()" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl text-[10px] font-black uppercase mb-4 border border-blue-200">
                    <i class="fas fa-mobile-alt mr-2"></i> Добавить на экран Домой
                </button>

                <button onclick="topUp()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-black text-xs uppercase mb-6">Пополнить</button>
                <input type="text" id="promoInp" placeholder="Код / Пароль" class="w-full p-4 bg-gray-100 rounded-xl text-center text-xs font-bold mb-2 outline-none" oninput="checkAdmin()">
                <button onclick="usePromo()" class="w-full text-[10px] font-black text-blue-600 uppercase">Активировать</button>
            </div>
            <div class="md:col-span-2 ui-card p-8">
                <h3 class="text-xs font-black text-gray-400 uppercase mb-8">Мои ключи</h3>
                <div id="keysList" class="space-y-4"></div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-5xl mx-auto">
        <div class="ui-card p-10">
            <h2 class="font-black text-red-500 mb-6 uppercase">Склад iPhone</h2>
            <textarea id="stock_ios" class="w-full h-32 p-4 bg-gray-50 border rounded-2xl mb-6 font-mono text-xs"></textarea>
            <h2 class="font-black text-green-600 mb-6 uppercase">Склад Android</h2>
            <textarea id="stock_and" class="w-full h-32 p-4 bg-gray-50 border rounded-2xl mb-6 font-mono text-xs"></textarea>
            <button onclick="saveAdmin()" class="w-full py-4 btn-main bg-red-500">СОХРАНИТЬ</button>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_v12_db')) || { prices: [10, 250, 1000], card: "sswckk", stock_ios: [], stock_and: [], promos: [] };
        let user = JSON.parse(localStorage.getItem('dog_v12_user')) || null;

        window.onload = () => { if(!user) document.getElementById('authBox').classList.remove('hidden'); else sync(); };

        function login() {
            const n = document.getElementById('uNameInp').value.trim();
            if(n) { user = { name: n, bal: 0, keys: [] }; save(); location.reload(); }
        }

        function sync() {
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            renderKeys();
        }

        // --- ФУНКЦИЯ УСТАНОВКИ ПРИЛОЖЕНИЯ ---
        function installApp() {
            const isiOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            
            if (isiOS) {
                Swal.fire({
                    title: 'Установка на iPhone',
                    html: `
                        <div class="space-y-3">
                            <div class="step-box">
                                <b class="text-blue-600 text-sm">Шаг 1:</b> Нажмите кнопку <b>"Поделиться"</b> (квадрат со стрелкой вверх) внизу экрана.
                            </div>
                            <div class="step-box">
                                <b class="text-blue-600 text-sm">Шаг 2:</b> Пролистайте меню вниз и выберите <b>"На экран «Домой»"</b>.
                            </div>
                            <div class="step-box">
                                <b class="text-blue-600 text-sm">Шаг 3:</b> Нажмите <b>"Добавить"</b> в правом верхнем углу.
                            </div>
                        </div>
                    `,
                    confirmButtonText: 'Понятно',
                    confirmButtonColor: '#2563eb'
                });
            } else {
                Swal.fire({
                    title: 'Установка на Android',
                    html: `
                        <div class="space-y-3">
                            <div class="step-box">
                                <b class="text-green-600 text-sm">Вариант 1:</b> Нажмите на три точки (⋮) в углу Chrome и выберите <b>"Установить приложение"</b>.
                            </div>
                            <div class="step-box">
                                <b class="text-green-600 text-sm">Вариант 2:</b> Если кнопки нет, выберите <b>"Добавить на гл. экран"</b>.
                            </div>
                        </div>
                    `,
                    confirmButtonText: 'Окей',
                    confirmButtonColor: '#2563eb'
                });
            }
        }

        // Остальная логика покупки и ключей (как в V11)
        function openBuy(idx) {
            const cost = db.prices[idx];
            const hours = [24, 720, 99999][idx];
            Swal.fire({
                title: 'ВЫБЕРИ УСТРОЙСТВО',
                html: `<div class="grid gap-2"><button onclick="buyKey(${cost},${hours},'ios')" class="p-5 ui-card font-black">iPhone <i class="fab fa-apple"></i></button><button onclick="buyKey(${cost},${hours},'and')" class="p-5 ui-card font-black">Android <i class="fab fa-android text-green-500"></i></button></div>`,
                showConfirmButton: false
            });
        }

        function buyKey(cost, h, plat) {
            if(user.bal < cost) return Swal.fire('Мало денег','','error');
            const stock = plat === 'ios' ? 'stock_ios' : 'stock_and';
            if(db[stock].length === 0) return Swal.fire('Нет ключей','','warning');
            
            const raw = db[stock].shift();
            user.bal -= cost;
            user.keys.unshift({ key: raw.split('#')[0] + "#DOG_X_" + plat, expire: Date.now() + (h*3600000) });
            save();
            location.reload();
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            if(user.keys.length === 0) { list.innerHTML = `<p class="text-center opacity-20 py-10">Тут пока пусто</p>`; return; }
            list.innerHTML = user.keys.map(k => `
                <div class="p-6 bg-gray-50 rounded-3xl border border-black/5">
                    <p class="text-[10px] mb-2 font-mono break-all select-all">${k.key}</p>
                    <button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('Скопировано','','success')" class="w-full py-2 bg-blue-100 text-blue-600 text-[10px] font-black rounded-lg">КОПИРОВАТЬ ВЕСЬ КЛЮЧ</button>
                </div>
            `).join('');
        }

        function checkAdmin() { if(document.getElementById('promoInp').value === '67АРТЁМ67') document.getElementById('adminBtn').classList.remove('hidden'); }
        function saveAdmin() { db.stock_ios = document.getElementById('stock_ios').value.split('\n').filter(l => l.length > 5); db.stock_and = document.getElementById('stock_and').value.split('\n').filter(l => l.length > 5); save(); location.reload(); }
        function save() { localStorage.setItem('dog_v12_db', JSON.stringify(db)); localStorage.setItem('dog_v12_user', JSON.stringify(user)); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
