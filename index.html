<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Игровой VPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .player-card:active { transform: scale(0.98); }
        
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .promo-banner { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: #232733; border: 1px solid var(--accent);
            border-radius: 18px; z-index: 50; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            display: none; align-items: center; gap: 12px; padding: 12px;
        }
    </style>
</head>
<body class="pb-32">

    <div id="promoBanner" class="promo-banner">
        <img id="promoImg" src="" class="w-12 h-12 rounded-lg object-cover hidden">
        <div class="flex-1">
            <p id="promoText" class="text-[11px] leading-tight font-bold"></p>
            <a id="promoLink" href="#" target="_blank" class="text-[10px] text-blue-400 font-bold underline">Подробнее</a>
        </div>
        <button onclick="this.parentElement.style.display='none'" class="text-gray-500 p-2"><i class="fas fa-times"></i></button>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter">DOG<span class="text-blue-500 italic">X</span></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-sm font-bold opacity-60 hover:opacity-100">Маркет</button>
            <button onclick="showTab('me')" class="text-sm font-bold opacity-60 hover:opacity-100">Кабинет</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-sm font-bold">Админ</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-6">
        <h2 class="text-xl font-extrabold">Все тарифы</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-6 flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mb-4">
                <i class="fas fa-wallet text-3xl text-blue-500"></i>
            </div>
            <p class="text-xs opacity-50 font-bold uppercase mb-1">Твой баланс</p>
            <h3 class="text-4xl font-extrabold mb-6" id="userBal">0.00₽</h3>
            <div class="flex gap-2 w-full">
                <button onclick="topUp()" class="flex-1 py-4 btn-primary text-xs">ПОПОЛНИТЬ</button>
                <button onclick="installApp()" class="flex-1 py-4 player-card text-xs font-bold">СКАЧАТЬ APP</button>
            </div>
        </div>

        <div class="space-y-3">
            <h3 class="text-lg font-bold">Мои ключи</h3>
            <div id="keysList" class="space-y-3"></div>
        </div>

        <div class="pt-6">
            <input type="text" id="promoInp" oninput="checkAdmin()" placeholder="Промокод или Пароль" class="w-full p-4 player-card bg-transparent text-center text-sm outline-none focus:border-blue-500">
        </div>
    </section>

    <section id="admin" class="tab-content px-6 space-y-6">
        <div class="player-card p-6 space-y-6">
            <h2 class="text-red-500 font-extrabold uppercase italic">Панель управления</h2>
            
            <div class="space-y-4">
                <h3 class="text-xs font-bold opacity-50 uppercase tracking-widest">Рекламный баннер</h3>
                <input id="a_promo_text" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Текст рекламы">
                <input id="a_promo_img" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Ссылка на фото (URL)">
                <input id="a_promo_url" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Ссылка для кнопки">
                <button onclick="saveAdmin()" class="w-full py-3 btn-primary bg-blue-600">Обновить рекламу</button>
            </div>

            <div class="space-y-4 pt-6 border-t border-white/5">
                <h3 class="text-xs font-bold opacity-50 uppercase tracking-widest">Склады ключей</h3>
                <textarea id="a_ios" class="w-full h-20 p-3 player-card bg-transparent text-[10px]" placeholder="iPhone ключи..."></textarea>
                <textarea id="a_and" class="w-full h-20 p-3 player-card bg-transparent text-[10px]" placeholder="Android ключи..."></textarea>
            </div>

            <div class="space-y-4 pt-6 border-t border-white/5">
                <h3 class="text-xs font-bold opacity-50 uppercase tracking-widest">Добавить тариф</h3>
                <div class="grid grid-cols-3 gap-2">
                    <input id="nt_name" placeholder="Название" class="p-2 player-card bg-transparent text-[10px]">
                    <input id="nt_price" placeholder="Цена" class="p-2 player-card bg-transparent text-[10px]">
                    <input id="nt_hours" placeholder="Часы" class="p-2 player-card bg-transparent text-[10px]">
                </div>
                <button onclick="addNewProduct()" class="w-full py-3 btn-primary bg-green-600">Добавить товар</button>
            </div>
            
            <button onclick="saveAdmin()" class="w-full py-5 btn-primary bg-red-600 uppercase italic">Сохранить всё</button>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_v18_db')) || {
            promo: { text: "Скидки 50% на годовой тариф!", img: "", url: "https://t.me/sswckk", active: true },
            products: [
                { id: 0, name: "ПРОБНЫЙ", pr: 10, h: 24, icon: "⚡" },
                { id: 1, name: "МЕСЯЦ", pr: 250, h: 720, icon: "💎" },
                { id: 2, name: "ГОДОВОЙ", pr: 1000, h: 8760, icon: "👑" }
            ],
            stock_ios: [], stock_and: []
        };
        let user = JSON.parse(localStorage.getItem('dog_v18_user')) || { bal: 0, keys: [] };

        window.onload = () => { sync(); };

        function sync() {
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            renderProducts(); renderKeys(); renderPromo(); loadAdmin();
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = db.products.map(p => `
                <div class="player-card p-5 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="text-3xl">${p.icon || '🔥'}</div>
                        <div>
                            <h4 class="font-extrabold text-sm uppercase">${p.name}</h4>
                            <p class="text-[10px] opacity-50 font-bold">${p.h} часов доступа</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-extrabold text-lg">${p.pr}₽</div>
                        <button onclick="buyKey(${p.id})" class="mt-1 px-4 py-2 btn-primary text-[10px]">КУПИТЬ</button>
                    </div>
                </div>
            `).join('');
        }

        function buyKey(id) {
            const p = db.products.find(x => x.id === id);
            if(user.bal < p.pr) return Swal.fire('Недостаточно средств', 'Пополни баланс в кабинете', 'error');
            Swal.fire({
                title: 'ВЫБЕРИ УСТРОЙСТВО', background: '#191c24', color: '#fff',
                showCancelButton: true, confirmButtonText: 'iPhone', cancelButtonText: 'Android',
                confirmButtonColor: '#5865f2', cancelButtonColor: '#22c55e'
            }).then((r) => {
                const type = r.isConfirmed ? 'stock_ios' : 'stock_and';
                if(db[type].length === 0) return Swal.fire('Ключи закончились', 'Напиши владельцу @sswckk', 'warning');
                const key = db[type].shift();
                user.bal -= p.pr;
                user.keys.unshift({ key, name: p.name, expire: Date.now() + (p.h * 3600000) });
                save(); sync();
                Swal.fire('Поздравляем!', 'Ключ добавлен в кабинет', 'success');
            });
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            if(user.keys.length === 0) { list.innerHTML = `<div class="p-10 text-center opacity-20 italic text-sm">Нет активных подписок</div>`; return; }
            list.innerHTML = user.keys.map(k => `
                <div class="player-card p-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-black uppercase text-blue-500">${k.name}</span>
                        <span class="text-[9px] opacity-40">До: ${new Date(k.expire).toLocaleDateString()}</span>
                    </div>
                    <div class="bg-black/20 p-3 rounded-lg text-[9px] font-mono break-all mb-3 border border-white/5 select-all">${k.key}</div>
                    <button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('Скопировано','','success')" class="w-full py-2 bg-white/5 rounded-lg text-[10px] font-bold">КОПИРОВАТЬ</button>
                </div>
            `).join('');
        }

        function installApp() {
            const url = "https://davadavydov2024-source.github.io/dogx-vpn-site/";
            Swal.fire({
                title: 'УСТАНОВКА APP', background: '#191c24', color: '#fff',
                html: `
                    <div class="text-left space-y-4 p-2">
                        <div class="p-4 player-card bg-blue-500/10">
                            <p class="text-[11px] mb-3 opacity-80">Чтобы сделать приложение на своем главном экране нужно зайти на сайт:</p>
                            <div class="flex gap-2">
                                <a href="${url}" target="_blank" class="flex-1 py-3 btn-primary text-center text-[10px]">ОТКРЫТЬ САЙТ</a>
                                <button onclick="navigator.clipboard.writeText('${url}'); Swal.fire('Ок!','','success')" class="px-4 player-card"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>
                        <div class="text-[10px] opacity-60 space-y-2 pl-2">
                            <p>1. Нажмите кнопку <b>"Поделиться"</b> <i class="fas fa-share-square ml-1"></i></p>
                            <p>2. Выберите <b>"На экран Домой"</b> <i class="fas fa-plus-square ml-1"></i></p>
                            <p>3. Нажмите <b>"Добавить"</b> и все готово!</p>
                        </div>
                    </div>`,
                showConfirmButton: false
            });
        }

        function renderPromo() {
            const banner = document.getElementById('promoBanner');
            const hasPremium = user.keys.some(k => (k.expire - Date.now()) > 600000000); 
            if(db.promo.active && !hasPremium && db.promo.text) {
                banner.style.display = 'flex';
                document.getElementById('promoText').innerText = db.promo.text;
                document.getElementById('promoLink').href = db.promo.url;
                if(db.promo.img) { document.getElementById('promoImg').src = db.promo.img; document.getElementById('promoImg').classList.remove('hidden'); }
            } else { banner.style.display = 'none'; }
        }

        function checkAdmin() { if(document.getElementById('promoInp').value === '67АРТЁМ67') document.getElementById('adminBtn').classList.remove('hidden'); }
        function addNewProduct() {
            const n = document.getElementById('nt_name').value, p = parseInt(document.getElementById('nt_price').value), h = parseInt(document.getElementById('nt_hours').value);
            if(n && p && h) { db.products.push({ id: Date.now(), name: n, pr: p, h: h, icon: "⭐️" }); save(); sync(); }
        }
        function loadAdmin() {
            document.getElementById('a_promo_text').value = db.promo.text; document.getElementById('a_promo_img').value = db.promo.img;
            document.getElementById('a_promo_url').value = db.promo.url; document.getElementById('a_ios').value = db.stock_ios.join('\n'); document.getElementById('a_and').value = db.stock_and.join('\n');
        }
        function saveAdmin() {
            db.promo.text = document.getElementById('a_promo_text').value; db.promo.img = document.getElementById('a_promo_img').value;
            db.promo.url = document.getElementById('a_promo_url').value; db.stock_ios = document.getElementById('a_ios').value.split('\n').filter(l => l.length > 5);
            db.stock_and = document.getElementById('a_and').value.split('\n').filter(l => l.length > 5);
            save(); location.reload();
        }
        function topUp() {
            Swal.fire({
                title: 'ПОПОЛНЕНИЕ', background: '#191c24', color: '#fff',
                html: `<p class="text-sm opacity-70 mb-4">Напишите мне для оплаты:</p><a href="https://t.me/sswckk" target="_blank" class="text-2xl font-black text-blue-500 underline">@sswckk</a>`,
                showConfirmButton: false
            });
        }
        function save() { localStorage.setItem('dog_v18_db', JSON.stringify(db)); localStorage.setItem('dog_v18_user', JSON.stringify(user)); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
