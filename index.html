<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Support Update v34</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const app = initializeApp(firebaseConfig);
        const db_firebase = getDatabase(app);

        window.db = {};
        window.allUsers = {};
        window.mySecret = localStorage.getItem('dog_v31_secret');
        window.user = null;

        const dbRef = ref(db_firebase, 'dog_system_db');
        const usersRef = ref(db_firebase, 'dog_users');
        const supportRef = ref(db_firebase, 'dog_support');

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.db = data;
                renderProducts();
                renderGlobalBC();
                renderFooterAd();
                if(document.getElementById('admin').classList.contains('active')) loadAdmin();
            }
        });

        onValue(usersRef, (snapshot) => {
            window.allUsers = snapshot.val() || {};
            if (window.mySecret && window.allUsers[window.mySecret]) {
                window.user = window.allUsers[window.mySecret];
                updateUI();
            } else if (window.mySecret && !window.allUsers[window.mySecret]) {
                localStorage.removeItem('dog_v31_secret');
                window.mySecret = null;
                location.reload();
            }
        });

        // Слушатель тикетов для админа и юзера
        onValue(supportRef, (snapshot) => {
            window.allTickets = snapshot.val() || {};
            renderSupportChat();
            if(document.getElementById('admin').classList.contains('active')) renderAdminSupport();
        });

        window.saveSystem = () => set(dbRef, window.db);
        window.saveUser = (u) => set(ref(db_firebase, 'dog_users/' + window.mySecret), u);
        window.sendTicket = (msg) => {
            const tId = window.mySecret;
            const newMsg = { text: msg, sender: 'user', time: Date.now() };
            if(!window.allTickets[tId]) window.allTickets[tId] = { userNick: window.user.nick, userId: window.user.id, msgs: [] };
            window.allTickets[tId].msgs.push(newMsg);
            set(ref(db_firebase, 'dog_support/' + tId), window.allTickets[tId]);
        };
        window.adminReply = (tId, msg) => {
            const reply = { text: msg, sender: 'admin', time: Date.now() };
            window.allTickets[tId].msgs.push(reply);
            set(ref(db_firebase, 'dog_support/' + tId), window.allTickets[tId]);
        };
        window.firebase_db_mod = { getDatabase, ref, set, remove, get };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .guide-box { background: rgba(88, 101, 242, 0.1); border: 1px dashed var(--accent); border-radius: 15px; padding: 12px; margin-bottom: 15px; }
        .chat-msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 11px; margin-bottom: 8px; }
        .msg-user { background: var(--accent); margin-left: auto; border-bottom-right-radius: 2px; }
        .msg-admin { background: #34d399; color: #000; margin-right: auto; border-bottom-left-radius: 2px; font-weight: bold; }
    </style>
</head>
<body class="pb-40">

    <header class="p-6 flex justify-between items-center">
        <div><div class="text-2xl font-extrabold text-blue-500 italic uppercase">Dog X</div><div id="userDisplay" class="text-[9px] opacity-40 italic">Live Support v34</div></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-xs font-bold opacity-60">Маркет</button>
            <button onclick="showTab('me')" class="text-xs font-bold opacity-60">Профиль</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-xs font-bold uppercase">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <h2 class="text-xl font-extrabold italic">Тарифы</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center border-b-4 border-blue-600/20">
            <p class="text-[10px] opacity-40 uppercase mb-2">Личный Баланс</p>
            <h3 class="text-5xl font-extrabold text-blue-500" id="userBal">0.00₽</h3>
            <div class="mt-6 flex gap-2">
                <button onclick="topUp()" class="flex-1 py-4 btn-primary text-xs uppercase italic">Пополнить</button>
                <button onclick="showTransferCode()" class="px-4 bg-white/5 rounded-xl border border-white/10"><i class="fa-solid fa-key text-blue-400"></i></button>
            </div>
        </div>

        <div class="player-card p-4 space-y-4">
            <h3 class="text-xs font-black uppercase text-blue-400"><i class="fa-solid fa-headset mr-2"></i>Поддержка онлайн</h3>
            <div id="supportChatBox" class="h-48 overflow-y-auto pr-2 space-y-2 flex flex-col">
                <p class="text-[9px] opacity-30 text-center py-10 uppercase italic">История сообщений пуста</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="supportInp" placeholder="Ваш вопрос..." class="flex-1 bg-black/40 p-3 rounded-xl text-xs outline-none">
                <button onclick="sendUserMsg()" class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="keysList" class="space-y-3"></div>
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6 border border-red-500/20">
            <h2 class="text-red-500 font-black uppercase text-center text-sm">Управление Тикетами</h2>
            
            <div id="adminSupportList" class="space-y-4">
                <p class="text-center opacity-30 text-[10px]">НОВЫХ ТИКЕТОВ НЕТ</p>
            </div>

            <hr class="opacity-10">
            <div id="admin_stocks" class="space-y-4"></div>
            <button onclick="saveAdmin()" class="w-full py-6 btn-primary bg-red-600 text-sm font-black italic uppercase">Сохранить всё</button>
        </div>
    </section>

    <script>
        function updateUI() {
            if(!window.user) return;
            document.getElementById('userDisplay').innerText = `${window.user.nick} | ID: ${window.user.id}`;
            document.getElementById('userBal').innerText = window.user.bal.toFixed(0) + '₽';
            renderKeys();
        }

        async function initUser() {
            if(window.mySecret) return;
            const { value: nick } = await Swal.fire({ title: 'DOG X', input: 'text', background: '#191c24', color: '#fff', allowOutsideClick: false });
            if(!nick) return initUser();
            const secret = 'SEC-' + Math.random().toString(36).substr(2, 15).toUpperCase();
            window.mySecret = secret;
            localStorage.setItem('dog_v31_secret', secret);
            window.user = { id: Math.floor(Math.random()*900000+100000), nick, bal: 0, keys: [], secret };
            window.saveUser(window.user);
        }
        setTimeout(() => { if(!window.mySecret) initUser(); }, 1000);

        // ЛОГИКА ЧАТА ДЛЯ ЮЗЕРА
        function sendUserMsg() {
            const inp = document.getElementById('supportInp');
            if(!inp.value.trim()) return;
            window.sendTicket(inp.value.trim());
            inp.value = '';
        }

        function renderSupportChat() {
            const box = document.getElementById('supportChatBox');
            if(!window.mySecret || !window.allTickets[window.mySecret]) return;
            const msgs = window.allTickets[window.mySecret].msgs;
            box.innerHTML = msgs.map(m => `
                <div class="chat-msg ${m.sender === 'user' ? 'msg-user' : 'msg-admin'}">
                    ${m.text}
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        // ЛОГИКА АДМИНКИ ДЛЯ ТИКЕТОВ
        function renderAdminSupport() {
            const list = document.getElementById('adminSupportList');
            const tickets = Object.keys(window.allTickets);
            if(tickets.length === 0) return;
            
            list.innerHTML = tickets.map(tId => {
                const t = window.allTickets[tId];
                const lastMsg = t.msgs[t.msgs.length - 1];
                return `
                    <div class="p-4 bg-white/5 rounded-2xl border border-white/10 space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-blue-400 uppercase">${t.userNick} (#${t.userId})</span>
                            <span class="text-[8px] opacity-30">${new Date(lastMsg.time).toLocaleTimeString()}</span>
                        </div>
                        <div class="max-h-32 overflow-y-auto bg-black/20 p-2 rounded text-[10px] italic opacity-70">
                            ${t.msgs.map(m => `<div><b>${m.sender}:</b> ${m.text}</div>`).join('')}
                        </div>
                        <div class="flex gap-2">
                            <input id="reply_${tId}" class="flex-1 bg-black/40 p-2 rounded-lg text-[10px]" placeholder="Ответ...">
                            <button onclick="window.adminReply('${tId}', document.getElementById('reply_${tId}').value); document.getElementById('reply_${tId}').value=''" class="px-4 bg-green-600 rounded-lg text-[10px]">ОТВЕТИТЬ</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'admin') loadAdmin();
        }

        // Базовые функции без изменений
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = (window.db.products || []).map(p => {
                const finalPrice = p.discount > 0 ? p.pr - (p.pr * (p.discount / 100)) : p.pr;
                return `<div class="player-card p-5 flex justify-between items-center"><div><h4 class="font-bold text-xs uppercase">${p.icon} ${p.name}</h4><p class="text-[9px] opacity-40">${p.h} ч.</p></div><button onclick="buyKey(${p.id})" class="px-6 py-2 btn-primary text-[10px] uppercase font-bold">${finalPrice.toFixed(0)}₽</button></div>`;
            }).join('');
        }

        function buyKey(id) {
            const p = window.db.products.find(x => x.id === id);
            const price = p.discount > 0 ? p.pr - (p.pr * (p.discount / 100)) : p.pr;
            if(window.user.bal < price) return Swal.fire('Баланс!', '', 'error');
            window.user.bal -= price;
            window.user.keys.unshift({ name: p.name, key: "DOG-" + Math.random().toString(36).substr(2,9).toUpperCase() });
            window.saveUser(window.user);
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            if(!window.user.keys || window.user.keys.length === 0) { list.innerHTML = `<p class="text-center opacity-20 text-[10px]">КЛЮЧЕЙ НЕТ</p>`; return; }
            list.innerHTML = window.user.keys.map(k => `<div class="player-card p-4 border-l-2 border-blue-500 mb-2"><p class="text-[9px] opacity-40 uppercase">${k.name}</p><div class="bg-black/20 p-2 text-[11px] font-mono select-all">${k.key}</div></div>`).join('');
        }

        function checkInput() {
            if(document.getElementById('promoInp').value === 'KALUBXQ') { document.getElementById('adminBtn').classList.remove('hidden'); Swal.fire('Admin', '', 'success'); }
        }

        function loadAdmin() { renderAdminSupport(); }
        function saveAdmin() { window.saveSystem(); Swal.fire('Ок', '', 'success'); }
        function renderGlobalBC() { /* ... */ }
        function renderFooterAd() { /* ... */ }
        function topUp() { Swal.fire('Оплата', 'Пишите @sswckk', 'info'); }
        function showTransferCode() { Swal.fire('Code', window.mySecret, 'info'); }
        function addTariff() { if(!window.db.products) window.db.products = []; window.db.products.push({ id: Date.now(), name: "NEW", pr: 100, h: 24, icon: "⚡", discount: 0 }); window.saveSystem(); loadAdmin(); }
    </script>
</body>
</html>
