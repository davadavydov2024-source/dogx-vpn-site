<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG X | Твой Баланс</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Manrope', sans-serif; }
        .ui-card { background: #fff; border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #edf2f7; }
        .btn-pay { background: #007bff; color: #fff; font-weight: 800; border-radius: 18px; transition: 0.2s; }
        .btn-pay:hover { background: #0056b3; transform: translateY(-2px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="auth" class="fixed inset-0 z-[100] bg-white flex items-center justify-center hidden">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-3xl font-black mb-8">DOG X</h2>
            <input type="text" id="uNameInp" placeholder="Твой ник" class="w-full bg-slate-100 p-5 rounded-2xl mb-4 text-center outline-none font-bold uppercase">
            <button onclick="login()" class="w-full py-5 btn-pay">Начать</button>
        </div>
    </div>

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-8 p-4 ui-card">
        <div class="font-black text-xl tracking-tighter italic">DOG <span class="text-blue-600">X</span></div>
        <div class="flex gap-6 text-sm font-bold uppercase tracking-tight">
            <button onclick="tab('home')" class="hover:text-blue-600">Магазин</button>
            <button onclick="tab('me')" class="hover:text-blue-600">Кабинет</button>
            <button id="admBtn" onclick="tab('admin')" class="hidden text-red-500">Админ</button>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-5xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold mb-2">Выбери свой VPN</h1>
            <p id="topMsg" class="text-slate-400 text-sm italic tracking-wide">Загрузка...</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="ui-card p-10 flex flex-col justify-between">
                <h3 class="text-xs font-black text-slate-300 uppercase mb-4">Старт</h3>
                <div id="pr1" class="text-5xl font-black mb-8">10₽</div>
                <button onclick="buy(0)" class="w-full py-4 btn-pay">Купить</button>
            </div>
            <div class="ui-card p-10 border-blue-100 bg-blue-50/30 flex flex-col justify-between">
                <h3 class="text-xs font-black text-blue-400 uppercase mb-4">Максимум</h3>
                <div id="pr2" class="text-5xl font-black mb-8">250₽</div>
                <button onclick="buy(1)" class="w-full py-4 btn-pay">Купить</button>
            </div>
            <div class="ui-card p-10 flex flex-col justify-between">
                <h3 class="text-xs font-black text-slate-300 uppercase mb-4">Год</h3>
                <div id="pr3" class="text-5xl font-black mb-8">1000₽</div>
                <button onclick="buy(2)" class="w-full py-4 btn-pay">Купить</button>
            </div>
        </div>
    </main>

    <section id="me" class="tab-content max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="ui-card p-8 text-center">
                <div class="w-24 h-24 bg-blue-600 text-white rounded-3xl mx-auto mb-6 flex items-center justify-center text-4xl font-black shadow-lg" id="ava">?</div>
                <h2 class="text-xl font-black mb-1" id="name">USER</h2>
                <div class="text-2xl font-black text-blue-600 mb-8" id="bal">0.00₽</div>
                
                <input type="text" id="promoInput" placeholder="Есть промокод?" class="w-full bg-slate-50 p-4 rounded-xl text-center text-sm border mb-3">
                <button onclick="usePromo()" class="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-bold uppercase mb-10">Активировать</button>

                <input type="password" id="admKey" placeholder="ROOT KEY" class="w-full bg-transparent p-2 text-center text-[10px] outline-none opacity-20 focus:opacity-100">
                <button onclick="checkAdmin()" class="text-[9px] font-bold text-slate-400 uppercase mt-2">Админ-панель</button>
            </div>
            <div class="md:col-span-2 ui-card p-8">
                <h3 class="text-xs font-black text-slate-300 uppercase mb-6">Твои туннели</h3>
                <div id="keys" class="space-y-3">
                    <p class="text-xs text-slate-300 italic">Тут пока пусто...</p>
                </div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="ui-card p-8 space-y-4">
                <h2 class="font-black text-red-500 uppercase">Настройки цен и реквизитов</h2>
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="aP1" class="p-3 border rounded-xl text-center text-sm">
                    <input type="number" id="aP2" class="p-3 border rounded-xl text-center text-sm">
                    <input type="number" id="aP3" class="p-3 border rounded-xl text-center text-sm">
                </div>
                <input type="text" id="aCard" class="w-full p-4 border rounded-xl text-sm" placeholder="Номер карты">
                <input type="text" id="aTick" class="w-full p-4 border rounded-xl text-sm" placeholder="Текст на главной">
                <input type="number" step="0.1" id="aRate" class="w-full p-4 border rounded-xl text-sm" placeholder="Курс звёзд (1.5)">
                <button onclick="saveAdmin()" class="w-full py-4 btn-pay">Применить всё</button>
            </div>

            <div class="ui-card p-8">
                <h2 class="font-black uppercase mb-6">Денежные промокоды</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="pName" placeholder="КОД" class="flex-1 p-3 border rounded-xl text-sm uppercase font-bold">
                    <input type="number" id="pVal" placeholder="₽" class="w-20 p-3 border rounded-xl text-sm text-center">
                    <button onclick="addPromo()" class="px-4 btn-pay"><i class="fas fa-plus"></i></button>
                </div>
                <div id="promoList" class="space-y-2 max-h-60 overflow-y-auto"></div>
            </div>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_db_final_v7')) || {
            prices: [10, 250, 1000],
            card: "sswckk (Карта)",
            msg: "Система работает стабильно",
            rate: 1.5,
            promos: [] // Теперь это [{code: 'WIN', val: 50}]
        };
        let user = JSON.parse(localStorage.getItem('dog_user_v7')) || null;

        window.onload = () => { if(!user) document.getElementById('auth').classList.remove('hidden'); else sync(); };

        function login() {
            const n = document.getElementById('uNameInp').value.trim();
            if(n) { user = { name: n, bal: 0, keys: [] }; saveUser(); location.reload(); }
        }

        function sync() {
            document.getElementById('name').innerText = user.name;
            document.getElementById('ava').innerText = user.name[0].toUpperCase();
            document.getElementById('bal').innerText = user.bal.toFixed(2) + '₽';
            document.getElementById('topMsg').innerText = db.msg;

            // Магазин
            document.getElementById('pr1').innerText = db.prices[0] + '₽';
            document.getElementById('pr2').innerText = db.prices[1] + '₽';
            document.getElementById('pr3').innerText = db.prices[2] + '₽';

            // Админ данные
            document.getElementById('aP1').value = db.prices[0];
            document.getElementById('aP2').value = db.prices[1];
            document.getElementById('aP3').value = db.prices[2];
            document.getElementById('aCard').value = db.card;
            document.getElementById('aTick').value = db.msg;
            document.getElementById('aRate').value = db.rate;

            renderPromos();
            renderKeys();
        }

        function usePromo() {
            const code = document.getElementById('promoInput').value.toUpperCase();
            const idx = db.promos.findIndex(p => p.code === code);
            
            if(idx !== -1) {
                const amount = db.promos[idx].val;
                user.bal += amount;
                db.promos.splice(idx, 1); // Одноразовый промокод
                saveAll();
                Swal.fire('Ура!', `Вам зачислено ${amount}₽ на баланс!`, 'success').then(() => location.reload());
            } else {
                Swal.fire('Ошибка', 'Такого кода нет или он уже использован', 'error');
            }
        }

        function buy(idx) {
            const price = parseInt(db.prices[idx]);
            const stars = Math.ceil(price * db.rate);

            Swal.fire({
                title: 'ОПЛАТА ТАРИФА',
                background: '#fff',
                html: `
                    <div class="space-y-3 p-2">
                        <button onclick="pay('BAL', ${price})" class="w-full p-6 ui-card flex justify-between items-center hover:bg-blue-50">
                            <span>С баланса (У тебя: ${user.bal}₽)</span>
                            <i class="fas fa-wallet text-blue-500"></i>
                        </button>
                        <button onclick="pay('CARD', ${price})" class="w-full p-6 ui-card flex justify-between items-center hover:bg-slate-50">
                            <span>Карта / СБП (sswckk)</span>
                            <i class="fas fa-credit-card opacity-20"></i>
                        </button>
                        <button onclick="pay('STARS', ${price})" class="w-full p-6 ui-card flex justify-between items-center hover:bg-slate-50">
                            <span>Звёзды (★ ${stars})</span>
                            <i class="fas fa-star text-amber-400"></i>
                        </button>
                    </div>
                `,
                showConfirmButton: false
            });
        }

        function pay(type, amt) {
            if(type === 'BAL') {
                if(user.bal >= amt) {
                    user.bal -= amt;
                    addKey(amt);
                    saveUser();
                    Swal.fire('Успех!', 'Оплата прошла с баланса. Ключ в профиле!', 'success').then(() => location.reload());
                } else {
                    Swal.fire('Ошибка', 'Недостаточно денег на балансе!', 'error');
                }
            } else if(type === 'CARD') {
                Swal.fire({
                    title: 'Перевод на карту',
                    html: `<div class="p-6 bg-slate-50 rounded-2xl border font-bold text-lg">${db.card}</div>`,
                    footer: `<a href="https://t.me/sswckk" target="_blank" class="w-full py-4 btn-pay text-center">Скинуть чек sswckk</a>`,
                    showConfirmButton: false
                });
            } else {
                Swal.fire('Счёт звёзд', `Переведи ${Math.ceil(amt * db.rate)} ★ в лс sswckk`, 'info');
            }
        }

        function addKey(amt) {
            const k = `vless://${Math.random().toString(36).substring(7)}@dog-x.pro:443#DOGX_${amt}RUB`;
            user.keys.unshift(k);
        }

        // АДМИН
        function checkAdmin() {
            if(document.getElementById('admKey').value === '67АРТЁМ67') {
                document.getElementById('admBtn').classList.remove('hidden');
                tab('admin');
            }
        }

        function addPromo() {
            const code = document.getElementById('pName').value.toUpperCase();
            const val = parseInt(document.getElementById('pVal').value);
            if(code && val) {
                db.promos.push({code, val});
                saveDb();
                renderPromos();
                document.getElementById('pName').value = '';
                document.getElementById('pVal').value = '';
            }
        }

        function delPromo(i) {
            db.promos.splice(i, 1);
            saveDb();
            renderPromos();
        }

        function renderPromos() {
            const l = document.getElementById('promoList');
            l.innerHTML = db.promos.map((p, i) => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl text-sm font-bold border border-black/5">
                    <span>${p.code} <span class="text-blue-600">+${p.val}₽</span></span>
                    <button onclick="delPromo(${i})" class="text-red-400">Удалить</button>
                </div>
            `).join('');
        }

        function renderKeys() {
            const l = document.getElementById('keys');
            if(user.keys.length > 0) {
                l.innerHTML = user.keys.map(k => `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border">
                        <p class="text-[10px] font-mono truncate mr-2">${k}</p>
                        <button onclick="navigator.clipboard.writeText('${k}'); Swal.fire('Копия!','','success')" class="text-blue-500 font-bold">COPY</button>
                    </div>
                `).join('');
            }
        }

        function saveAdmin() {
            db.prices = [document.getElementById('aP1').value, document.getElementById('aP2').value, document.getElementById('aP3').value];
            db.card = document.getElementById('aCard').value;
            db.msg = document.getElementById('aTick').value;
            db.rate = document.getElementById('aRate').value;
            saveDb();
            location.reload();
        }

        function saveDb() { localStorage.setItem('dog_db_final_v7', JSON.stringify(db)); }
        function saveUser() { localStorage.setItem('dog_user_v7', JSON.stringify(user)); }
        function saveAll() { saveDb(); saveUser(); }
        function tab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
