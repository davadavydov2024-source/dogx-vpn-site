<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | v54 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base"
        };

        const app = initializeApp(firebaseConfig);
        window.f_db = getDatabase(app);

        window.db_data = { products: [], broadcast: {active:false}, stock: {} };
        window.allUsers = {};
        window.mySecret = localStorage.getItem('dog_v54_sec');
        
        onValue(ref(window.f_db, 'system_v54'), (s) => { 
            const data = s.val(); if(data) { window.db_data = data; renderProducts(); renderBC(); }
        });

        onValue(ref(window.f_db, 'users_v54'), (s) => { 
            window.allUsers = s.val() || {}; 
            if (window.mySecret && window.allUsers[window.mySecret]) {
                window.user = window.allUsers[window.mySecret]; updateUI();
            }
        });

        window.saveSys = () => set(ref(window.f_db, 'system_v54'), window.db_data);
        window.saveUsr = (u, sec) => set(ref(window.f_db, 'users_v54/' + (sec || window.mySecret)), u);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #010204; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        /* КНОПКИ ПРЕМИУМ */
        .btn-premium {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 20px -5px rgba(59, 130, 246, 0.5);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-premium::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); transition: 0.5s;
        }
        .btn-premium:active { transform: scale(0.92); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.06); 
            border-radius: 30px; 
        }

        .nav-btn {
            width: 54px; height: 54px; border-radius: 18px;
            background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center;
            transition: 0.4s; color: rgba(255,255,255,0.3);
            border: 1px solid transparent;
        }
        .nav-btn.active {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6; border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .tab { display: none; animation: slideUp 0.4s ease-out; }
        .tab.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .secret-input {
            background: rgba(0,0,0,0.5); border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 15px; padding: 12px; font-size: 10px; text-align: center;
            letter-spacing: 2px; text-transform: uppercase; color: #4f46e5;
            width: 100%; transition: 0.3s;
        }
        .secret-input:focus { border-color: #4f46e5; outline: none; background: rgba(79, 70, 229, 0.05); }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#010204]/80 backdrop-blur-lg">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.4)]">
                <i class="fa-solid fa-fire-glow text-xl text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tighter italic">DOG <span class="text-blue-500">X</span></h1>
                <p id="topId" class="text-[8px] opacity-30 font-bold tracking-[2px] uppercase">v54 Ultimate</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="setTab('home')" id="btn-home" class="nav-btn active"><i class="fa-solid fa-grid-2"></i></button>
            <button onclick="setTab('me')" id="btn-me" class="nav-btn"><i class="fa-solid fa-user-crown"></i></button>
            <button id="admB" onclick="setTab('admin')" class="hidden nav-btn !text-amber-500 !bg-amber-500/10 border-amber-500/20 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                <i class="fa-solid fa-star-excalibur"></i>
            </button>
        </div>
    </header>

    <main id="home" class="tab active px-6 space-y-6">
        <div id="bcBox" class="hidden glass-card overflow-hidden relative h-40">
            <img id="bcImg" class="w-full h-full object-cover opacity-50">
            <div class="absolute inset-0 bg-gradient-to-t from-[#010204] to-transparent"></div>
            <p id="bcTxt" class="absolute bottom-4 left-4 right-4 text-xs font-bold italic"></p>
        </div>
        <div id="pGrid" class="space-y-4"></div>
    </main>

    <section id="me" class="tab px-6 space-y-6">
        <div class="glass-card p-10 text-center relative overflow-hidden">
            <p id="uRank" class="text-[10px] font-black tracking-[5px] text-blue-500 mb-2 uppercase italic">Member</p>
            <h3 class="text-6xl font-black tracking-tighter mb-8" id="uBal">0₽</h3>
            
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="showPay()" class="btn-premium py-4 rounded-2xl text-[11px] font-black uppercase italic">Пополнить</button>
                <button onclick="openChat()" class="bg-white/5 border border-white/10 py-4 rounded-2xl text-[11px] font-black uppercase italic">Помощь</button>
            </div>

            <div class="pt-6 border-t border-white/5">
                <p class="text-[8px] opacity-20 uppercase font-bold mb-3 tracking-widest">Access Control</p>
                <input type="text" id="accessCode" oninput="checkCode(this.value)" class="secret-input" placeholder="••••••••">
            </div>
        </div>

        <div class="space-y-4">
            <p class="text-[10px] font-black opacity-30 uppercase ml-2 tracking-widest italic">Активные лицензии</p>
            <div id="keyList" class="space-y-3 pb-20"></div>
        </div>
    </section>

    <section id="admin" class="tab px-6 space-y-6 pb-40">
        <div class="glass-card p-6 space-y-6">
            <h2 class="text-center text-xs font-black tracking-[10px] text-indigo-500 uppercase">Master Panel</h2>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] opacity-40 uppercase mb-1">Всего балансов</p>
                    <p id="admTotalBal" class="text-xl font-bold text-blue-400">0₽</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] opacity-40 uppercase mb-1">Ключей</p>
                    <p id="admTotalKeys" class="text-xl font-bold text-green-400">0</p>
                </div>
            </div>

            <button onclick="admAddP()" class="w-full py-4 bg-indigo-600/10 border border-indigo-500/30 text-indigo-400 rounded-2xl text-[10px] font-black uppercase tracking-widest">
                + Создать новый тариф
            </button>

            <div id="admProds" class="space-y-4"></div>
            
            <button onclick="admSaveAll()" class="w-full py-6 btn-premium rounded-[30px] text-xs font-black uppercase italic">Обновить систему v54</button>
        </div>
    </section>

    <script>
        // ФУНКЦИЯ ПРОВЕРКИ КОДА (СЕКРЕТНЫЙ АДМИН)
        function checkCode(val) {
            // Твой секретный код: KALUBXQ
            if(val.toUpperCase() === 'KALUBXQ') {
                document.getElementById('admB').classList.remove('hidden');
                document.getElementById('accessCode').style.borderColor = '#fbbf24';
                document.getElementById('accessCode').style.color = '#fbbf24';
                Swal.fire({
                    title: 'ACCESS GRANTED',
                    text: 'Режим администратора активирован',
                    icon: 'success', toast: true, position: 'top', showConfirmButton: false, timer: 2000
                });
            }
        }

        function setTab(t) { 
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); 
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active')); 
            document.getElementById(t).classList.add('active'); 
            document.getElementById('btn-' + t)?.classList.add('active');
            if(t==='admin') renderAdm(); 
        }

        function updateUI() {
            if(!window.user) return;
            document.getElementById('uBal').innerText = (window.user.bal || 0).toLocaleString() + '₽';
            document.getElementById('uRank').innerText = window.user.rank || 'Member';
            
            const kL = document.getElementById('keyList');
            kL.innerHTML = (window.user.keys || []).map(k => `
                <div class="glass-card p-6 flex justify-between items-center group">
                    <div>
                        <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-1">${k.name}</p>
                        <p class="text-[11px] font-mono font-bold opacity-80">${k.key}</p>
                    </div>
                    <button onclick="copy('${k.key}')" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center border border-white/10 active:scale-90"><i class="fa-solid fa-copy text-[10px]"></i></button>
                </div>`).join('');
        }

        function renderProducts() {
            const g = document.getElementById('pGrid');
            g.innerHTML = (window.db_data.products || []).map(p => {
                const stock = (window.db_data.stock && window.db_data.stock[p.id]) ? window.db_data.stock[p.id].length : 0;
                return `
                <div class="glass-card p-6 flex justify-between items-center group">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500 group-hover:scale-110 transition-transform"><i class="fa-solid fa-shield-halved text-xl"></i></div>
                        <div>
                            <h4 class="text-sm font-black uppercase italic">${p.name}</h4>
                            <p class="text-[9px] font-black text-blue-500/60 uppercase tracking-widest">${p.h} ЧАСОВ • ОСТАТОК: ${stock}</p>
                        </div>
                    </div>
                    <button onclick="buyP(${p.id})" class="btn-premium px-8 py-4 rounded-2xl text-[12px] font-black italic">${p.pr}₽</button>
                </div>`;
            }).join('');
        }

        // АДМИНКА ОПТИМИЗИРОВАННАЯ
        function renderAdm() {
            let total = 0; Object.values(window.allUsers).forEach(u => total += (u.bal || 0));
            document.getElementById('admTotalBal').innerText = total + '₽';
            
            document.getElementById('admProds').innerHTML = (window.db_data.products || []).map(p => {
                const stock = (window.db_data.stock && window.db_data.stock[p.id]) || [];
                return `
                <div class="bg-white/5 p-5 rounded-3xl space-y-3 border border-white/5">
                    <input id="pn_${p.id}" value="${p.name}" class="bg-transparent border-b border-white/10 w-full py-2 text-xs font-bold outline-none" placeholder="Имя">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="pp_${p.id}" value="${p.pr}" class="bg-black/40 p-3 rounded-xl text-[10px] outline-none" placeholder="Цена">
                        <input id="ph_${p.id}" value="${p.h}" class="bg-black/40 p-3 rounded-xl text-[10px] outline-none" placeholder="Часы">
                    </div>
                    <textarea id="st_${p.id}" class="w-full bg-black/60 p-3 rounded-xl text-[9px] font-mono h-20 outline-none" placeholder="Вставь ключи (каждый с новой строки)"></textarea>
                    <div class="flex justify-between items-center text-[9px] font-bold opacity-40">
                        <span>На складе: ${stock.length}</span>
                        <button onclick="admDelP(${p.id})" class="text-red-500">Удалить тариф</button>
                    </div>
                </div>`;
            }).join('');
        }

        function admAddP() { 
            if(!window.db_data.products) window.db_data.products = [];
            window.db_data.products.push({id: Date.now(), name: "НОВЫЙ VPN", pr: 500, h: 720}); 
            renderAdm(); 
        }

        function admSaveAll() {
            window.db_data.products.forEach(p => {
                p.name = document.getElementById(`pn_${p.id}`).value;
                p.pr = parseInt(document.getElementById(`pp_${p.id}`).value);
                p.h = parseInt(document.getElementById(`ph_${p.id}`).value);
                const keys = document.getElementById(`st_${p.id}`).value.split('\n').map(x=>x.trim()).filter(x=>x.length>3);
                if(keys.length > 0) {
                    if(!window.db_data.stock) window.db_data.stock = {};
                    window.db_data.stock[p.id] = [...(window.db_data.stock[p.id] || []), ...keys];
                }
            });
            window.saveSys();
            Swal.fire('СИНХРОНИЗАЦИЯ','Данные обновлены','success');
            renderAdm();
        }

        async function buyP(id) {
            const p = window.db_data.products.find(x => x.id === id);
            if(window.user.bal < p.pr) return Swal.fire('ОШИБКА','Недостаточно средств','error');
            
            const stock = window.db_data.stock[id];
            if(!stock || stock.length === 0) return Swal.fire('SOLD OUT','Ключи закончились','warning');

            const key = stock.shift(); // Берем первый
            window.user.bal -= p.pr;
            if(!window.user.keys) window.user.keys = [];
            window.user.keys.unshift({name: p.name, key: key, date: Date.now()});
            
            await window.saveUsr(window.user);
            await window.saveSys(); // Сохраняем уменьшенный сток
            Swal.fire('УСПЕХ','Ключ в вашем профиле','success');
        }

        function copy(t) { navigator.clipboard.writeText(t); Swal.fire({title:'Copied', toast:true, position:'top', timer:1000, showConfirmButton:false, icon:'success'}); }
        function showPay() { Swal.fire({ title:'ПОПОЛНЕНИЕ', text:'Напишите @sswckk свой ID: '+window.user.id, background:'#010204', color:'#fff'}); }
        
        // РЕГИСТРАЦИЯ
        if(!window.mySecret) {
            setTimeout(async () => {
                const { value: n } = await Swal.fire({ title:'ВХОД', input:'text', inputPlaceholder:'Ваш ник...', background:'#010204', color:'#fff'});
                if(n) {
                    const s = 'S-'+Math.random().toString(36).substr(2,9).toUpperCase();
                    window.mySecret = s; localStorage.setItem('dog_v54_sec', s);
                    window.saveUsr({id: Math.floor(Math.random()*90000+10000), nick: n, bal: 0, keys: [], rank: 'Member', secret: s});
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>
