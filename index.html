<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Игровой VPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .promo-banner { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: #232733; border: 1px solid var(--accent);
            border-radius: 18px; z-index: 50; display: none; align-items: center; gap: 12px; padding: 12px;
        }
    </style>
</head>
<body class="pb-32">

    <div id="bcBanner" class="max-w-xl mx-auto m-4 hidden">
        <div class="player-card p-4 border-amber-500/30 flex items-center gap-4">
            <img id="bcImg" src="" class="w-12 h-12 rounded-lg object-cover hidden">
            <div class="flex-1">
                <p id="bcText" class="text-[11px] font-bold text-amber-400 italic"></p>
            </div>
            <button onclick="document.getElementById('bcBanner').remove()" class="text-xs opacity-40 px-2">✕</button>
        </div>
    </div>

    <div id="promoBanner" class="promo-banner">
        <img id="promoImg" src="" class="w-12 h-12 rounded-lg object-cover hidden">
        <div class="flex-1">
            <p id="promoText" class="text-[11px] leading-tight font-bold"></p>
            <a id="promoLink" href="#" target="_blank" class="text-[10px] text-blue-400 font-bold underline">Подробнее</a>
        </div>
        <button onclick="this.parentElement.style.display='none'" class="text-gray-500 p-2"><i class="fas fa-times"></i></button>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter">DOG<span class="text-blue-500 italic">X</span></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-sm font-bold opacity-60 hover:opacity-100">Маркет</button>
            <button onclick="showTab('me')" class="text-sm font-bold opacity-60 hover:opacity-100">Кабинет</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-sm font-bold">Админ</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-6">
        <h2 class="text-xl font-extrabold">Все тарифы</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-6 flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mb-4"><i class="fas fa-wallet text-3xl text-blue-500"></i></div>
            <p class="text-xs opacity-50 font-bold uppercase mb-1">Твой баланс</p>
            <h3 class="text-4xl font-extrabold mb-6" id="userBal">0.00₽</h3>
            <div class="flex gap-2 w-full">
                <button onclick="topUp()" class="flex-1 py-4 btn-primary text-xs">ПОПОЛНИТЬ</button>
                <button onclick="installApp()" class="flex-1 py-4 player-card text-xs font-bold">СКАЧАТЬ APP</button>
            </div>
        </div>
        <div id="keysList" class="space-y-3"></div>
        <input type="text" id="promoInp" oninput="checkAdmin()" placeholder="Промокод или Пароль" class="w-full p-4 player-card bg-transparent text-center text-sm outline-none">
    </section>

    <section id="admin" class="tab-content px-6 space-y-6">
        <div class="player-card p-6 space-y-6">
            <h2 class="text-red-500 font-extrabold uppercase italic">Админ-Панель</h2>
            
            <div class="space-y-3 p-4 bg-white/5 rounded-2xl">
                <h3 class="text-[10px] font-black uppercase opacity-50">Настройка Рекламы (Низ)</h3>
                <input id="a_promo_text" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Текст рекламы">
                <input id="a_promo_url" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Ссылка (https://...)">
                <div class="flex items-center gap-2">
                    <button onclick="document.getElementById('promoFile').click()" class="flex-1 py-2 player-card text-[10px]">ВЫБРАТЬ ФОТО</button>
                    <input type="file" id="promoFile" class="hidden" accept="image/*" onchange="handleImg(this, 'promo')">
                </div>
            </div>

            <div class="space-y-3 p-4 bg-white/5 rounded-2xl">
                <h3 class="text-[10px] font-black uppercase opacity-50">Рассылка (Верх)</h3>
                <input id="a_bc_text" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Текст рассылки">
                <div class="flex items-center gap-2">
                    <button onclick="document.getElementById('bcFile').click()" class="flex-1 py-2 player-card text-[10px]">ВЫБРАТЬ ФОТО</button>
                    <input type="file" id="bcFile" class="hidden" accept="image/*" onchange="handleImg(this, 'bc')">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-4 border-t border-white/5">
                <textarea id="a_ios" class="w-full h-24 p-3 player-card bg-transparent text-[9px]" placeholder="iPhone ключи..."></textarea>
                <textarea id="a_and" class="w-full h-24 p-3 player-card bg-transparent text-[9px]" placeholder="Android ключи..."></textarea>
            </div>

            <button onclick="saveAdmin()" class="w-full py-5 btn-primary bg-red-600 uppercase italic shadow-lg shadow-red-900/20">Сохранить и Обновить</button>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_v19_db')) || {
            promo: { text: "", img: "", url: "https://t.me/sswckk", active: true },
            bc: { text: "", img: "" },
            products: [
                { id: 0, name: "ПРОБНЫЙ", pr: 10, h: 24, icon: "⚡" },
                { id: 1, name: "МЕСЯЦ", pr: 250, h: 720, icon: "💎" },
                { id: 2, name: "ГОДОВОЙ", pr: 1000, h: 8760, icon: "👑" }
            ],
            stock_ios: [], stock_and: []
        };
        let user = JSON.parse(localStorage.getItem('dog_v19_user')) || { bal: 0, keys: [] };

        window.onload = () => { sync(); };

        function sync() {
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            renderProducts(); renderKeys(); renderPromo(); renderBC(); loadAdmin();
        }

        function handleImg(input, target) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                if(target === 'promo') db.promo.img = reader.result;
                if(target === 'bc') db.bc.img = reader.result;
                Swal.fire('Фото загружено','Нажмите Сохранить','success');
            };
            reader.readAsDataURL(file);
        }

        function renderProducts() {
            document.getElementById('productsGrid').innerHTML = db.products.map(p => `
                <div class="player-card p-5 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="text-3xl">${p.icon}</div>
                        <div><h4 class="font-extrabold text-sm">${p.name}</h4><p class="text-[10px] opacity-40">${p.h}ч.</p></div>
                    </div>
                    <div class="text-right"><div class="font-extrabold">${p.pr}₽</div><button onclick="buyKey(${p.id})" class="mt-1 px-4 py-2 btn-primary text-[10px]">КУПИТЬ</button></div>
                </div>`).join('');
        }

        function renderPromo() {
            const b = document.getElementById('promoBanner');
            const hasP = user.keys.some(k => (k.expire - Date.now()) > 600000000);
            if(db.promo.text && !hasP) {
                b.style.display = 'flex'; document.getElementById('promoText').innerText = db.promo.text;
                document.getElementById('promoLink').href = db.promo.url;
                if(db.promo.img) { document.getElementById('promoImg').src = db.promo.img; document.getElementById('promoImg').classList.remove('hidden'); }
            } else b.style.display = 'none';
        }

        function renderBC() {
            if(db.bc.text) {
                document.getElementById('bcBanner').classList.remove('hidden');
                document.getElementById('bcText').innerText = db.bc.text;
                if(db.bc.img) { document.getElementById('bcImg').src = db.bc.img; document.getElementById('bcImg').classList.remove('hidden'); }
            }
        }

        function buyKey(id) {
            const p = db.products.find(x => x.id === id);
            if(user.bal < p.pr) return Swal.fire('Мало денег','','error');
            Swal.fire({
                title: 'ОС?', background: '#191c24', color: '#fff', showCancelButton: true, confirmButtonText: 'iPhone', cancelButtonText: 'Android'
            }).then((r) => {
                const type = r.isConfirmed ? 'stock_ios' : 'stock_and';
                if(db[type].length === 0) return Swal.fire('Нет ключей','','warning');
                const key = db[type].shift();
                user.bal -= p.pr; user.keys.unshift({ key, name: p.name, expire: Date.now() + (p.h * 3600000) });
                save(); sync(); Swal.fire('Готово!','','success');
            });
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            if(user.keys.length === 0) { list.innerHTML = `<p class="text-center opacity-20 py-10">Нет подписок</p>`; return; }
            list.innerHTML = user.keys.map(k => `
                <div class="player-card p-4">
                    <div class="flex justify-between text-[9px] font-black uppercase mb-2"><span class="text-blue-500">${k.name}</span><span>${new Date(k.expire).toLocaleDateString()}</span></div>
                    <div class="bg-black/20 p-3 rounded-lg text-[9px] font-mono break-all mb-2 select-all">${k.key}</div>
                    <button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('Ок','','success')" class="w-full py-2 bg-white/5 rounded-lg text-[9px] font-bold">КОПИРОВАТЬ</button>
                </div>`).join('');
        }

        function checkAdmin() { if(document.getElementById('promoInp').value === '67АРТЁМ67') document.getElementById('adminBtn').classList.remove('hidden'); }
        function loadAdmin() {
            document.getElementById('a_promo_text').value = db.promo.text; document.getElementById('a_promo_url').value = db.promo.url;
            document.getElementById('a_bc_text').value = db.bc.text; document.getElementById('a_ios').value = db.stock_ios.join('\n');
            document.getElementById('a_and').value = db.stock_and.join('\n');
        }
        function saveAdmin() {
            db.promo.text = document.getElementById('a_promo_text').value; db.promo.url = document.getElementById('a_promo_url').value;
            db.bc.text = document.getElementById('a_bc_text').value; db.stock_ios = document.getElementById('a_ios').value.split('\n').filter(l => l.length > 5);
            db.stock_and = document.getElementById('a_and').value.split('\n').filter(l => l.length > 5);
            save(); location.reload();
        }
        function topUp() { Swal.fire({ title: 'ОПЛАТА', background: '#191c24', color: '#fff', html: `<a href="https://t.me/sswckk" target="_blank" class="text-xl font-black text-blue-500 underline">@sswckk</a>`, showConfirmButton: false }); }
        function installApp() {
            const url = "https://davadavydov2024-source.github.io/dogx-vpn-site/";
            Swal.fire({
                title: 'УСТАНОВКА', background: '#191c24', color: '#fff',
                html: `<div class="text-left space-y-3 p-2"><p class="text-[10px] opacity-60">Перейдите по ссылке и нажмите "Добавить на экран Домой":</p>
                <a href="${url}" target="_blank" class="block py-3 btn-primary text-center text-[10px]">ОТКРЫТЬ САЙТ</a></div>`, showConfirmButton: false
            });
        }
        function save() { localStorage.setItem('dog_v19_db', JSON.stringify(db)); localStorage.setItem('dog_v19_user', JSON.stringify(user)); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
