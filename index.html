<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | v85 SYNC CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ТВОИ КЛЮЧИ (Сделал заглушку, чтобы работало сразу, но лучше вставь свои из Firebase Console)
        const firebaseConfig = {
            databaseURL: "https://dogx-v85-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.f_db = db;

        // ГЛОБАЛЬНЫЕ ДАННЫЕ (ОБЩИЕ ДЛЯ ВСЕХ)
        onValue(ref(db, 'global_market'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.global_products = data.products || [];
                window.global_sys = data.sys || { bc: {active: true, text: "DOG X v85 ONLINE"} };
                renderGlobalUI();
            }
        });

        // ДАННЫЕ ЮЗЕРОВ
        onValue(ref(db, 'users'), (snapshot) => {
            window.all_users = snapshot.val() || {};
            if (window.myUid && window.all_users[window.myUid]) {
                window.me = window.all_users[window.myUid];
                renderUserUI();
            }
        });

        window.saveGlobal = (data) => set(ref(db, 'global_market'), data);
        window.saveUser = (uid, data) => set(ref(db, 'users/' + uid), data);
        window.deleteUser = (uid) => remove(ref(db, 'users/' + uid));
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { background: #010204; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .tab { display: none; }
        .tab.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #000; font-weight: 900; box-shadow: 0 10px 20px -5px rgba(217, 119, 6, 0.3); }
        .unbound { font-family: 'Unbounded', sans-serif; }
        .badge-sale { background: #ef4444; color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="pb-36">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#010204]/90 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center"><i class="fa-solid fa-bolt-lightning text-black"></i></div>
            <div>
                <h1 class="text-lg font-black italic unbound uppercase tracking-tighter">DOG <span class="text-amber-500">X</span></h1>
                <p class="text-[7px] font-black opacity-30 tracking-[3px]">v85 CLOUD SYNC</p>
            </div>
        </div>
        <div id="top-nick" class="text-[9px] font-black opacity-40 bg-white/5 px-3 py-1 rounded-full">...</div>
    </header>

    <main id="home" class="tab active px-6 space-y-6">
        <div id="cloud-bc" class="hidden glass p-5 relative overflow-hidden border-amber-500/20">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-bullhorn text-amber-500 text-sm"></i>
                <p id="bc-text" class="text-xs font-bold italic text-amber-100"></p>
            </div>
        </div>
        <div id="product-list" class="space-y-4 pt-2"></div>
    </main>

    <section id="me" class="tab px-6 space-y-6">
        <div class="glass p-8 text-center border-white/10">
            <p id="u-rank" class="text-[8px] font-black text-amber-500 tracking-[5px] mb-2 uppercase">USER</p>
            <h3 class="text-6xl font-black italic mb-8" id="u-bal">0₽</h3>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showPay()" class="btn-gold py-4 rounded-2xl text-[10px]">ДЕПОЗИТ</button>
                <button onclick="showMigrate()" class="bg-white/5 py-4 rounded-2xl text-[10px] font-bold">КЛЮЧ</button>
            </div>
        </div>
        <div class="glass p-5 space-y-4">
            <p class="text-[8px] font-black opacity-30 uppercase tracking-[4px] text-center">ADMIN TERMINAL</p>
            <input type="password" id="adm-pass" oninput="checkAdm(this.value)" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-center tracking-[10px] outline-none" placeholder="••••••">
        </div>
        <div id="my-items" class="space-y-3 pb-10"></div>
    </section>

    <section id="admin" class="tab px-6 space-y-6 pb-40">
        <div class="text-center py-4"><h2 class="unbound text-[10px] font-black text-red-500 tracking-[8px]">CLOUD COMMANDER</h2></div>

        <div class="glass p-5 space-y-4 border-red-500/20">
            <p class="text-[10px] font-black text-red-400 uppercase">📊 Аналитика Юзеров (Пароли/ID)</p>
            <div class="flex gap-2">
                <input id="ad-search" class="flex-1 bg-black/40 p-3 rounded-lg text-xs" placeholder="ID Юзера (напр. 777)">
                <button onclick="adFind()" class="bg-red-600 px-4 rounded-xl"><i class="fa-solid fa-eye"></i></button>
            </div>
            <div id="ad-res" class="hidden bg-black/60 p-4 rounded-2xl text-[10px] font-mono space-y-1 text-red-200 border border-red-500/10"></div>
            <div class="grid grid-cols-2 gap-2">
                <input id="ad-n-nick" class="bg-black/40 p-2 rounded text-[10px]" placeholder="Новый Ник">
                <input id="ad-n-id" class="bg-black/40 p-2 rounded text-[10px]" placeholder="Новый ID">
                <input id="ad-n-bal" class="bg-black/40 p-2 rounded text-[10px]" placeholder="Новый Баланс">
                <button onclick="adSaveUser()" class="bg-indigo-600 rounded text-[9px] font-bold uppercase">Обновить</button>
            </div>
            <button onclick="adKillUser()" class="w-full py-2 bg-red-900/20 text-red-500 text-[8px] font-black rounded border border-red-500/20">УДАЛИТЬ АККАУНТ</button>
        </div>

        <div class="glass p-5 space-y-4">
            <p class="text-[10px] font-black text-amber-500 uppercase">📦 Глобальные Тарифы</p>
            <button onclick="adAddP()" class="w-full py-2 bg-white/5 rounded-lg text-[9px] font-bold">+ НОВЫЙ ТАРИФ 🏷️</button>
            <div id="ad-plist" class="space-y-4"></div>
        </div>

        <button onclick="adPushGlobal()" class="w-full py-6 btn-gold rounded-[35px] text-[11px] uppercase italic">ОБНОВИТЬ У ВСЕХ ЮЗЕРОВ ⚡</button>
    </section>

    <nav class="nav-bar fixed bottom-0 left-0 right-0 h-24 flex justify-around items-center px-10 z-[60]">
        <button onclick="setTab('home')" id="btn-home" class="nav-item active flex flex-col items-center gap-1 opacity-40">
            <i class="fa-solid fa-shop text-xl"></i>
            <span class="text-[8px] font-black uppercase">Магазин</span>
        </button>
        <button onclick="setTab('me')" id="btn-me" class="nav-item flex flex-col items-center gap-1 opacity-40">
            <i class="fa-solid fa-user-ninja text-xl"></i>
            <span class="text-[8px] font-black uppercase">Профиль</span>
        </button>
    </nav>

    <script>
        window.myUid = localStorage.getItem('dogx_uid');

        async function showAuth() {
            const { value: res } = await Swal.fire({
                title: 'РЕГИСТРАЦИЯ v85',
                html: '<input id="r-n" class="swal2-input" placeholder="Ник"><input id="r-p" type="password" class="swal2-input" placeholder="Пароль">',
                background: '#010204', color: '#fff', allowOutsideClick: false,
                preConfirm: () => [document.getElementById('r-n').value, document.getElementById('r-p').value]
            });
            if(res) {
                const uid = 'DX-' + Math.random().toString(36).substr(2, 5).toUpperCase();
                const udata = { id: uid, nick: res[0], pass: res[1], bal: 0, rank: 'User', items: [], date: new Date().toLocaleDateString() };
                window.saveUser(uid, udata);
                localStorage.setItem('dogx_uid', uid);
                window.myUid = uid;
                location.reload();
            }
        }

        if(!window.myUid) showAuth();

        function renderGlobalUI() {
            const list = document.getElementById('product-list');
            list.innerHTML = window.global_products.map(p => {
                const price = Math.floor(p.pr * (1 - (p.disc || 0) / 100));
                return `
                <div class="glass p-6 flex justify-between items-center relative overflow-hidden">
                    ${p.disc > 0 ? `<div class="absolute top-0 left-0 badge-sale">-${p.disc}%</div>` : ''}
                    <div>
                        <h4 class="text-sm font-black uppercase italic unbound">${p.name}</h4>
                        <div class="flex gap-2 items-center">
                            <span class="${p.disc > 0 ? 'line-through opacity-30 text-[10px]' : 'text-amber-500 font-bold'}">${p.pr}₽</span>
                            ${p.disc > 0 ? `<span class="text-amber-500 font-black text-sm">${price}₽</span>` : ''}
                        </div>
                    </div>
                    <button onclick="buyP(${p.id})" class="btn-gold px-7 py-3 rounded-xl text-[10px] font-black italic">КУПИТЬ</button>
                </div>`;
            }).join('');
            
            document.getElementById('cloud-bc').classList.toggle('hidden', !window.global_sys.bc.active);
            document.getElementById('bc-text').innerText = window.global_sys.bc.text;
        }

        function renderUserUI() {
            document.getElementById('u-bal').innerText = window.me.bal.toLocaleString() + '₽';
            document.getElementById('top-nick').innerText = window.me.nick;
            document.getElementById('u-rank').innerText = window.me.rank;
            document.getElementById('my-items').innerHTML = (window.me.items || []).map(i => `
                <div class="glass p-4 flex justify-between items-center border-l-2 border-amber-500">
                    <div><p class="text-[8px] opacity-40 font-black uppercase">${i.name}</p><p class="text-xs font-mono font-bold text-amber-200">${i.key}</p></div>
                    <button onclick="copy('${i.key}')" class="text-amber-500/30"><i class="fa-solid fa-copy"></i></button>
                </div>`).join('');
        }

        function buyP(id) {
            const p = window.global_products.find(x => x.id === id);
            const price = Math.floor(p.pr * (1 - (p.disc || 0) / 100));
            if(window.me.bal < price) return Swal.fire('Ошибка', 'Пополни баланс', 'error');
            if(!p.stock || p.stock.length === 0) return Swal.fire('Склад', 'Пусто', 'warning');
            
            const key = p.stock.shift();
            window.me.bal -= price;
            if(!window.me.items) window.me.items = [];
            window.me.items.unshift({name: p.name, key});
            window.saveUser(window.myUid, window.me);
            window.saveGlobal({products: window.global_products, sys: window.global_sys});
            Swal.fire('Успех', 'Аккаунт выдан', 'success');
        }

        // --- АДМИН ПАНЕЛЬ ---
        function checkAdm(v) { if(v.toUpperCase() === 'KALUBXQ') setTab('admin'); }
        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.style.opacity = '0.4');
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-' + t).style.opacity = '1';
            if(t === 'admin') renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('ad-plist').innerHTML = window.global_products.map(p => `
                <div class="bg-white/5 p-4 rounded-xl border border-white/5 space-y-2">
                    <input id="ap-n-${p.id}" value="${p.name}" class="w-full bg-transparent font-bold">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="ap-p-${p.id}" type="number" value="${p.pr}" placeholder="Цена">
                        <input id="ap-d-${p.id}" type="number" value="${p.disc}" placeholder="Скидка %">
                    </div>
                    <textarea id="ap-s-${p.id}" class="w-full h-10 text-[9px] bg-black/40" placeholder="Ключи через запятую">${(p.stock || []).join(',')}</textarea>
                </div>`).join('');
        }

        function adFind() {
            const sid = document.getElementById('ad-search').value;
            const u = Object.values(window.all_users).find(x => x.id == sid);
            const res = document.getElementById('ad-res');
            res.classList.remove('hidden');
            if(!u) { res.innerText = 'ЮЗЕР НЕ НАЙДЕН'; return; }
            res.innerHTML = `НИК: ${u.nick} | PASS: ${u.pass} | BAL: ${u.bal}₽ | DATE: ${u.date}`;
            document.getElementById('ad-n-nick').value = u.nick;
            document.getElementById('ad-n-id').value = u.id;
            document.getElementById('ad-n-bal').value = u.bal;
            window.targetUid = Object.keys(window.all_users).find(key => window.all_users[key].id == sid);
        }

        function adSaveUser() {
            const u = window.all_users[window.targetUid];
            u.nick = document.getElementById('ad-n-nick').value;
            u.id = document.getElementById('ad-n-id').value;
            u.bal = parseInt(document.getElementById('ad-n-bal').value);
            window.saveUser(window.targetUid, u);
            Swal.fire('OK', 'Данные юзера обновлены', 'success');
        }

        function adPushGlobal() {
            window.global_products.forEach(p => {
                p.name = document.getElementById(`ap-n-${p.id}`).value;
                p.pr = parseInt(document.getElementById(`ap-p-${p.id}`).value);
                p.disc = parseInt(document.getElementById(`ap-d-${p.id}`).value) || 0;
                p.stock = document.getElementById(`ap-s-${p.id}`).value.split(',').filter(x => x);
            });
            window.saveGlobal({products: window.global_products, sys: window.global_sys});
            Swal.fire('CLOUD SYNC', 'Тарифы обновлены у всех пользователей!', 'success');
        }

        function adAddP() { window.global_products.push({id: Date.now(), name: "🆕 ТАРИФ", pr: 1000, disc: 0, stock: []}); renderAdmin(); }
        function copy(t) { navigator.clipboard.writeText(t); Swal.fire({title:'Copied', toast:true, position:'top', timer:1000, showConfirmButton:false, icon:'success'}); }
        function showPay() { Swal.fire('Оплата', 'Твой ID: ' + window.me.id + '<br>Напиши @sswckk', 'info'); }
        function showMigrate() { Swal.fire('Твой ключ', window.me.id, 'info'); }
        function adKillUser() { window.deleteUser(window.targetUid); Swal.fire('Удалено', '', 'warning'); }
    </script>
</body>
</html>
