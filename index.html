<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X NETWORK | ULTIMATE ADMIN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        
        :root {
            --bg-main: #010204;
            --accent: #7c3aed;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-main);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .unbound { font-family: 'Unbounded', sans-serif; }

        /* Красивые карточки */
        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            backdrop-filter: blur(15px);
            transition: transform 0.2s;
        }

        .tab { display: none; animation: fadeIn 0.4s ease; }
        .tab.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            border-radius: 20px;
            font-weight: 800;
            box-shadow: 0 8px 20px -6px rgba(124, 58, 237, 0.5);
        }

        /* Поля ввода в админке (исправлен цвет текста) */
        .admin-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 16px !important;
            padding: 12px 16px !important;
            font-size: 14px !important;
        }

        .admin-input::placeholder { color: rgba(255,255,255,0.3); }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <div id="broadcast-top" class="px-6 pt-4 hidden">
        <div class="glass-panel p-5 border-indigo-500/20">
            <img id="br-img-top" class="w-full h-32 object-cover rounded-2xl mb-3 hidden">
            <h4 id="br-title-top" class="unbound text-[10px] text-indigo-400 font-bold uppercase mb-1"></h4>
            <p id="br-text-top" class="text-xs opacity-80 leading-relaxed"></p>
            <a id="br-link-top" class="inline-block mt-3 text-indigo-400 text-[10px] font-black underline uppercase tracking-widest">Открыть ссылку</a>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 glass-panel flex items-center justify-center">
                <i class="fa-solid fa-dog text-indigo-500 text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black italic unbound uppercase tracking-tighter">DOG<span class="text-indigo-500">X</span></h1>
            </div>
        </div>
        <div class="glass-panel px-4 py-2 border-white/5">
            <p id="u-nick-display" class="text-[10px] font-black opacity-50 uppercase tracking-widest">ГОСТЬ</p>
        </div>
    </header>

    <section id="home" class="tab active px-6">
        <div id="product-list" class="space-y-4">
            </div>

        <div id="ads-bottom" class="mt-8 hidden">
            <div class="glass-panel p-6 border-dashed border-white/10">
                <img id="ad-img-bot" class="w-full h-40 object-cover rounded-2xl mb-4 hidden">
                <p id="ad-text-bot" class="text-xs opacity-60 italic mb-4"></p>
                <a id="ad-link-bot" class="btn-primary block text-center py-4 text-[10px] tracking-widest uppercase">Подробнее</a>
            </div>
        </div>
    </section>

    <section id="me" class="tab px-6">
        <div class="glass-panel p-10 text-center mt-2">
            <p class="text-[10px] font-black text-indigo-500 tracking-[8px] uppercase mb-4 opacity-40">ВАШ БАЛАНС</p>
            <h3 class="text-7xl font-black italic tracking-tighter mb-10" id="u-bal">0₽</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="showPay()" class="btn-primary py-5 text-[11px] uppercase tracking-widest">Пополнить</button>
                <button onclick="setTab('admin_login')" class="glass-panel py-5 text-[11px] uppercase tracking-widest opacity-60">Управление</button>
            </div>
        </div>
        <div id="my-keys" class="mt-6 space-y-3 pb-10">
            </div>
    </section>

    <section id="admin_login" class="tab px-6 pt-20">
        <div class="max-w-xs mx-auto text-center">
            <i class="fa-solid fa-lock text-4xl mb-6 opacity-10"></i>
            <input type="password" id="adm-pass" oninput="if(this.value.toUpperCase()==='KALUBXQ') setTab('admin')" class="w-full p-6 text-center text-2xl tracking-[10px] glass-panel outline-none" placeholder="••••">
        </div>
    </section>

    <section id="admin" class="tab px-6 pt-4 pb-40 space-y-6">
        <div class="flex justify-between items-center">
            <h2 class="unbound text-xs font-bold text-indigo-500">ADMIN PANEL v2.0</h2>
            <button onclick="setTab('me')" class="text-[10px] opacity-40 uppercase">Выйти</button>
        </div>
        
        <div class="glass-panel p-5 space-y-4">
            <p class="text-[10px] font-black opacity-30 uppercase tracking-widest">База пользователей</p>
            <div id="admin-user-list" class="max-h-48 overflow-y-auto space-y-2 text-[9px]"></div>
            <input id="ad-u-id" class="admin-input w-full" placeholder="Введите ID юзера">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="adManageUser('bal')" class="bg-indigo-600/20 text-indigo-400 py-3 rounded-xl text-[10px] font-bold">БАЛАНС</button>
                <button onclick="adManageUser('id')" class="bg-white/5 py-3 rounded-xl text-[10px] font-bold">СМЕНИТЬ ID</button>
                <button onclick="adManageUser('del')" class="bg-red-900/20 text-red-500 py-3 rounded-xl text-[10px] font-bold">УДАЛИТЬ</button>
                <button onclick="adManageUser('login')" class="bg-green-900/20 text-green-500 py-3 rounded-xl text-[10px] font-bold">ВОЙТИ</button>
            </div>
        </div>

        <div class="glass-panel p-5 space-y-4">
            <p class="text-[10px] font-black opacity-30 uppercase tracking-widest">Управление тарифами</p>
            <div id="admin-prod-list" class="space-y-3"></div>
            <button onclick="adCreateTariff()" class="w-full py-4 border border-dashed border-white/10 rounded-2xl text-[10px] font-black">+ СОЗДАТЬ ТАРИФ</button>
        </div>

        <div class="glass-panel p-5 space-y-3">
            <p class="text-[10px] font-black text-amber-500 uppercase">📢 Рассылка (Сверху)</p>
            <input id="br-i" class="admin-input w-full" placeholder="Ссылка на фото">
            <input id="br-t" class="admin-input w-full" placeholder="Текст рассылки">
            <input id="br-l" class="admin-input w-full" placeholder="Ссылка кнопки">
            <button onclick="adUpdateContent('br')" class="w-full py-3 bg-amber-600/20 text-amber-500 rounded-xl text-[10px] font-bold uppercase">Обновить верх</button>
        </div>

        <div class="glass-panel p-5 space-y-3">
            <p class="text-[10px] font-black text-blue-500 uppercase">🔗 Реклама (Снизу)</p>
            <input id="ad-i" class="admin-input w-full" placeholder="Ссылка на фото">
            <input id="ad-t" class="admin-input w-full" placeholder="Текст рекламы">
            <input id="ad-l" class="admin-input w-full" placeholder="Ссылка кнопки">
            <button onclick="adUpdateContent('ad')" class="w-full py-3 bg-blue-600/20 text-blue-500 rounded-xl text-[10px] font-bold uppercase">Обновить низ</button>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-24 bg-black/80 backdrop-blur-3xl border-t border-white/5 flex justify-around items-center px-10 z-[100]">
        <button onclick="setTab('home')" id="btn-home" class="flex flex-col items-center gap-1"><i class="fa-solid fa-shop text-xl"></i><span class="text-[8px] font-bold uppercase">Магазин</span></button>
        <button onclick="setTab('me')" id="btn-me" class="flex flex-col items-center gap-1 opacity-30"><i class="fa-solid fa-user-astronaut text-xl"></i><span class="text-[8px] font-bold uppercase">Профиль</span></button>
    </nav>

    <script>
        // FIREBASE CONFIG (Твои данные)
        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:540bb07ec6bf97b9a78a00"
        };

        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        let db = { users: {}, prods: [], content: {} };
        let me = null;

        // Инициализация данных
        function init() {
            rdb.ref('dogx_v200').on('value', (s) => {
                db = s.val() || { users: {}, prods: [], content: {} };
                let uid = localStorage.getItem('dogx_uid');
                
                if(uid && db.users[uid]) {
                    me = db.users[uid];
                    render();
                } else {
                    showAuth();
                }
            });
        }

        // Главный рендер интерфейса
        function render() {
            if(!me) return;
            document.getElementById('u-bal').innerText = me.bal.toLocaleString() + '₽';
            document.getElementById('u-nick-display').innerText = me.nick;

            // Товары (Магазин)
            document.getElementById('product-list').innerHTML = (db.prods || []).map(p => `
                <div class="glass-panel p-6 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <h4 class="unbound text-[11px] font-black uppercase text-white">${p.name}</h4>
                            ${p.sale > 0 ? `<span class="bg-red-500 text-[8px] px-2 py-0.5 rounded-full font-bold">-${p.sale}%</span>` : ''}
                        </div>
                        <p class="text-[9px] opacity-40 mt-1 uppercase font-bold tracking-widest">${p.time} • <span class="text-indigo-400">${p.pr}₽</span></p>
                    </div>
                    <button onclick="buyProduct('${p.id}')" class="btn-primary px-7 py-4 text-[9px] uppercase tracking-widest">КУПИТЬ</button>
                </div>`).join('');

            // Ключи в профиле
            document.getElementById('my-keys').innerHTML = (me.items || []).map(i => `
                <div class="glass-panel p-5 border-l-4 border-indigo-600 bg-white/5">
                    <p class="text-[8px] opacity-40 uppercase font-bold tracking-tighter">${i.name}</p>
                    <p class="text-xs font-mono mt-1 text-white select-all">${i.key}</p>
                </div>`).join('');

            // Контент: Рассылка (Верх)
            const cBr = db.content?.br;
            if(cBr && cBr.text) {
                document.getElementById('broadcast-top').classList.remove('hidden');
                document.getElementById('br-text-top').innerText = cBr.text;
                document.getElementById('br-title-top').innerText = cBr.title || 'ОБЪЯВЛЕНИЕ';
                if(cBr.img) { 
                    document.getElementById('br-img-top').src = cBr.img; 
                    document.getElementById('br-img-top').classList.remove('hidden'); 
                } else { document.getElementById('br-img-top').classList.add('hidden'); }
                document.getElementById('br-link-top').href = cBr.link || '#';
            } else { document.getElementById('broadcast-top').classList.add('hidden'); }

            // Контент: Реклама (Низ)
            const cAd = db.content?.ad;
            if(cAd && cAd.text) {
                document.getElementById('ads-bottom').classList.remove('hidden');
                document.getElementById('ad-text-bot').innerText = cAd.text;
                if(cAd.img) { 
                    document.getElementById('ad-img-bot').src = cAd.img; 
                    document.getElementById('ad-img-bot').classList.remove('hidden'); 
                } else { document.getElementById('ad-img-bot').classList.add('hidden'); }
                document.getElementById('ad-link-bot').href = cAd.link || '#';
            } else { document.getElementById('ads-bottom').classList.add('hidden'); }

            renderAdmin();
        }

        // Рендер элементов админки
        function renderAdmin() {
            const users = Object.values(db.users || {});
            document.getElementById('admin-user-list').innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                    <span class="opacity-60">ID: <b>${u.id}</b> | ${u.nick} | <span class="text-indigo-300">P:${u.pass}</span></span>
                    <span class="font-bold text-indigo-400">${u.bal}₽</span>
                </div>`).join('');

            document.getElementById('admin-prod-list').innerHTML = (db.prods || []).map(p => `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="unbound text-[9px] font-bold text-white uppercase">${p.name}</span>
                        <button onclick="adDeleteTariff('${p.id}')" class="text-red-500 text-[9px] font-bold">УДАЛИТЬ</button>
                    </div>
                    <p class="text-[8px] opacity-40 uppercase">${p.pr}₽ | Скидка ${p.sale}% | ${p.time}</p>
                    <p class="text-[8px] font-mono mt-2 truncate opacity-20">Ключи: ${(p.stock || []).join(', ')}</p>
                </div>`).join('');
        }

        // Авторизация
        async function showAuth() {
            const { value: formValues } = await Swal.fire({
                title: 'DOG X AUTH',
                html: '<input id="sw-n" class="swal2-input admin-input" style="color:black !important" placeholder="Ник"><input id="sw-p" type="password" class="swal2-input admin-input" style="color:black !important" placeholder="Пароль">',
                background: '#010204', color: '#fff', confirmButtonText: 'ВОЙТИ',
                preConfirm: () => [document.getElementById('sw-n').value, document.getElementById('sw-p').value]
            });
            if(!formValues || !formValues[0]) return showAuth();
            
            let user = Object.values(db.users || {}).find(u => u.nick === formValues[0] && u.pass === formValues[1]);
            if(!user) {
                const id = Math.floor(1000 + Math.random() * 9000).toString();
                user = { id, nick: formValues[0], pass: formValues[1], bal: 0, items: [] };
                rdb.ref('dogx_v200/users/' + id).set(user);
            }
            localStorage.setItem('dogx_uid', user.id);
            location.reload();
        }

        // Покупка
        function buyProduct(pid) {
            const p = db.prods.find(x => x.id == pid);
            if(me.bal < p.pr) return Swal.fire('Мало средств', 'Пополни баланс у @sswckk', 'error');
            if(!p.stock?.length) return Swal.fire('Склад пуст', 'Ключи закончились', 'warning');
            
            const key = p.stock.shift();
            me.bal -= p.pr;
            if(!me.items) me.items = [];
            me.items.unshift({ name: p.name, key, date: new Date().toLocaleDateString() });
            
            rdb.ref('dogx_v200/users/' + me.id).update({ bal: me.bal, items: me.items });
            rdb.ref('dogx_v200/prods').set(db.prods);
            Swal.fire('Успешно', 'Ключ добавлен в профиль', 'success');
        }

        // Админ: Управление юзером
        async function adManageUser(type) {
            const targetId = document.getElementById('ad-u-id').value;
            if(!db.users[targetId]) return Swal.fire('Ошибка', 'ID не найден', 'error');

            if(type === 'bal') {
                const { value: amt } = await Swal.fire({ title: 'Баланс', input: 'number', background: '#111', color: '#fff' });
                if(amt) rdb.ref('dogx_v200/users/'+targetId).update({ bal: parseInt(amt) });
            }
            if(type === 'del') {
                rdb.ref('dogx_v200/users/'+targetId).remove();
            }
            if(type === 'id') {
                const { value: newId } = await Swal.fire({ title: 'Новый ID', input: 'text', background: '#111', color: '#fff' });
                if(newId) {
                    const userData = db.users[targetId];
                    userData.id = newId;
                    // Если это твой собственный аккаунт - обновляем ID в локалсторидже чтобы не вылетело
                    if(targetId === localStorage.getItem('dogx_uid')) {
                        localStorage.setItem('dogx_uid', newId);
                    }
                    rdb.ref('dogx_v200/users/'+newId).set(userData);
                    rdb.ref('dogx_v200/users/'+targetId).remove();
                    Swal.fire('Ок', 'ID изменен на ' + newId, 'success');
                }
            }
            if(type === 'login') {
                localStorage.setItem('dogx_uid', targetId);
                location.reload();
            }
        }

        // Админ: Создание тарифа
        async function adCreateTariff() {
            const { value: f } = await Swal.fire({
                title: 'Новый тариф',
                background: '#010204', color: '#fff',
                html: `
                    <input id="f-n" class="swal2-input admin-input" style="color:black !important" placeholder="Название">
                    <input id="f-p" type="number" class="swal2-input admin-input" style="color:black !important" placeholder="Цена">
                    <input id="f-s" type="number" class="swal2-input admin-input" style="color:black !important" placeholder="Скидка %">
                    <input id="f-t" class="swal2-input admin-input" style="color:black !important" placeholder="Срок">
                    <textarea id="f-k" class="swal2-input admin-input" style="color:black !important" placeholder="Ключи через запятую"></textarea>
                `,
                preConfirm: () => ({
                    id: Date.now().toString(),
                    name: document.getElementById('f-n').value,
                    pr: parseInt(document.getElementById('f-p').value),
                    sale: parseInt(document.getElementById('f-s').value) || 0,
                    time: document.getElementById('f-t').value,
                    stock: document.getElementById('f-k').value.split(',').map(k => k.trim()).filter(k => k)
                })
            });
            if(f && f.name) {
                if(!db.prods) db.prods = [];
                db.prods.push(f);
                rdb.ref('dogx_v200/prods').set(db.prods);
            }
        }

        function adDeleteTariff(pid) {
            db.prods = db.prods.filter(x => x.id !== pid);
            rdb.ref('dogx_v200/prods').set(db.prods);
        }

        // Админ: Обновление Рекламы / Рассылки
        function adUpdateContent(type) {
            const img = document.getElementById(type + '-i').value;
            const text = document.getElementById(type + '-t').value;
            const link = document.getElementById(type + '-l').value;
            
            rdb.ref('dogx_v200/content/' + type).set({
                img, text, link, title: type === 'br' ? 'РАССЫЛКА' : 'РЕКЛАМА'
            });
            Swal.fire('Успешно', 'Контент обновлен в облаке', 'success');
        }

        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            if(t === 'home' || t === 'me') document.getElementById('btn-' + t).classList.remove('opacity-30');
        }

        function showPay() { 
            Swal.fire({
                title: 'ID: ' + me.id,
                text: 'Отправьте ваш ID админу @sswckk для пополнения баланса',
                icon: 'info', background: '#111', color: '#fff'
            }); 
        }

        // Старт
        init();
    </script>
</body>
</html>
