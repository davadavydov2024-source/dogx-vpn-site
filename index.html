<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG X | Авто-Выдача</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --accent: #3b82f6; --bg: #f8fafc; --card: #ffffff; }
        body.dark { --bg: #0f172a; --card: #1e293b; --glow: rgba(59, 130, 246, 0.4); }
        body { background-color: var(--bg); font-family: 'Manrope', sans-serif; transition: 0.3s; }
        .ui-card { background: var(--card); border-radius: 28px; border: 1px solid rgba(0,0,0,0.05); }
        .btn-anim { transition: 0.2s; }
        .btn-anim:hover { transform: scale(1.03); filter: brightness(1.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-10 p-4 ui-card">
        <div class="font-black text-xl italic">DOG <span class="text-blue-500">X</span></div>
        <div class="flex gap-6 text-[10px] font-black uppercase tracking-widest">
            <button onclick="tab('home')">Магазин</button>
            <button onclick="tab('me')">Кабинет</button>
            <button id="admBtn" onclick="tab('admin')" class="hidden text-red-500">Админ</button>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="ui-card p-10 flex flex-col justify-between">
                <h3 class="text-[10px] font-black opacity-30 uppercase mb-4 italic">Пробный</h3>
                <div id="pr1" class="text-5xl font-black mb-8">10₽</div>
                <button onclick="buy(0)" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold btn-anim">КУПИТЬ</button>
            </div>
            </div>
    </main>

    <section id="me" class="tab-content max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="ui-card p-8 text-center">
                <div class="text-3xl font-black text-blue-500 mb-2" id="bal">0.00₽</div>
                <div class="flex gap-2 mb-6">
                    <button onclick="topUp()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black btn-anim">ПОПОЛНИТЬ</button>
                    <button onclick="toggleTheme()" class="px-4 bg-slate-100 dark:bg-slate-700 rounded-xl"><i class="fas fa-moon"></i></button>
                </div>
                <input type="text" id="promoInput" placeholder="Промокод" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-xl text-xs mb-2 outline-none">
                <button onclick="usePromo()" class="w-full py-2 text-[10px] font-bold opacity-40 hover:opacity-100 transition">АКТИВИРОВАТЬ КОД</button>
                <hr class="my-6 opacity-5">
                <input type="password" id="admKey" placeholder="..." class="w-full bg-transparent text-center text-[8px] outline-none opacity-10 focus:opacity-100" oninput="checkAdmin()">
            </div>
            <div class="md:col-span-2 ui-card p-8">
                <h3 class="text-xs font-black opacity-30 uppercase mb-6 tracking-widest">Мои ключи</h3>
                <div id="keysList" class="space-y-4"></div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-5xl mx-auto">
        <div class="ui-card p-8">
            <h2 class="font-black text-red-500 mb-6 uppercase">Склад ключей (каждый с новой строки)</h2>
            <textarea id="keyStorage" class="w-full h-48 p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl font-mono text-[10px] outline-none border focus:border-blue-500" placeholder="Вставь сюда happ://..."></textarea>
            <div class="mt-6 grid grid-cols-2 gap-4">
                <button onclick="saveAdmin()" class="py-4 bg-blue-600 text-white rounded-2xl font-black btn-anim">СОХРАНИТЬ СКЛАД</button>
                <button onclick="addMoneyPromo()" class="py-4 bg-slate-900 text-white rounded-2xl font-black btn-anim">СОЗДАТЬ ПРОМОКОД</button>
            </div>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_v9_db')) || {
            prices: [10, 250, 1000], card: "sswckk (Карта)", rate: 1.5,
            stock: [], // Сюда будем сохранять твои happ:// ключи
            promos: []
        };
        let user = JSON.parse(localStorage.getItem('dog_v9_user')) || { name: "User", bal: 0, keys: [] };

        window.onload = () => { 
            if(localStorage.getItem('dog_theme') === 'dark') document.body.classList.add('dark');
            sync(); 
        };

        function sync() {
            document.getElementById('bal').innerText = user.bal.toFixed(2) + '₽';
            document.getElementById('keyStorage').value = db.stock.join('\n');
            renderKeys();
        }

        function buy(idx) {
            const cost = db.prices[idx];
            Swal.fire({
                title: 'КУПИТЬ ТАРИФ?',
                text: `С баланса спишется ${cost}₽`,
                showCancelButton: true,
                confirmButtonText: 'ОПЛАТИТЬ',
                cancelButtonText: 'ОТМЕНА'
            }).then((res) => {
                if(res.isConfirmed) {
                    if(user.bal >= cost) {
                        // Пытаемся взять ключ из склада
                        if(db.stock.length > 0) {
                            let rawKey = db.stock.shift(); // Забираем первый ключ
                            // Переименовываем под наш бренд
                            let brandedKey = rawKey.split('#')[0] + "#DOG_X_VPN_" + Math.floor(Math.random()*9000);
                            
                            user.bal -= cost;
                            user.keys.unshift(brandedKey);
                            save();
                            Swal.fire('Успешно!', 'Ключ добавлен в кабинет', 'success').then(() => location.reload());
                        } else {
                            Swal.fire('Склад пуст', 'Ключи закончились. Напишите @sswckk, он выдаст ключ вручную!', 'warning');
                        }
                    } else {
                        Swal.fire('Ошибка', 'Недостаточно средств. Пополните баланс в кабинете.', 'error');
                    }
                }
            });
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            if(user.keys.length === 0) {
                list.innerHTML = `<p class="text-center opacity-20 py-10">Пока тут пусто...</p>`;
                return;
            }
            list.innerHTML = user.keys.map(k => `
                <div class="p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl flex justify-between items-center border border-black/5">
                    <p class="text-[9px] font-mono truncate mr-4 opacity-50">${k}</p>
                    <button onclick="navigator.clipboard.writeText('${k}'); Swal.fire('Скопировано!','','success')" class="text-blue-500 font-black text-xs">COPY</button>
                </div>
            `).join('');
        }

        function topUp() {
            Swal.fire({
                title: 'ПОПОЛНЕНИЕ',
                html: `<p class="text-xs mb-4">Переведи нужную сумму на карту:</p><b class="text-lg">${db.card}</b><p class="text-[10px] mt-4 opacity-50 italic text-red-500">ОБЯЗАТЕЛЬНО: пришли чек в ТГ @sswckk</p>`,
                confirmButtonText: 'Я ОПЛАТИЛ'
            });
        }

        function checkAdmin() {
            if(document.getElementById('admKey').value === '67АРТЁМ67') {
                document.getElementById('admBtn').classList.remove('hidden');
            }
        }

        function saveAdmin() {
            const lines = document.getElementById('keyStorage').value.split('\n');
            db.stock = lines.filter(l => l.trim().length > 10); // Убираем пустые строки
            save();
            Swal.fire('Сохранено', `В складе теперь ${db.stock.length} ключей`, 'success');
        }

        function save() {
            localStorage.setItem('dog_v9_db', JSON.stringify(db));
            localStorage.setItem('dog_v9_user', JSON.stringify(user));
        }

        function tab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('dog_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        // Функции для промокодов (упрощено для примера)
        function usePromo() {
            const code = document.getElementById('promoInput').value.toUpperCase();
            const i = db.promos.findIndex(p => p.code === code);
            if(i !== -1) {
                user.bal += db.promos[i].val;
                db.promos.splice(i, 1);
                save();
                Swal.fire('Успех!', 'Баланс пополнен!', 'success').then(() => location.reload());
            } else Swal.fire('Ошибка', 'Неверный код', 'error');
        }
        
        function addMoneyPromo() {
            Swal.fire({
                title: 'НОВЫЙ ПРОМО',
                html: `<input id="pC" placeholder="КОД" class="swal2-input"><input id="pV" type="number" placeholder="СУММА" class="swal2-input">`,
                preConfirm: () => {
                    db.promos.push({ code: document.getElementById('pC').value.toUpperCase(), val: parseInt(document.getElementById('pV').value) });
                    save();
                }
            });
        }
    </script>
</body>
</html>
