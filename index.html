<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Ultimate Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const app = initializeApp(firebaseConfig);
        const db_firebase = getDatabase(app);

        window.db = {};
        window.allUsers = {};
        window.user = JSON.parse(localStorage.getItem('dog_v29_me')) || null;

        const dbRef = ref(db_firebase, 'dog_system_db');
        const usersRef = ref(db_firebase, 'dog_users');

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.db = data;
                renderProducts();
                renderGlobalBC();
                renderFooterAd();
                if(document.getElementById('admin').classList.contains('active')) loadAdmin();
            } else {
                const initialDb = {
                    products: [{ id: Date.now(), name: "START", pr: 150, h: 720, icon: "🛡️", discount: 0 }],
                    promos: [],
                    broadcast: { text: "", img: "", active: false, url: "", btnText: "" },
                    footerAd: { text: "", img: "", active: false, url: "", btnText: "" }
                };
                set(dbRef, initialDb);
            }
        });

        onValue(usersRef, (snapshot) => {
            window.allUsers = snapshot.val() || {};
            if (window.user && window.allUsers[window.user.id]) {
                window.user = window.allUsers[window.user.id];
                localStorage.setItem('dog_v29_me', JSON.stringify(window.user));
                updateUI();
            }
        });

        window.saveSystem = () => set(dbRef, window.db);
        window.saveUser = (u) => set(ref(db_firebase, 'dog_users/' + u.id), u);
        window.updateAllUsers = () => set(usersRef, window.allUsers);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .discount-badge { position: absolute; top: 0; right: 0; background: #ef4444; color: white; padding: 2px 8px; font-size: 8px; font-weight: 900; border-bottom-left-radius: 10px; }
        .footer-ad { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: var(--card); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px; display: none; }
    </style>
</head>
<body class="pb-40">

    <div id="globalBC" class="max-w-xl mx-auto m-4 hidden">
        <div class="player-card border border-amber-500/30 p-4 flex items-center gap-4">
            <img id="bcImgDisplay" src="" class="w-12 h-12 rounded-lg object-cover hidden">
            <div class="flex-1">
                <p id="bcTextDisplay" class="text-[11px] font-bold"></p>
                <div id="bcBtnBox" class="mt-2"></div>
            </div>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div><div class="text-2xl font-extrabold text-blue-500 italic uppercase">Dog X</div><div id="userDisplay" class="text-[9px] opacity-40">...</div></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-xs font-bold opacity-60">Маркет</button>
            <button onclick="showTab('me')" class="text-xs font-bold opacity-60">Профиль</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-xs font-bold uppercase">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <h2 class="text-xl font-extrabold italic">Тарифы</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center border-b-4 border-blue-600/20">
            <p class="text-[10px] opacity-40 uppercase mb-2">Мой Баланс</p>
            <h3 class="text-5xl font-extrabold text-blue-500" id="userBal">0.00₽</h3>
            <div class="mt-6"><button onclick="topUp()" class="w-full py-4 btn-primary text-xs uppercase italic">Пополнить баланс</button></div>
        </div>
        <div id="keysList" class="space-y-3"></div>
        <input type="text" id="promoInp" placeholder="Промокод или Пароль" class="w-full p-4 player-card bg-transparent text-center text-sm">
        <button onclick="checkInput()" class="w-full py-4 btn-primary bg-white/5 text-[10px] uppercase">Проверить</button>
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6 border border-red-500/20">
            <h2 class="text-red-500 font-black uppercase text-center text-sm">Управление проектом</h2>
            
            <div class="p-4 bg-amber-500/5 rounded-2xl space-y-3">
                <p class="text-[10px] font-bold text-amber-500 uppercase">Настройка Рассылки (Верх)</p>
                <textarea id="adm_bc_text" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Текст рассылки"></textarea>
                <input id="adm_bc_btn" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Текст кнопки">
                <input id="adm_bc_url" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Ссылка (https://...)">
                <button onclick="document.getElementById('bc_file').click()" class="w-full py-2 bg-white/5 text-[10px] rounded">ВЫБРАТЬ ФОТО</button>
                <input type="file" id="bc_file" class="hidden" accept="image/*" onchange="handleImgUpload(this, 'bc')">
                <button onclick="toggleStatus('bc')" id="bc_status_btn" class="w-full py-2 bg-amber-600/20 text-amber-500 text-[10px] font-bold rounded uppercase">Статус: ВЫКЛ</button>
            </div>

            <div class="p-4 bg-blue-500/5 rounded-2xl space-y-3">
                <p class="text-[10px] font-bold text-blue-400 uppercase">Настройка Рекламы (Низ)</p>
                <textarea id="adm_ad_text" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Текст рекламы"></textarea>
                <input id="adm_ad_btn" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Текст кнопки">
                <input id="adm_ad_url" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Ссылка (https://...)">
                <button onclick="document.getElementById('ad_file').click()" class="w-full py-2 bg-white/5 text-[10px] rounded">ВЫБРАТЬ ФОТО</button>
                <input type="file" id="ad_file" class="hidden" accept="image/*" onchange="handleImgUpload(this, 'ad')">
                <button onclick="toggleStatus('ad')" id="ad_status_btn" class="w-full py-2 bg-blue-600/20 text-blue-400 text-[10px] font-bold rounded uppercase">Статус: ВЫКЛ</button>
            </div>

            <div class="p-4 bg-white/5 rounded-2xl space-y-2">
                <p class="text-[10px] font-bold text-blue-400">БАЛАНС ПО ID</p>
                <input id="adm_uid" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="ID Юзера">
                <input id="adm_sum" type="number" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Сумма (+/-)">
                <button onclick="adminChangeBalance()" class="w-full py-2 bg-blue-600 rounded text-[10px] font-bold">ОБНОВИТЬ</button>
            </div>

            <div class="p-4 bg-white/5 rounded-2xl space-y-2">
                <p class="text-[10px] font-bold text-green-400 uppercase italic">Промокод</p>
                <input id="adm_promo_name" class="w-full p-2 bg-black/20 rounded text-xs uppercase" placeholder="Название">
                <input id="adm_promo_val" type="number" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Сумма">
                <button onclick="adminCreatePromo()" class="w-full py-2 bg-green-600 rounded text-[10px] font-bold">СОЗДАТЬ</button>
            </div>

            <div id="admin_stocks" class="space-y-4"></div>
            <button onclick="addTariff()" class="w-full py-4 border-2 border-dashed border-white/10 rounded-2xl text-[10px] opacity-40 uppercase">+ Новый тариф</button>

            <button onclick="saveAdmin()" class="w-full py-6 btn-primary bg-red-600 text-sm font-black italic uppercase">Сохранить всё в облако</button>
        </div>
    </section>

    <div id="footerAd" class="footer-ad">
        <div class="max-w-xl mx-auto flex items-center gap-4">
            <img id="adImgDisplay" src="" class="w-10 h-10 rounded-lg object-cover hidden">
            <p id="adTextDisplay" class="text-[11px] font-bold flex-1"></p>
            <div id="adBtnBox"></div>
        </div>
    </div>

    <script>
        function updateUI() {
            if(!window.user) { initUser(); return; }
            document.getElementById('userDisplay').innerText = `${window.user.nick} | #${window.user.id}`;
            document.getElementById('userBal').innerText = window.user.bal.toFixed(2) + '₽';
            renderKeys();
        }

        async function initUser() {
            const { value: nick } = await Swal.fire({ title: 'ТВОЙ НИК', input: 'text', background: '#191c24', color: '#fff' });
            if(!nick) return initUser();
            const id = Math.floor(1000 + Math.random() * 8999);
            window.user = { id, nick, bal: 0, keys: [] };
            localStorage.setItem('dog_v29_me', JSON.stringify(window.user));
            window.saveUser(window.user);
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if(!window.db.products) return;
            grid.innerHTML = window.db.products.map(p => {
                const disc = parseInt(p.discount) || 0;
                const finalPrice = disc > 0 ? p.pr - (p.pr * (disc / 100)) : p.pr;
                return `
                <div class="player-card p-5 flex justify-between items-center relative overflow-hidden">
                    ${disc > 0 ? `<div class="discount-badge">-${disc}%</div>` : ''}
                    <div class="flex items-center gap-4"><div class="text-3xl">${p.icon || '🛡️'}</div><div><h4 class="font-bold text-xs uppercase">${p.name}</h4><p class="text-[9px] opacity-40">${p.h} часов</p></div></div>
                    <div class="text-right">
                        ${disc > 0 ? `<p class="text-[8px] opacity-30 line-through">${p.pr}₽</p>` : ''}
                        <button onclick="buyKey(${p.id})" class="px-6 py-2 btn-primary text-[10px] uppercase font-black">${finalPrice.toFixed(0)}₽</button>
                    </div>
                </div>
            `}).join('');
        }

        function loadAdmin() {
            const bc = window.db.broadcast || {};
            const ad = window.db.footerAd || {};
            
            document.getElementById('adm_bc_text').value = bc.text || "";
            document.getElementById('adm_bc_btn').value = bc.btnText || "";
            document.getElementById('adm_bc_url').value = bc.url || "";
            document.getElementById('bc_status_btn').innerText = bc.active ? "Статус: ВКЛ" : "Статус: ВЫКЛ";

            document.getElementById('adm_ad_text').value = ad.text || "";
            document.getElementById('adm_ad_btn').value = ad.btnText || "";
            document.getElementById('adm_ad_url').value = ad.url || "";
            document.getElementById('ad_status_btn').innerText = ad.active ? "Статус: ВКЛ" : "Статус: ВЫКЛ";

            document.getElementById('admin_stocks').innerHTML = window.db.products.map(p => `
                <div class="p-4 bg-white/5 rounded-2xl space-y-3 border-l-2 border-blue-500">
                    <div class="flex gap-2">
                        <input id="p_i_${p.id}" value="${p.icon || '🛡️'}" class="bg-black/40 rounded p-1 w-10 text-center">
                        <input id="p_n_${p.id}" value="${p.name}" class="bg-black/40 rounded p-1 text-[10px] font-bold flex-1 uppercase">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <input id="p_p_${p.id}" value="${p.pr}" class="bg-black/40 rounded p-1 text-[10px]">
                        <input id="p_h_${p.id}" value="${p.h}" class="bg-black/40 rounded p-1 text-[10px]">
                        <input id="p_d_${p.id}" value="${p.discount || 0}" class="bg-black/40 rounded p-1 text-[10px] text-red-400">
                    </div>
                    <button onclick="deleteProduct(${p.id})" class="w-full py-1 text-[8px] text-red-500 opacity-50 uppercase">Удалить</button>
                </div>
            `).join('');
        }

        function toggleStatus(type) {
            if(type === 'bc') window.db.broadcast.active = !window.db.broadcast.active;
            if(type === 'ad') window.db.footerAd.active = !window.db.footerAd.active;
            loadAdmin();
        }

        function handleImgUpload(input, type) {
            const reader = new FileReader();
            reader.onload = () => {
                if(type === 'bc') window.db.broadcast.img = reader.result;
                if(type === 'ad') window.db.footerAd.img = reader.result;
                Swal.fire('Загружено', 'Фото добавлено в черновик', 'success');
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveAdmin() {
            window.db.broadcast.text = document.getElementById('adm_bc_text').value;
            window.db.broadcast.btnText = document.getElementById('adm_bc_btn').value;
            window.db.broadcast.url = document.getElementById('adm_bc_url').value;

            window.db.footerAd.text = document.getElementById('adm_ad_text').value;
            window.db.footerAd.btnText = document.getElementById('adm_ad_btn').value;
            window.db.footerAd.url = document.getElementById('adm_ad_url').value;

            window.db.products.forEach(p => {
                p.icon = document.getElementById(`p_i_${p.id}`).value;
                p.name = document.getElementById(`p_n_${p.id}`).value;
                p.pr = parseInt(document.getElementById(`p_p_${p.id}`).value);
                p.h = parseInt(document.getElementById(`p_h_${p.id}`).value);
                p.discount = parseInt(document.getElementById(`p_d_${p.id}`).value) || 0;
            });
            window.saveSystem();
            Swal.fire('СИНХРОНИЗАЦИЯ', 'Данные в облаке обновлены', 'success');
        }

        function renderGlobalBC() {
            const bc = window.db.broadcast;
            const box = document.getElementById('globalBC');
            if(bc && bc.active) {
                box.classList.remove('hidden');
                document.getElementById('bcTextDisplay').innerText = bc.text;
                const img = document.getElementById('bcImgDisplay');
                if(bc.img) { img.src = bc.img; img.classList.remove('hidden'); } else { img.classList.add('hidden'); }
                const btnBox = document.getElementById('bcBtnBox');
                btnBox.innerHTML = bc.btnText ? `<button onclick="window.open('${bc.url}', '_blank')" class="bg-amber-500 text-black px-4 py-1 rounded-lg text-[9px] font-black uppercase">${bc.btnText}</button>` : "";
            } else { box.classList.add('hidden'); }
        }

        function renderFooterAd() {
            const ad = window.db.footerAd;
            const box = document.getElementById('footerAd');
            if(ad && ad.active) {
                box.style.display = 'block';
                document.getElementById('adTextDisplay').innerText = ad.text;
                const img = document.getElementById('adImgDisplay');
                if(ad.img) { img.src = ad.img; img.classList.remove('hidden'); } else { img.classList.add('hidden'); }
                const btnBox = document.getElementById('adBtnBox');
                btnBox.innerHTML = ad.btnText ? `<button onclick="window.open('${ad.url}', '_blank')" class="bg-blue-500 text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase">${ad.btnText}</button>` : "";
            } else { box.style.display = 'none'; }
        }

        function adminChangeBalance() {
            const uid = document.getElementById('adm_uid').value;
            const sum = parseFloat(document.getElementById('adm_sum').value);
            if(!window.allUsers[uid]) return Swal.fire('Ошибка', 'Юзер не найден', 'error');
            window.allUsers[uid].bal += sum;
            window.updateAllUsers();
            Swal.fire('Успех', 'Баланс обновлен', 'success');
        }

        function adminCreatePromo() {
            const name = document.getElementById('adm_promo_name').value.toUpperCase();
            const val = parseFloat(document.getElementById('adm_promo_val').value);
            if(!window.db.promos) window.db.promos = [];
            window.db.promos.push({ code: name, sum: val });
            window.saveSystem();
            Swal.fire('Промокод создан', name, 'success');
        }

        function checkInput() {
            const val = document.getElementById('promoInp').value.trim();
            if(val === 'kalubxq') {
                document.getElementById('adminBtn').classList.remove('hidden');
                return Swal.fire('ADMIN', 'Доступ открыт', 'success');
            }
            if(window.db.promos) {
                const promo = window.db.promos.find(p => p.code === val.toUpperCase());
                if(promo) {
                    window.user.bal += promo.sum;
                    window.saveUser(window.user);
                    window.db.promos = window.db.promos.filter(p => p.code !== val.toUpperCase());
                    window.saveSystem();
                    return Swal.fire('Бонус!', `+${promo.sum}₽ на счет`, 'success');
                }
            }
            Swal.fire('Ошибка', 'Неверный код', 'error');
        }

        function buyKey(id) {
            const p = window.db.products.find(x => x.id === id);
            const disc = p.discount || 0;
            const price = disc > 0 ? p.pr - (p.pr * (disc / 100)) : p.pr;
            if(window.user.bal < price) return Swal.fire('Ошибка', 'Недостаточно баланса', 'error');
            window.user.bal -= price;
            if(!window.user.keys) window.user.keys = [];
            window.user.keys.unshift({ name: p.name, key: "DOG-" + Math.random().toString(36).substr(2, 9).toUpperCase() });
            window.saveUser(window.user);
            Swal.fire('Успех', 'Ключ добавлен в профиль', 'success');
        }

        function deleteProduct(id) {
            window.db.products = window.db.products.filter(p => p.id !== id);
            loadAdmin();
        }

        function addTariff() {
            window.db.products.push({ id: Date.now(), name: "NEW", pr: 100, h: 24, icon: "⚡", discount: 0 });
            loadAdmin();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'admin') loadAdmin();
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            if(!window.user.keys || window.user.keys.length === 0) {
                list.innerHTML = `<p class="text-center opacity-20 text-[10px] uppercase italic">У вас нет активных ключей</p>`;
                return;
            }
            list.innerHTML = window.user.keys.map(k => `
                <div class="player-card p-4 border-l-2 border-blue-500">
                    <p class="text-[9px] font-bold opacity-40 mb-1 uppercase">${k.name}</p>
                    <div class="bg-black/20 p-2 rounded text-[11px] font-mono select-all">${k.key}</div>
                </div>
            `).join('');
        }

        function topUp() { Swal.fire('Оплата', 'Свяжитесь с админом @sswckk', 'info'); }
    </script>
</body>
</html>
