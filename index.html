<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG X VPN | Admin Authority</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap');
        :root { --neon: #4ade80; --bg: #030712; --panel: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        .sync { font-family: 'Syncopate', sans-serif; }
        .glass { background: var(--panel); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .neon-shadow { box-shadow: 0 0 20px rgba(74, 222, 128, 0.2); }
        .admin-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,0,0,0.2); color: #ff4d4d; font-family: monospace; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        tr:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="p-4">

    <div id="authOverlay" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center hidden">
        <div class="glass p-12 max-w-md w-full text-center border-green-500/20">
            <h2 class="sync text-xl mb-8 tracking-widest text-green-400">INITIALIZING...</h2>
            <input type="text" id="regName" placeholder="IDENTIFIER" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-4 text-center uppercase tracking-widest">
            <button onclick="register()" class="w-full bg-green-500 text-black font-black py-4 rounded-xl hover:scale-105 transition">ENTER SYSTEM</button>
        </div>
    </div>

    <nav class="max-w-7xl mx-auto flex justify-between items-center py-6 mb-10 border-b border-white/5">
        <div class="sync text-2xl font-bold italic tracking-tighter">DOG <span class="text-green-400">X</span></div>
        <div class="flex gap-8 items-center uppercase text-[10px] font-bold tracking-[0.3em]">
            <button onclick="showTab('market')" class="hover:text-green-400">Market</button>
            <button onclick="showTab('profile')" class="hover:text-green-400">Profile</button>
            <button onclick="openAdmin()" class="text-red-500 border border-red-500/30 px-3 py-1 rounded">Admin Terminal</button>
        </div>
    </nav>

    <main id="market" class="tab-content active max-w-7xl mx-auto">
        <div class="text-center py-20">
            <h1 class="text-7xl md:text-9xl font-black italic mb-6 leading-none">NO <span class="text-green-400">LIMITS.</span></h1>
            <p id="globalAlert" class="text-red-500 animate-pulse font-bold text-xs uppercase tracking-widest"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
            <div class="glass p-10 relative">
                <p class="opacity-30 text-[10px] mb-4 uppercase">Basic Access</p>
                <div id="price1_display" class="text-6xl font-black mb-8 italic">10₽</div>
                <button onclick="buy(1)" class="w-full py-4 bg-white/5 border border-white/10 rounded-xl hover:bg-green-400 hover:text-black transition font-bold">ACTIVATE</button>
            </div>
            <div class="glass p-10 border-green-400/40 neon-shadow">
                <p class="text-green-400 text-[10px] mb-4 uppercase font-bold">Most Popular</p>
                <div id="price2_display" class="text-6xl font-black mb-8 italic">250₽</div>
                <button onclick="buy(2)" class="w-full py-4 bg-green-400 text-black rounded-xl font-bold">ACTIVATE PRO</button>
            </div>
            <div class="glass p-10">
                <p class="opacity-30 text-[10px] mb-4 uppercase">Elite Access</p>
                <div id="price3_display" class="text-6xl font-black mb-8 italic">1000₽</div>
                <button onclick="buy(3)" class="w-full py-4 bg-white/5 border border-white/10 rounded-xl hover:bg-green-400 hover:text-black transition font-bold">ACTIVATE ELITE</button>
            </div>
        </div>
    </main>

    <section id="profile" class="tab-content max-w-4xl mx-auto">
        <div class="glass p-12 flex flex-col md:flex-row gap-12 items-center">
            <div class="text-center">
                <div class="w-32 h-32 bg-green-400 rounded-full flex items-center justify-center text-5xl text-black font-black mb-4 shadow-2xl">A</div>
                <h2 id="uName" class="text-3xl font-black italic">ARTYOM</h2>
                <div id="uBalance" class="text-green-400 font-mono mt-2">Баланс: 0₽</div>
                <button onclick="addBalance()" class="mt-4 text-[10px] opacity-40 hover:opacity-100 underline">ПОПОЛНИТЬ</button>
            </div>
            <div class="flex-grow space-y-4">
                <div class="bg-white/5 p-6 rounded-2xl">
                    <p class="text-[10px] uppercase opacity-40 mb-1">Status</p>
                    <p id="uStatus" class="font-bold text-xl italic tracking-widest text-green-400">ACTIVE</p>
                </div>
                <div class="bg-white/5 p-6 rounded-2xl">
                    <p class="text-[10px] uppercase opacity-40 mb-1">Promo Active</p>
                    <input type="text" id="promoInput" placeholder="ENTER CODE" class="bg-transparent border-b border-white/10 w-full py-2 outline-none focus:border-green-400 transition">
                    <button onclick="applyPromo()" class="text-[10px] mt-2 text-green-400 font-bold uppercase">Apply</button>
                </div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-12">
            <h1 class="sync text-4xl text-red-500 italic">SYSTEM_CONTROL</h1>
            <button onclick="logout()" class="text-xs opacity-30 hover:opacity-100">LOGOUT_ROOT</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass p-8 border-red-500/20">
                <h3 class="text-red-500 font-bold mb-6 text-sm uppercase italic">Prices_Config</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] opacity-50">Price 1 (Lite)</label>
                        <input type="number" id="cfgPrice1" class="w-full admin-input p-3 rounded mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] opacity-50">Price 2 (Pro)</label>
                        <input type="number" id="cfgPrice2" class="w-full admin-input p-3 rounded mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] opacity-50">Price 3 (Elite)</label>
                        <input type="number" id="cfgPrice3" class="w-full admin-input p-3 rounded mt-1">
                    </div>
                    <button onclick="savePrices()" class="w-full bg-red-600/20 border border-red-600 text-red-500 py-3 rounded font-bold hover:bg-red-600 hover:text-white transition">UPDATE_PRICES</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="glass p-8">
                    <h3 class="text-blue-400 font-bold mb-6 text-sm uppercase italic">Global_Broadcast</h3>
                    <textarea id="broadcastMsg" placeholder="Введите текст для всех пользователей..." class="w-full bg-black/40 border border-blue-500/30 p-4 rounded-xl text-sm min-h-[100px] outline-none"></textarea>
                    <button onclick="sendBroadcast()" class="mt-4 px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:shadow-[0_0_20px_rgba(37,99,235,0.4)] transition uppercase text-xs">Push Notification</button>
                </div>

                <div class="glass p-8">
                    <h3 class="text-yellow-400 font-bold mb-6 text-sm uppercase italic">Promo_Generator</h3>
                    <div class="flex gap-4">
                        <input type="text" id="newPromoName" placeholder="CODE" class="bg-black/40 border border-yellow-500/30 p-3 rounded-lg flex-grow uppercase font-mono">
                        <input type="number" id="newPromoPct" placeholder="%" class="bg-black/40 border border-yellow-500/30 p-3 rounded-lg w-24 text-center">
                        <button onclick="addPromo()" class="bg-yellow-500 text-black px-6 py-3 rounded-lg font-bold uppercase text-xs">Create</button>
                    </div>
                    <div id="promoList" class="mt-4 flex flex-wrap gap-2">
                        </div>
                </div>
            </div>
        </div>

        <div class="glass mt-8 overflow-hidden">
            <table class="w-full text-left text-xs italic">
                <thead class="bg-white/5 uppercase opacity-50">
                    <tr>
                        <th class="p-5">User</th>
                        <th class="p-5">Balance</th>
                        <th class="p-5">Status</th>
                        <th class="p-5">Actions</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    </tbody>
            </table>
        </div>
    </section>

    <script>
        // Изначальный конфиг (если в памяти пусто)
        let config = JSON.parse(localStorage.getItem('vpn_config')) || {
            prices: [10, 250, 1000],
            promos: [{name: 'DOGX', pct: 15}],
            announcement: "СИСТЕМА РАБОТАЕТ В ШТАТНОМ РЕЖИМЕ"
        };

        let user = JSON.parse(localStorage.getItem('vpn_user')) || null;

        window.onload = () => {
            if(!user) {
                document.getElementById('authOverlay').classList.remove('hidden');
            } else {
                refreshUI();
            }
        };

        function register() {
            const n = document.getElementById('regName').value;
            if(n.length < 2) return;
            user = { name: n, balance: 0, status: 'FREE', history: [] };
            localStorage.setItem('vpn_user', JSON.stringify(user));
            location.reload();
        }

        function refreshUI() {
            // Цены на главной
            document.getElementById('price1_display').innerText = config.prices[0] + '₽';
            document.getElementById('price2_display').innerText = config.prices[1] + '₽';
            document.getElementById('price3_display').innerText = config.prices[2] + '₽';
            
            // Профиль
            document.getElementById('uName').innerText = user.name.toUpperCase();
            document.getElementById('uBalance').innerText = `БАЛАНС: ${user.balance}₽`;
            document.getElementById('uStatus').innerText = user.status;
            
            // Админка значения
            document.getElementById('cfgPrice1').value = config.prices[0];
            document.getElementById('cfgPrice2').value = config.prices[1];
            document.getElementById('cfgPrice3').value = config.prices[2];
            document.getElementById('globalAlert').innerText = config.announcement;

            renderUsers();
            renderPromos();
        }

        // АДМИН ФУНКЦИИ
        function openAdmin() {
            Swal.fire({
                title: 'TERMINAL_AUTH',
                input: 'password',
                confirmButtonColor: '#ef4444',
                background: '#030712',
                color: '#fff'
            }).then(r => {
                if(r.value === 'admin') {
                    showTab('admin');
                } else {
                    Swal.fire('ERROR', 'INVALID_ROOT_PASS', 'error');
                }
            });
        }

        function savePrices() {
            config.prices = [
                parseInt(document.getElementById('cfgPrice1').value),
                parseInt(document.getElementById('cfgPrice2').value),
                parseInt(document.getElementById('cfgPrice3').value)
            ];
            saveConfig();
            Swal.fire('SUCCESS', 'PRICES_UPDATED', 'success');
            refreshUI();
        }

        function sendBroadcast() {
            config.announcement = document.getElementById('broadcastMsg').value.toUpperCase();
            saveConfig();
            Swal.fire('PUSHED', 'ALL USERS WILL SEE THIS', 'info');
            refreshUI();
        }

        function addPromo() {
            const n = document.getElementById('newPromoName').value.toUpperCase();
            const p = parseInt(document.getElementById('newPromoPct').value);
            if(!n || !p) return;
            config.promos.push({name: n, pct: p});
            saveConfig();
            renderPromos();
        }

        function applyPromo() {
            const code = document.getElementById('promoInput').value.toUpperCase();
            const found = config.promos.find(p => p.name === code);
            if(found) {
                Swal.fire('PROMO_OK', `Скидка ${found.pct}% применена на следующую покупку`, 'success');
                user.discount = found.pct;
                localStorage.setItem('vpn_user', JSON.stringify(user));
            } else {
                Swal.fire('ERROR', 'CODE_NOT_FOUND', 'error');
            }
        }

        function buy(id) {
            let price = config.prices[id-1];
            if(user.discount) {
                price = Math.floor(price * (1 - user.discount/100));
            }

            if(user.balance < price) return Swal.fire('NO_MONEY', 'TOP UP BALANCE', 'error');

            user.balance -= price;
            user.status = id === 1 ? 'LITE' : (id === 2 ? 'PRO' : 'ELITE');
            user.discount = 0; // Сбрасываем промо после юза
            localStorage.setItem('vpn_user', JSON.stringify(user));
            refreshUI();
            Swal.fire('ULTRA_VPN_ACTIVE', 'ENJOY FREEDOM', 'success');
        }

        function addBalance() {
            user.balance += 500;
            localStorage.setItem('vpn_user', JSON.stringify(user));
            refreshUI();
        }

        function renderUsers() {
            const table = document.getElementById('userTable');
            table.innerHTML = `
                <tr>
                    <td class="p-5 font-bold text-green-400 italic">${user.name} (YOU)</td>
                    <td class="p-5">${user.balance}₽</td>
                    <td class="p-5 uppercase">${user.status}</td>
                    <td class="p-5 flex gap-2">
                        <button onclick="addBalance()" class="text-blue-400">ADD_CASH</button>
                        <button class="text-red-500 opacity-30">BAN</button>
                    </td>
                </tr>
            `;
        }

        function renderPromos() {
            const list = document.getElementById('promoList');
            list.innerHTML = config.promos.map((p, i) => `
                <div class="bg-yellow-500/10 border border-yellow-500/30 px-3 py-1 rounded-full text-[10px] flex gap-2 items-center">
                    ${p.name} (-${p.pct}%)
                    <button onclick="delPromo(${i})" class="text-red-500">×</button>
                </div>
            `).join('');
        }

        function delPromo(i) {
            config.promos.splice(i, 1);
            saveConfig();
            renderPromos();
        }

        function saveConfig() { localStorage.setItem('vpn_config', JSON.stringify(config)); }
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function logout() { localStorage.clear(); location.reload(); }

    </script>
</body>
</html>
