<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG X VPN | Nexus Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;500;900&display=swap');
        
        :root { --main: #00ffa3; --deep: #050608; --card: rgba(255, 255, 255, 0.03); }
        body { background: var(--deep); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .syncopate { font-family: 'Syncopate', sans-serif; }
        
        /* Эффект живого фона */
        .bg-glow {
            position: fixed; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 163, 0.05) 0%, transparent 80%);
            z-index: -1; pointer-events: none;
        }

        /* Ультра-стекло */
        .glass-card {
            background: var(--card); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover { border-color: var(--main); transform: scale(1.01); box-shadow: 0 0 40px rgba(0, 255, 163, 0.1); }

        /* Кнопки будущего */
        .btn-nexus {
            background: linear-gradient(135deg, #00ffa3 0%, #00d1ff 100%);
            color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            border-radius: 20px; transition: 0.4s; position: relative; overflow: hidden;
        }
        .btn-nexus:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 255, 163, 0.4); }
        .btn-nexus::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: rgba(255,255,255,0.2); transform: rotate(45deg); transition: 0.5s;
        }
        .btn-nexus:hover::after { left: 120%; }

        /* Анимации */
        .tab-content { display: none; animation: fadeIn 0.6s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        .price-tag { font-size: 4rem; font-weight: 900; background: linear-gradient(to bottom, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="bg-glow"></div>

    <script>
        const REQUISITES = {
            card: "2200 0000 0000 0000",
            crypto: "TQabc123... (USDT TRC20)",
            tg: "https://t.me/sswckk"
        };
    </script>

    <div id="authPanel" class="fixed inset-0 z-[1000] bg-black/90 flex items-center justify-center hidden backdrop-blur-3xl">
        <div class="glass-card p-16 max-w-md w-full text-center border-emerald-500/20">
            <h2 class="syncopate text-3xl font-bold mb-10 text-emerald-400">DOG X ACCESS</h2>
            <input type="text" id="userName" placeholder="IDENTITY NAME" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 mb-8 text-center outline-none focus:border-emerald-500 transition font-black tracking-widest uppercase">
            <button onclick="login()" class="w-full py-5 btn-nexus text-xs">Authorize</button>
        </div>
    </div>

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-24 glass-card p-8 px-12">
        <div class="syncopate font-black text-2xl flex items-center gap-2">
            <span class="text-emerald-400">DOG</span><span class="opacity-50">X</span>
        </div>
        <div class="flex gap-12 text-[11px] font-bold uppercase tracking-[4px]">
            <button onclick="switchTab('home')" class="hover:text-emerald-400 transition">Market</button>
            <button onclick="switchTab('profile')" class="hover:text-emerald-400 transition">Core</button>
            <div id="admLabel" class="hidden text-red-500 animate-pulse underline font-black">[ADMIN]</div>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-7xl mx-auto">
        <div class="text-center mb-32">
            <h1 class="syncopate text-6xl md:text-[120px] leading-none font-black italic mb-8">SECURE<br><span class="text-emerald-400">NETWORK</span></h1>
            <p id="systemTicker" class="text-xs uppercase tracking-[8px] opacity-40">SYSTEM STATUS: OPTIMAL // 2026 EDITION</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="glass-card p-12 text-center relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-6 opacity-5 font-black text-6xl">01</div>
                <h3 class="text-xs font-bold text-gray-500 mb-4 tracking-[3px]">TRIAL</h3>
                <div class="price-tag mb-10">10₽</div>
                <button onclick="showPayment(10)" class="w-full py-5 btn-nexus text-[10px]">Start System</button>
            </div>

            <div class="glass-card p-12 text-center border-emerald-500/40 shadow-[0_0_60px_rgba(0,255,163,0.15)] scale-110 z-10">
                <div class="bg-emerald-500 text-black text-[9px] font-black px-4 py-1 rounded-full absolute -top-3 left-1/2 -translate-x-1/2 uppercase tracking-widest">Recommended</div>
                <h3 class="text-xs font-bold text-emerald-400 mb-4 tracking-[3px]">PREMIUM</h3>
                <div class="price-tag mb-10 text-emerald-400">250₽</div>
                <button onclick="showPayment(250)" class="w-full py-6 btn-nexus text-[10px]">Upgrade to Core</button>
            </div>

            <div class="glass-card p-12 text-center group">
                <div class="absolute top-0 right-0 p-6 opacity-5 font-black text-6xl">03</div>
                <h3 class="text-xs font-bold text-gray-500 mb-4 tracking-[3px]">INFINITY</h3>
                <div class="price-tag mb-10">1000₽</div>
                <button onclick="showPayment(1000)" class="w-full py-5 btn-nexus text-[10px]">Full Protocol</button>
            </div>
        </div>
    </main>

    <section id="profile" class="tab-content max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="glass-card p-12 text-center h-fit">
                <div class="w-32 h-32 bg-gradient-to-br from-emerald-400 to-cyan-500 rounded-[40px] mx-auto mb-8 flex items-center justify-center text-5xl text-black font-black rotate-12 shadow-2xl">
                    <span id="userAva">A</span>
                </div>
                <h2 id="userNameLabel" class="syncopate text-2xl font-bold mb-2">USER</h2>
                <p id="userBalance" class="text-emerald-400 text-xl font-black mb-10 tracking-widest">0.00₽</p>
                <div class="space-y-4">
                    <input id="adminCode" type="text" placeholder="ACCESS CODE" class="w-full bg-black/40 p-4 rounded-xl text-xs border border-white/5 outline-none focus:border-emerald-500 text-center uppercase">
                    <button onclick="checkAdmin()" class="w-full py-4 glass-card text-[9px] font-black uppercase hover:bg-white/5">Enter Terminal</button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-8">
                <div class="glass-card p-10">
                    <h3 class="text-xs font-bold uppercase tracking-[4px] mb-8 text-gray-500">Active secure tunnels</h3>
                    <div id="keyContainer" class="space-y-4">
                        <div class="text-xs opacity-20 italic">No active tunnels found...</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-7xl mx-auto">
        <div class="glass-card p-12 border-red-500/20">
            <h1 class="syncopate text-3xl mb-12 text-red-500 underline decoration-double">MASTER_TERMINAL</h1>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-12">
                <div class="space-y-6">
                    <h4 class="text-[11px] font-black uppercase text-gray-500 tracking-widest">Глобальная Рассылка</h4>
                    <textarea id="broadcastMsg" class="w-full bg-black/40 border border-white/10 p-6 rounded-3xl h-40 outline-none focus:border-emerald-500 text-xs text-emerald-400" placeholder="Введите сообщение для всех пользователей..."></textarea>
                    <button onclick="sendBroadcast()" class="w-full py-5 bg-emerald-500/10 border border-emerald-500/40 text-emerald-400 rounded-3xl font-black text-xs uppercase hover:bg-emerald-500 hover:text-black transition">Запустить рассылку по системе</button>
                </div>
                
                <div class="space-y-6">
                    <h4 class="text-[11px] font-black uppercase text-gray-500 tracking-widest">Контроль цен</h4>
                    <div class="grid grid-cols-3 gap-4">
                        <input type="number" id="admP1" class="bg-black/40 border border-white/10 p-5 rounded-2xl text-center">
                        <input type="number" id="admP2" class="bg-black/40 border border-white/10 p-5 rounded-2xl text-center">
                        <input type="number" id="admP3" class="bg-black/40 border border-white/10 p-5 rounded-2xl text-center">
                    </div>
                    <button onclick="savePrices()" class="w-full py-5 btn-nexus text-xs">Update Globals</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('nexus_db')) || {
            prices: [10, 250, 1000],
            announcement: null,
            serverIP: "45.132.XX.XX"
        };
        let user = JSON.parse(localStorage.getItem('nexus_user')) || null;

        window.onload = () => {
            if(!user) document.getElementById('authPanel').classList.remove('hidden');
            else {
                syncData();
                checkAnnouncements();
            }
        };

        function login() {
            const name = document.getElementById('userName').value.trim();
            if(name.length < 2) return;
            user = { name, balance: 0, keys: [], uuid: btoa(Math.random()).substring(0,16) };
            localStorage.setItem('nexus_user', JSON.stringify(user));
            location.reload();
        }

        function syncData() {
            document.getElementById('userNameLabel').innerText = user.name.toUpperCase();
            document.getElementById('userAva').innerText = user.name[0].toUpperCase();
            document.getElementById('userBalance').innerText = user.balance.toFixed(2) + '₽';
            
            document.getElementById('admP1').value = db.prices[0];
            document.getElementById('admP2').value = db.prices[1];
            document.getElementById('admP3').value = db.prices[2];
            
            const cont = document.getElementById('keyContainer');
            if(user.keys.length > 0) {
                cont.innerHTML = user.keys.map(k => `
                    <div class="glass-card p-6 flex justify-between items-center border-white/5 bg-white/[0.01]">
                        <div class="overflow-hidden mr-4">
                            <p class="text-[9px] text-emerald-400 font-mono truncate">${k.val}</p>
                        </div>
                        <button onclick="copy('${k.val}')" class="text-emerald-500 hover:text-white transition p-2"><i class="fas fa-copy"></i></button>
                    </div>
                `).join('');
            }
        }

        function showPayment(amount) {
            Swal.fire({
                title: 'CHOOSE PAYMENT',
                background: '#050608',
                color: '#fff',
                showConfirmButton: false,
                html: `
                    <div class="space-y-4 p-4">
                        <button onclick="payCard(${amount})" class="w-full p-6 glass-card flex items-center justify-between hover:bg-emerald-500/10 transition">
                            <div class="text-left">
                                <p class="text-[10px] uppercase font-black tracking-widest">Bank Card</p>
                                <p class="text-xs opacity-50">Sber / Tinkoff / SBP</p>
                            </div>
                            <i class="fas fa-credit-card text-emerald-400"></i>
                        </button>
                        <button onclick="payCrypto(${amount})" class="w-full p-6 glass-card flex items-center justify-between hover:bg-cyan-500/10 transition">
                            <div class="text-left">
                                <p class="text-[10px] uppercase font-black tracking-widest">Cryptocurrency</p>
                                <p class="text-xs opacity-50">USDT / TON / BTC</p>
                            </div>
                            <i class="fas fa-bolt text-cyan-400"></i>
                        </button>
                    </div>
                `
            });
        }

        function payCard(amt) {
            Swal.fire({
                title: 'TRANSFER ' + amt + '₽',
                background: '#050608', color: '#fff',
                html: `<div class="p-6 glass-card"><p class="text-[11px] opacity-40 mb-4 tracking-[3px]">REQUISITES:</p><p class="text-xl font-black mb-2 text-emerald-400">${REQUISITES.card}</p><p class="text-[10px] opacity-40 italic">Send receipt to support after payment</p></div>`,
                footer: `<a href="${REQUISITES.tg}" target="_blank" class="w-full py-4 btn-nexus text-center text-[10px]">Send Receipt to TG</a>`,
                showConfirmButton: false
            });
        }

        function payCrypto(amt) {
            Swal.fire({
                title: 'CRYPTO PROTOCOL',
                background: '#050608', color: '#fff',
                html: `<div class="p-6 glass-card"><p class="text-[11px] opacity-40 mb-4 tracking-[3px]">USDT TRC20 ADDRESS:</p><p class="text-[10px] font-mono break-all text-cyan-400">${REQUISITES.crypto}</p></div>`,
                confirmButtonText: 'I PAID',
                confirmButtonColor: '#00ffa3'
            }).then(() => {
                // Демо-начисление ключа
                const newKey = `vless://${btoa(Math.random()).substring(0,32)}@${db.serverIP}:443?security=reality&sni=google.com&fp=chrome&type=grpc&serviceName=grpc#DOGX_VIP`;
                user.keys.unshift({val: newKey});
                localStorage.setItem('nexus_user', JSON.stringify(user));
                syncData();
                Swal.fire('SUCCESS', 'Tunnel added to your core', 'success');
            });
        }

        function checkAdmin() {
            if(document.getElementById('adminCode').value === '67АРТЁМ67') {
                document.getElementById('admLabel').classList.remove('hidden');
                switchTab('admin');
                Swal.fire('ROOT ACCESS', 'System control online', 'success');
            }
        }

        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            db.announcement = { msg, id: Date.now() };
            localStorage.setItem('nexus_db', JSON.stringify(db));
            Swal.fire('SYSTEM', 'Broadcast message sent to all users', 'success');
        }

        function checkAnnouncements() {
            if(db.announcement && localStorage.getItem('last_seen_ann') != db.announcement.id) {
                Swal.fire({
                    title: 'SYSTEM BROADCAST',
                    text: db.announcement.msg,
                    background: '#050608',
                    color: '#00ffa3',
                    confirmButtonText: 'RECEIVED',
                    confirmButtonColor: '#00ffa3'
                });
                localStorage.setItem('last_seen_ann', db.announcement.id);
            }
        }

        function savePrices() {
            db.prices = [document.getElementById('admP1').value, document.getElementById('admP2').value, document.getElementById('admP3').value];
            localStorage.setItem('nexus_db', JSON.stringify(db));
            location.reload();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            Swal.fire({ toast: true, position: 'top-end', title: 'Copied', showConfirmButton: false, timer: 1000, background: '#111', color: '#fff' });
        }
    </script>
</body>
</html>
