<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOG X VPN</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/733/733641.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap');
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Unbounded', sans-serif; 
            min-height: 100vh;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 30px; 
        }
        
        .neo-btn { 
            background: #fff;
            color: #000;
            font-weight: 900;
            border-radius: 20px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .neo-btn:hover { background: #3b82f6; color: #fff; transform: scale(1.02); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .key-view { 
            word-break: break-all; 
            font-size: 10px; 
            background: rgba(0,0,0,0.4); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px dashed rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="authBox" class="fixed inset-0 z-[100] bg-black flex items-center justify-center hidden p-6">
        <div class="max-w-xs w-full glass-card p-10 text-center">
            <h2 class="text-3xl font-black mb-10 italic">DOG <span class="text-blue-500">X</span></h2>
            <input type="text" id="uNameInp" placeholder="ТВОЙ НИК" class="w-full p-5 rounded-2xl mb-4 text-center font-bold bg-white/5 border border-white/10 outline-none focus:border-blue-500">
            <button onclick="login()" class="w-full py-5 neo-btn">ВОЙТИ</button>
            <button onclick="installApp()" class="mt-6 text-[8px] opacity-40 uppercase tracking-widest block w-full text-center">Установить на рабочий стол</button>
        </div>
    </div>

    <nav class="max-w-4xl mx-auto flex justify-between items-center mb-8 p-5 glass-card">
        <div class="font-black text-xl italic tracking-tighter">DOG <span class="text-blue-500">X</span></div>
        <div class="flex gap-6 text-[9px] font-black uppercase tracking-widest">
            <button onclick="showTab('home')">МАГАЗИН</button>
            <button onclick="showTab('me')">ПРОФИЛЬ</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500">АДМИН</button>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-8 flex flex-col justify-between hover:border-blue-500/50 transition">
                <p class="text-[10px] font-black opacity-30 uppercase">Пробный день</p>
                <div class="text-4xl font-black my-6">10₽</div>
                <button onclick="buyKey(10, 24)" class="w-full py-4 neo-btn">КУПИТЬ</button>
            </div>
            
            <div class="glass-card p-8 flex flex-col justify-between border-blue-500 bg-blue-500/5">
                <p class="text-[10px] font-black text-blue-500 uppercase">Месяц доступа</p>
                <div class="text-4xl font-black my-6">250₽</div>
                <button onclick="buyKey(250, 720)" class="w-full py-4 neo-btn !bg-blue-600 !text-white">ВЫБРАТЬ</button>
            </div>

            <div class="glass-card p-8 flex flex-col justify-between">
                <p class="text-[10px] font-black opacity-30 uppercase">Навсегда</p>
                <div class="text-4xl font-black my-6">1000₽</div>
                <button onclick="buyKey(1000, 99999)" class="w-full py-4 neo-btn">КУПИТЬ</button>
            </div>
        </div>
    </main>

    <section id="me" class="tab-content max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-8 text-center">
                <div class="text-[10px] font-black opacity-30 uppercase mb-2">Твой баланс</div>
                <div class="text-3xl font-black text-blue-500 mb-8" id="userBal">0.00₽</div>
                
                <button onclick="showTopUp()" class="w-full py-4 neo-btn mb-6">ПОПОЛНИТЬ</button>
                
                <div class="pt-6 border-t border-white/5 space-y-4">
                    <button onclick="installApp()" class="w-full py-3 bg-white/5 rounded-xl text-[8px] font-black uppercase tracking-widest">На рабочий стол</button>
                    <input type="text" id="promoInp" placeholder="ПАРОЛЬ / КОД" class="w-full p-4 rounded-xl text-center text-xs font-bold bg-white/5 border border-white/10 outline-none" oninput="checkAdmin()">
                    <button onclick="usePromo()" class="text-[10px] font-black opacity-30 uppercase tracking-widest">Активировать</button>
                </div>
            </div>

            <div class="md:col-span-2 glass-card p-8">
                <h3 class="text-[10px] font-black opacity-30 uppercase tracking-[4px] mb-8">Активные ключи</h3>
                <div id="keysList" class="space-y-4"></div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-4xl mx-auto">
        <div class="glass-card p-8">
            <h2 class="font-black text-red-500 mb-6 uppercase">Склад ключей (happ://)</h2>
            <textarea id="stock" class="w-full h-40 bg-white/5 border border-white/10 rounded-2xl p-4 text-[10px] font-mono outline-none mb-6" placeholder="Один ключ на строку"></textarea>
            <button onclick="saveAdmin()" class="w-full py-4 neo-btn bg-red-600 !text-white">Сохранить всё</button>
            
            <div class="mt-10 pt-10 border-t border-white/5">
                <h2 class="font-black text-blue-500 mb-6 uppercase">Генератор кодов</h2>
                <div class="flex gap-2">
                    <input id="a_prCode" class="flex-1 p-4 bg-white/5 rounded-xl font-bold uppercase" placeholder="КОД">
                    <input id="a_prVal" class="w-24 p-4 bg-white/5 rounded-xl text-center font-bold" placeholder="СУММА">
                    <button onclick="addPromo()" class="px-6 neo-btn">➕</button>
                </div>
                <div id="a_promos" class="mt-4 space-y-2"></div>
            </div>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_v14_db')) || { card: "sswckk", stock: [], promos: [] };
        let user = JSON.parse(localStorage.getItem('dog_v14_user')) || null;

        window.onload = () => { if(!user) document.getElementById('authBox').classList.remove('hidden'); else sync(); };

        function login() {
            const n = document.getElementById('uNameInp').value.trim();
            if(n) { user = { name: n, bal: 0, keys: [] }; save(); location.reload(); }
        }

        function sync() {
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            document.getElementById('stock').value = db.stock.join('\n');
            renderKeys();
            renderPromos();
        }

        // --- ПОПОЛНЕНИЕ ---
        function showTopUp() {
            Swal.fire({
                title: 'ПОПОЛНЕНИЕ',
                background: '#0a0a0a', color: '#fff',
                html: `
                    <div class="space-y-4 text-left">
                        <div class="p-4 glass-card border-blue-500/30">
                            <p class="text-[10px] font-black uppercase opacity-40 mb-2 italic">Вариант 1: В рублях (от 5 до 1000)</p>
                            <input type="number" id="payRub" placeholder="Сумма в ₽" class="w-full bg-white/5 p-3 rounded-lg text-center font-bold border border-white/10">
                            <button onclick="payManual('RUB')" class="w-full mt-2 py-2 bg-blue-600 rounded-lg text-[10px] font-black">ПЕРЕВЕСТИ</button>
                        </div>
                        <div class="p-4 glass-card border-amber-500/30">
                            <p class="text-[10px] font-black uppercase opacity-40 mb-2 italic text-amber-500">Вариант 2: Звезды Telegram</p>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="payManual('15 Звезд')" class="p-2 bg-white/5 rounded-lg text-[10px] font-bold">⭐ 15</button>
                                <button onclick="payManual('25 Звезд')" class="p-2 bg-white/5 rounded-lg text-[10px] font-bold">⭐ 25</button>
                                <button onclick="payManual('50 Звезд')" class="p-2 bg-white/5 rounded-lg text-[10px] font-bold">⭐ 50</button>
                                <button onclick="payManual('100 Звезд')" class="p-2 bg-white/5 rounded-lg text-[10px] font-bold">⭐ 100</button>
                            </div>
                        </div>
                    </div>
                `,
                showConfirmButton: false
            });
        }

        function payManual(type) {
            let val = type === 'RUB' ? document.getElementById('payRub').value : type;
            if(type === 'RUB' && (val < 5 || val > 1000)) return Swal.fire('Ошибка','От 5 до 1000₽','error');
            
            Swal.fire({
                title: 'ОЖИДАНИЕ ОПЛАТЫ',
                background: '#0a0a0a', color: '#fff',
                html: `<p class="text-sm opacity-70">Переведи <b>${val}</b> по реквизитам:<br><br><b class="text-blue-500 text-lg">${db.card}</b><br><br>После оплаты скинь чек <b>@sswckk</b> и он выдаст код пополнения!</p>`,
                confirmButtonText: 'Я ОПЛАТИЛ'
            });
        }

        // --- ПОКУПКА ---
        function buyKey(cost, hours) {
            if(user.bal < cost) return Swal.fire('Не хватает денег','Пополни баланс в профиле!','error');
            if(db.stock.length === 0) return Swal.fire('Склад пуст','Напиши @sswckk за ключом!','warning');
            
            const raw = db.stock.shift();
            user.bal -= cost;
            user.keys.unshift({ key: raw.split('#')[0] + "#DOG_X_VPN", expire: Date.now() + (hours*3600000) });
            save();
            Swal.fire('Успешно!','Ключ уже в твоем профиле','success').then(() => { showTab('me'); sync(); });
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            if(user.keys.length === 0) { list.innerHTML = `<p class="text-center opacity-20 py-20 italic">Нет активных ключей</p>`; return; }
            list.innerHTML = user.keys.map(k => `
                <div class="glass-card p-6 border-white/5">
                    <div class="key-view mb-4">${k.key}</div>
                    <button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('Скопировано','','success')" class="w-full py-3 neo-btn text-[10px]">СКОПИРОВАТЬ ПОЛНОСТЬЮ</button>
                </div>
            `).join('');
        }

        // --- УСТАНОВКА ---
        function installApp() {
            const isiOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            Swal.fire({
                title: 'УСТАНОВКА',
                background: '#0a0a0a', color: '#fff',
                html: isiOS ? `
                    <div class="text-left text-xs space-y-3 opacity-80 uppercase">
                        <p>1. Нажми кнопку <b>"Поделиться"</b> <i class="fas fa-share-square"></i></p>
                        <p>2. Выбери <b>"На экран Домой"</b> <i class="fas fa-plus-square"></i></p>
                        <p>3. Нажми <b>"Добавить"</b></p>
                    </div>` : `
                    <div class="text-left text-xs space-y-3 opacity-80 uppercase">
                        <p>1. Нажми на <b>три точки (⋮)</b> в Chrome</p>
                        <p>2. Нажми <b>"Установить приложение"</b></p>
                    </div>`,
                confirmButtonText: 'ОК'
            });
        }

        function checkAdmin() { if(document.getElementById('promoInp').value === '67АРТЁМ67') document.getElementById('adminBtn').classList.remove('hidden'); }
        function usePromo() {
            const code = document.getElementById('promoInp').value.toUpperCase();
            const idx = db.promos.findIndex(p => p.code === code);
            if(idx !== -1) { user.bal += db.promos[idx].val; db.promos.splice(idx, 1); save(); location.reload(); }
        }
        function saveAdmin() { db.stock = document.getElementById('stock').value.split('\n').filter(l => l.length > 5); save(); location.reload(); }
        function addPromo() { const c = document.getElementById('a_prCode').value.toUpperCase(); const v = parseInt(document.getElementById('a_prVal').value); if(c && v) { db.promos.push({code:c, val:v}); save(); renderPromos(); } }
        function renderPromos() { document.getElementById('a_promos').innerHTML = db.promos.map((p,i) => `<div class="flex justify-between p-3 glass-card text-[10px] font-black uppercase"><span>${p.code} (+${p.val}₽)</span><button onclick="db.promos.splice(${i},1); save(); renderPromos();" class="text-red-500">❌</button></div>`).join(''); }
        function save() { localStorage.setItem('dog_v14_db', JSON.stringify(db)); localStorage.setItem('dog_v14_user', JSON.stringify(user)); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
