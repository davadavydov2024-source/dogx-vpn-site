<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Global VPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Рекламный баннер внизу */
        .footer-ad { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: #191c24; border-top: 1px solid rgba(255,255,255,0.1); padding: 12px; display: none; animation: slideInUp 0.5s ease; }
        @keyframes slideInUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-40">

    <div id="globalBC" class="max-w-xl mx-auto m-4 hidden">
        <div class="player-card p-4 flex items-center gap-4 relative border border-amber-500/30 bg-amber-500/5">
            <img id="bcImgDisplay" src="" class="w-14 h-14 rounded-xl object-cover hidden">
            <div class="flex-1">
                <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-1">Объявление</p>
                <div id="bcTextDisplay" class="text-[11px] font-bold leading-tight"></div>
            </div>
            <button onclick="this.parentElement.parentElement.remove()" class="text-xs opacity-20 p-2">✕</button>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div><div class="text-2xl font-extrabold tracking-tighter text-blue-500 italic uppercase">Dog X</div><div id="userDisplay" class="text-[9px] font-bold opacity-40 uppercase mt-1">ID: #----</div></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-xs font-bold opacity-60 uppercase">Маркет</button>
            <button onclick="showTab('me')" class="text-xs font-bold opacity-60 uppercase">Профиль</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-xs font-bold uppercase">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <h2 class="text-xl font-extrabold italic uppercase">Тарифы VPN</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center relative shadow-2xl shadow-blue-500/5">
            <p class="text-[10px] opacity-40 font-bold uppercase mb-2">Мой Баланс</p>
            <h3 class="text-5xl font-extrabold mb-8 text-blue-500" id="userBal">0.00₽</h3>
            <div class="flex gap-2"><button onclick="topUp()" class="flex-1 py-4 btn-primary text-xs uppercase">Пополнить</button><button onclick="installApp()" class="flex-1 py-4 player-card text-xs font-bold uppercase">Помощь</button></div>
        </div>
        <div id="keysList" class="space-y-3"></div>
        <div class="space-y-3 pt-4">
            <input type="text" id="promoInp" placeholder="Промокод или Пароль" class="w-full p-4 player-card bg-transparent text-center text-sm">
            <button onclick="checkInput()" class="w-full py-4 btn-primary bg-white/5 text-[10px] uppercase">Подтвердить</button>
        </div>
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6 border border-red-500/20">
            <h2 class="text-red-500 font-black italic uppercase text-2xl">Admin Control</h2>
            
            <div class="space-y-4 p-4 bg-blue-500/10 rounded-2xl border border-blue-500/20">
                <h3 class="text-[10px] font-black uppercase text-blue-400">Реклама внизу сайта</h3>
                <textarea id="a_footer_text" class="w-full h-20 p-3 player-card bg-transparent text-xs" placeholder="Текст для баннера внизу..."></textarea>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('footerFile').click()" class="flex-1 py-3 player-card text-[9px] uppercase font-bold">Фото для низа</button>
                    <button onclick="toggleFooterAd()" id="footerStatusBtn" class="px-4 py-3 bg-white/5 rounded-xl text-[9px] uppercase font-bold">ВЫКЛ</button>
                </div>
                <input type="file" id="footerFile" class="hidden" accept="image/*" onchange="handleFooterImg(this)">
            </div>

            <div class="space-y-4 p-4 bg-amber-500/10 rounded-2xl border border-amber-500/20">
                <h3 class="text-[10px] font-black uppercase text-amber-500">Рассылка (Верх)</h3>
                <textarea id="a_bc_text" class="w-full h-20 p-3 player-card bg-transparent text-xs" placeholder="Текст уведомления..."></textarea>
                <button onclick="sendGlobalBC()" class="w-full py-3 btn-primary bg-amber-600 text-[10px] uppercase">Опубликовать вверх</button>
            </div>

            <div class="space-y-4 p-4 bg-white/5 rounded-2xl">
                <h3 class="text-[10px] font-black opacity-40 uppercase">Реквизиты</h3>
                <input id="a_card" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Карта или Юзернейм">
            </div>

            <button onclick="saveAdmin()" class="w-full py-6 btn-primary bg-red-600 uppercase italic font-black text-sm shadow-2xl shadow-red-900/40">Сохранить все изменения</button>
        </div>
    </section>

    <div id="footerAdBox" class="footer-ad">
        <div class="max-w-xl mx-auto flex items-center gap-4">
            <img id="footerImg" src="" class="w-12 h-12 rounded-lg object-cover hidden">
            <div class="flex-1">
                <p id="footerText" class="text-[11px] font-bold leading-tight opacity-90"></p>
            </div>
            <button onclick="document.getElementById('footerAdBox').style.display='none'" class="text-xs opacity-40 p-2">✕</button>
        </div>
    </div>

    <script>
        let allUsers = JSON.parse(localStorage.getItem('dog_users_db')) || {};
        let db = JSON.parse(localStorage.getItem('dog_v29_db')) || {
            card: "sswckk",
            broadcast: { text: "", img: "", active: false },
            footerAd: { text: "Добро пожаловать в DOG X VPN!", img: "", active: true },
            products: [{ id: 1, name: "START", pr: 150, h: 720, icon: "🛡️", discount: 0, stock: { ios: [], and: [] } }],
            promos: []
        };
        let user = JSON.parse(localStorage.getItem('dog_v29_me')) || null;

        window.onload = () => { if(!user) initUser(); else sync(); };

        async function initUser() {
            const id = Math.floor(1000 + Math.random() * 9000);
            user = { id, nick: 'Пользователь', bal: 0, keys: [] };
            allUsers[id] = user; save(); sync();
        }

        function sync() {
            if(allUsers[user.id]) user = allUsers[user.id];
            document.getElementById('userDisplay').innerText = `${user.nick} | #${user.id}`;
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            renderGlobalBC(); 
            renderFooterAd();
            loadAdmin();
        }

        // Рендер рекламы внизу
        function renderFooterAd() {
            const box = document.getElementById('footerAdBox');
            if(db.footerAd && db.footerAd.active) {
                box.style.display = 'block';
                document.getElementById('footerText').innerText = db.footerAd.text;
                const img = document.getElementById('footerImg');
                if(db.footerAd.img) { img.src = db.footerAd.img; img.classList.remove('hidden'); }
                else { img.classList.add('hidden'); }
            } else { box.style.display = 'none'; }
        }

        function toggleFooterAd() {
            db.footerAd.active = !db.footerAd.active;
            save(); sync();
        }

        function handleFooterImg(input) {
            const reader = new FileReader();
            reader.onloadend = () => { db.footerAd.img = reader.result; save(); sync(); };
            reader.readAsDataURL(input.files[0]);
        }

        function sendGlobalBC() {
            db.broadcast.text = document.getElementById('a_bc_text').value;
            db.broadcast.active = true;
            save(); sync();
        }

        function loadAdmin() {
            document.getElementById('a_card').value = db.card;
            document.getElementById('a_footer_text').value = db.footerAd.text;
            document.getElementById('footerStatusBtn').innerText = db.footerAd.active ? 'ВКЛЮЧЕНО' : 'ВЫКЛЮЧЕНО';
            document.getElementById('footerStatusBtn').style.color = db.footerAd.active ? '#4ade80' : '#f87171';
        }

        function saveAdmin() {
            db.card = document.getElementById('a_card').value;
            db.footerAd.text = document.getElementById('a_footer_text').value;
            save(); location.reload();
        }

        function checkInput() {
            const val = document.getElementById('promoInp').value.trim();
            if(val === 'kalubxq') {
                document.getElementById('adminBtn').classList.remove('hidden');
                Swal.fire({ icon: 'success', title: 'ADMIN MODE', background: '#191c24', color: '#fff' });
            }
            document.getElementById('promoInp').value = '';
        }

        function renderGlobalBC() {
            const box = document.getElementById('globalBC');
            if(db.broadcast.active && db.broadcast.text) {
                box.classList.remove('hidden');
                document.getElementById('bcTextDisplay').innerText = db.broadcast.text;
            } else { box.classList.add('hidden'); }
        }

        function save() { 
            localStorage.setItem('dog_v29_db', JSON.stringify(db)); 
            localStorage.setItem('dog_v29_me', JSON.stringify(user)); 
            localStorage.setItem('dog_users_db', JSON.stringify(allUsers)); 
        }

        function showTab(id) { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        function topUp() { Swal.fire({ title: 'ПОПОЛНЕНИЕ', html: `<div class="p-4 bg-white/5 rounded-xl text-blue-400 font-mono">${db.card}</div>`, background: '#191c24', color: '#fff' }); }
    </script>
</body>
</html>
