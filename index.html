<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Premium Proxy</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/733/733641.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;700&display=swap');
        
        :root { --bg: #030406; --card: #0a0c10; --accent: #007bff; --glow: rgba(0, 123, 255, 0.4); }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        .unbounded { font-family: 'Unbounded', sans-serif; }

        /* Ультра-тонкое стекло */
        .glass-card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 28px; transition: 0.3s cubic-bezier(0.2, 0, 0, 1); }
        .glass-card:hover { border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        /* Кнопки премиум класса */
        .btn-premium { background: #fff; color: #000; font-weight: 800; border-radius: 16px; transition: 0.2s; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-premium:hover { background: var(--accent); color: #fff; box-shadow: 0 0 20px var(--glow); transform: scale(1.02); }
        .btn-premium:active { transform: scale(0.98); }

        /* Вкладки */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: appear 0.4s ease forwards; }
        @keyframes appear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Индикатор скидки */
        .sale-badge { background: #ef4444; color: #fff; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 6px; position: absolute; top: -10px; right: 15px; text-transform: uppercase; }

        /* Текст ключа */
        .key-text { word-break: break-all; font-family: monospace; font-size: 10px; color: rgba(255,255,255,0.6); line-height: 1.5; }
    </style>
</head>
<body class="p-3 md:p-10">

    <div id="broadcast" class="max-w-xl mx-auto mb-4 hidden">
        <div class="glass-card p-4 border-amber-500/30 text-center font-bold text-amber-400 italic text-xs">
            <i class="fas fa-bullhorn mr-2"></i> <span id="bcText">Загрузка важного сообщения...</span>
        </div>
    </div>

    <nav class="max-w-xl mx-auto flex justify-between items-center mb-6 p-5 glass-card">
        <div class="unbounded font-black text-xl italic tracking-tighter">DOG <span class="text-blue-500">X</span></div>
        <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-500">
            <button onclick="showTab('home')" class="hover:text-blue-400">Маркет</button>
            <button onclick="showTab('me')" class="hover:text-blue-400">Кабинет</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500">Admin</button>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-xl mx-auto space-y-4">
        <div id="productsList" class="grid grid-cols-1 gap-4">
            </div>
    </main>

    <section id="me" class="tab-content max-w-xl mx-auto space-y-4">
        <div class="glass-card p-8 text-center space-y-6">
            <div class="text-[10px] font-bold opacity-30 uppercase mb-2">Баланс кошелька</div>
            <div class="unbounded text-5xl font-black mb-8 text-blue-500" id="userBal">0.00₽</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="topUp()" class="w-full py-4 btn-premium bg-blue-600 text-white">ПОПОЛНИТЬ</button>
                <button onclick="installApp()" class="w-full py-4 glass-card text-[10px] font-bold">PWA APP</button>
            </div>
            <div class="pt-6 border-t border-white/5 space-y-3">
                <input type="text" id="promoInp" placeholder="ПРОМОКОД ИЛИ ПАРОЛЬ" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-center text-xs font-bold outline-none focus:border-blue-500" oninput="checkAdmin()">
                <button onclick="usePromo()" class="text-[9px] font-bold opacity-30 uppercase tracking-widest">Активировать</button>
            </div>
        </div>
        <div id="keysList" class="space-y-3"></div>
    </section>

    <section id="admin" class="tab-content max-w-xl mx-auto space-y-4">
        <div class="glass-card p-6 space-y-5">
            <h2 class="unbounded font-bold text-xs text-red-500 uppercase">Управление системой</h2>
            <div class="space-y-3">
                <label class="text-[10px] opacity-40 uppercase">Рассылка (Пусто = выкл)</label>
                <input id="a_bc" class="w-full p-3 bg-white/5 rounded-xl text-xs" placeholder="Текст для всех...">
            </div>
            <div class="space-y-3">
                <label class="text-[10px] opacity-40 uppercase">Реквизиты sswckk</label>
                <input id="a_card" class="w-full p-3 bg-white/5 rounded-xl text-xs" placeholder="Карта или Ник">
            </div>
            <div id="a_prices_list" class="space-y-3"></div>
            <div class="grid grid-cols-2 gap-3 pt-6 border-t border-white/5">
                <textarea id="a_ios" class="w-full h-20 bg-white/5 rounded-xl p-3 text-[9px] font-mono" placeholder="Склад iPhone..."></textarea>
                <textarea id="a_and" class="w-full h-20 bg-white/5 rounded-xl p-3 text-[9px] font-mono" placeholder="Склад Android..."></textarea>
            </div>
            <button onclick="saveAdmin()" class="w-full py-4 btn-premium bg-red-600 !text-white">СОХРАНИТЬ ВСЁ</button>
        </div>
    </section>

    <script>
        // ДАННЫЕ СЕРВЕРА
        let db = JSON.parse(localStorage.getItem('dog_v16_db')) || {
            broadcast: "VPN Снова онлайн! Покупай выгодно.", card: "sswckk (Т-Банк)",
            products: [
                { id: 0, name: "ПРОБНИК", pr: 10, old: 50, h: 24 },
                { id: 1, name: "МЕСЯЦ", pr: 250, old: 400, h: 720 },
                { id: 2, name: "НАВСЕГДА", pr: 1000, old: 2500, h: 99999 }
            ],
            stock_ios: [], stock_and: [], promos: []
        };
        let user = JSON.parse(localStorage.getItem('dog_v16_user')) || { name: "User", bal: 0, keys: [] };

        window.onload = () => { sync(); };

        function sync() {
            // Рассылка
            if(db.broadcast) {
                document.getElementById('broadcast').classList.remove('hidden');
                document.getElementById('bcText').innerText = db.broadcast;
            } else document.getElementById('broadcast').classList.add('hidden');
            
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            renderProducts();
            renderKeys();
            loadAdminFields();
        }

        function renderProducts() {
            const list = document.getElementById('productsList');
            list.innerHTML = db.products.map(p => `
                <div class="glass-card p-6 flex justify-between items-center relative overflow-visible">
                    ${p.old > p.pr ? `<div class="sale-badge">СКИДКА ${((p.old - p.pr)/p.old*100).toFixed(0)}%</div>` : ''}
                    <div>
                        <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">${p.name}</h3>
                        <div class="unbounded flex items-baseline gap-2 mt-1">
                            <span class="text-3xl font-black">${p.pr}₽</span>
                            ${p.old > p.pr ? `<span class="text-[11px] text-gray-700 line-through">${p.old}₽</span>` : ''}
                        </div>
                    </div>
                    <button onclick="buyKey(${p.id})" class="px-7 py-3 btn-premium">КУПИТЬ</button>
                </div>
            `).join('');
        }

        function buyKey(id) {
            const p = db.products.find(x => x.id === id);
            Swal.fire({
                title: 'ВЫБЕРИ ОС',
                background: '#0a0c10', color: '#fff',
                showCancelButton: true,
                confirmButtonText: 'iPhone', cancelButtonText: 'Android',
                confirmButtonColor: '#007bff', cancelButtonColor: '#22c55e'
            }).then((r) => {
                const pft = r.isConfirmed ? 'stock_ios' : 'stock_and';
                if(user.bal < p.pr) return Swal.fire('Мало денег','Пополни баланс!','error');
                if(db[pft].length === 0) return Swal.fire('Нет ключей','Напиши @sswckk!','warning');
                
                const key = db[pft].shift();
                user.bal -= p.pr;
                user.keys.unshift({ key, pft, expire: Date.now() + (p.h * 3600000) });
                save(); sync();
                Swal.fire('Успех!','Ключ в профиле','success').then(() => showTab('me'));
            });
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            list.innerHTML = user.keys.map(k => `
                <div class="glass-card p-4 border-white/5 space-y-2">
                    <div class="text-[9px] font-bold uppercase opacity-30">${k.pft === 'stock_ios' ? 'APPLE IPHONE' : 'ANDROID OS'}</div>
                    <div class="key-text p-3 bg-black/30 rounded-lg select-all">${k.key}</div>
                    <button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('Скопировано','','success')" class="w-full py-2 bg-white/5 rounded-lg text-[10px] font-bold">СКОПИРОВАТЬ ВЕСЬ КЛЮЧ</button>
                </div>
            `).join('');
        }

        function checkAdmin() { if(document.getElementById('promoInp').value === '67АРТЁМ67') document.getElementById('adminBtn').classList.remove('hidden'); }
        function loadAdminFields() {
            document.getElementById('a_bc').value = db.broadcast;
            document.getElementById('a_card').value = db.card;
            document.getElementById('a_ios').value = db.stock_ios.join('\n');
            document.getElementById('a_and').value = db.stock_and.join('\n');
            document.getElementById('a_prices_list').innerHTML = db.products.map(p => `<div class="grid grid-cols-3 gap-2"><input id="p_${p.id}_n" value="${p.name}" class="p-2 glass text-[9px]"><input id="p_${p.id}_p" value="${p.pr}" class="p-2 glass text-[9px]"><input id="p_${p.id}_o" value="${p.old}" class="p-2 glass text-[9px]"></div>`).join('');
        }
        function saveAdmin() {
            db.broadcast = document.getElementById('a_bc').value;
            db.card = document.getElementById('a_card').value;
            db.stock_ios = document.getElementById('a_ios').value.split('\n').filter(l => l.length > 5);
            db.stock_and = document.getElementById('a_and').value.split('\n').filter(l => l.length > 5);
            db.products.forEach(p => { p.name = document.getElementById(`p_${p.id}_n`).value; p.pr = parseInt(document.getElementById(`p_${p.id}_p`).value); p.old = parseInt(document.getElementById(`p_${p.id}_o`).value); });
            save(); location.reload();
        }
        function usePromo() {
            const code = document.getElementById('promoInp').value.toUpperCase();
            const i = db.promos.findIndex(p => p.code === code);
            if(i !== -1) { user.bal += db.promos[i].val; db.promos.splice(i, 1); save(); sync(); Swal.fire('Ок!','','success'); }
        }
        function topUp() { Swal.fire('Top-Up', `Оплата: ${db.card}<br>Чек @sswckk`, 'info'); }
        function save() { localStorage.setItem('dog_v16_db', JSON.stringify(db)); localStorage.setItem('dog_v16_user', JSON.stringify(user)); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
    </script>
</body>
</html>
