<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dog X vpn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Plus+Jakarta+Sans:wght@300;800&display=swap');
        body { background: #010204; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 44px; }
        .unbound { font-family: 'Unbounded', sans-serif; }
        .btn-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); border-radius: 28px; font-weight: 800; box-shadow: 0 10px 40px -15px #7c3aed; }
        .btn-dark { background: #16171a; border-radius: 28px; font-weight: 800; border: 1px solid #222; }
        .tab { display: none; } .tab.active { display: block; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-14 h-14 bg-indigo-600/20 rounded-2xl flex items-center justify-center border border-indigo-500/30">
                <i class="fa-solid fa-shield-halved text-indigo-500 text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black italic unbound uppercase tracking-tighter">DOG<span class="text-indigo-500">X</span></h1>
                <p class="text-[7px] font-bold opacity-20 tracking-[4px]">CLOUD v104</p>
            </div>
        </div>
        <div class="bg-white/5 px-4 py-2 rounded-2xl border border-white/10">
            <p id="u-nick-display" class="text-[10px] font-black opacity-60 uppercase tracking-widest">USER</p>
        </div>
    </header>

    <section id="me" class="tab active px-6">
        <div class="glass-card p-12 text-center relative mt-4 overflow-hidden">
            <p class="text-[10px] font-black text-indigo-500 tracking-[10px] uppercase mb-6 opacity-40">БАЛАНС</p>
            <h3 class="text-9xl font-black italic tracking-tighter mb-14" id="u-bal">0₽</h3>
            <div class="grid grid-cols-2 gap-5">
                <button onclick="showPay()" class="btn-purple py-7 text-[13px] uppercase tracking-widest">ПОПОЛНИТЬ</button>
                <button onclick="setTab('admin_login')" class="btn-dark py-7 text-[13px] uppercase tracking-widest text-white/90">АДМИН</button>
            </div>
        </div>
        <div id="my-keys" class="mt-8 space-y-4"></div>
    </section>

    <section id="home" class="tab px-6 pt-4">
        <div id="product-list" class="space-y-4"></div>
    </section>
    
    <section id="admin_login" class="tab px-6 pt-20">
        <div class="glass-card p-8">
            <input type="password" id="adm-pass-input" oninput="checkAdm(this.value)" class="w-full bg-white/5 p-6 rounded-3xl text-center text-2xl tracking-[10px] border border-white/10 outline-none" placeholder="••••">
            <p class="text-[10px] text-center mt-6 opacity-30 font-bold uppercase tracking-widest">Вход для @sswckk</p>
        </div>
    </section>

    <section id="admin" class="tab px-6 pt-6 pb-40 space-y-6">
        <div class="glass-card p-6 space-y-4">
            <p class="text-[10px] font-black text-indigo-400 uppercase">Пользователи</p>
            <input id="ad-search" class="w-full bg-white/5 p-4 rounded-2xl outline-none" placeholder="ID (например: 1)">
            <button onclick="adSearch()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase text-xs">Найти в базе</button>
            <div id="ad-controls" class="hidden space-y-4 p-5 bg-black/40 rounded-[35px] border border-white/5">
                <div id="ad-res" class="text-xs font-mono opacity-60"></div>
                <input id="ad-n-bal" class="w-full bg-white/5 p-4 rounded-2xl outline-none" placeholder="Новый баланс">
                <button onclick="adUpdateU()" class="w-full bg-white/10 py-4 rounded-2xl font-black text-[10px]">ИЗМЕНИТЬ БАЛАНС</button>
            </div>
        </div>
        <button onclick="globalSync()" class="w-full py-7 btn-purple uppercase font-black text-xs tracking-widest">Обновить данные в Облаке</button>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 h-28 bg-[#010204]/90 backdrop-blur-3xl border-t border-white/5 flex justify-around items-center px-10 z-[100]">
        <button onclick="setTab('home')" id="btn-home" class="flex flex-col items-center gap-2 opacity-30">
            <i class="fa-solid fa-shop text-2xl"></i>
            <span class="text-[9px] font-black uppercase">Магазин</span>
        </button>
        <button onclick="setTab('me')" id="btn-me" class="flex flex-col items-center gap-2">
            <i class="fa-solid fa-user-astronaut text-2xl"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Профиль</span>
        </button>
    </nav>

    <script>
        // ТВОИ КЛЮЧИ ИЗ СКРИНШОТА
        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:540bb07ec6bf97b9a78a00"
        };

        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        let db = { users: {}, prods: [] };
        let me = null;

        // Инициализация системы из облака
        function init() {
            rdb.ref('dogx_v100_final').on('value', (s) => {
                const data = s.val();
                if(data) {
                    db = data;
                    const uid = localStorage.getItem('dogx_uid');
                    if(uid && db.users && db.users[uid]) {
                        me = db.users[uid];
                        render();
                    } else { showAuth(); }
                } else { 
                    // Первичная настройка базы, если она пустая
                    rdb.ref('dogx_v100_final').set({
                        prods: [{id: 1, name: "PREMIUM VPN", pr: 499, stock: ["KEY-DOGX-1234"]}]
                    });
                }
            });
        }

        function render() {
            if(!me) return;
            document.getElementById('u-bal').innerText = me.bal.toLocaleString() + '₽';
            document.getElementById('u-nick-display').innerText = me.nick.toUpperCase();

            document.getElementById('product-list').innerHTML = (db.prods || []).map(p => `
                <div class="glass-card p-8 flex justify-between items-center transition active:scale-95">
                    <div><h4 class="unbound text-sm font-black italic uppercase">${p.name}</h4><p class="text-indigo-400 font-black mt-1">${p.pr}₽</p></div>
                    <button onclick="buyP(${p.id})" class="btn-purple px-10 py-5 text-[11px] uppercase tracking-widest">Купить</button>
                </div>`).join('');

            document.getElementById('my-keys').innerHTML = (me.items || []).map(i => `
                <div class="glass-card p-6 border-l-4 border-indigo-600 flex justify-between items-center bg-white/[0.01]">
                    <div><p class="text-[8px] opacity-30 uppercase font-black tracking-widest">${i.name}</p><p class="text-xs font-mono font-bold mt-1 text-indigo-200 tracking-widest">${i.key}</p></div>
                    <i class="fa-solid fa-key opacity-10 text-xl"></i>
                </div>`).join('');
        }

        async function showAuth() {
            const { value: r } = await Swal.fire({
                title: 'DOG X NETWORK',
                input: 'text',
                inputPlaceholder: 'Введите ваш ник...',
                background: '#010204', color: '#fff',
                confirmButtonText: 'ВОЙТИ',
                confirmButtonColor: '#7c3aed'
            });
            if(!r) return showAuth();
            
            let user = Object.values(db.users || {}).find(u => u.nick.toLowerCase() === r.toLowerCase());
            if(!user) {
                const id = (Object.keys(db.users || {}).length + 1).toString();
                user = { id, nick: r, bal: 0, items: [] };
                rdb.ref('dogx_v100_final/users/' + id).set(user);
            }
            localStorage.setItem('dogx_uid', user.id);
            location.reload();
        }

        function buyP(pid) {
            const p = db.prods.find(x => x.id == pid);
            if(me.bal < p.pr) return Swal.fire('Оплата', 'Напишите @sswckk для пополнения', 'error');
            if(!p.stock?.length) return Swal.fire('Склад', 'Тариф временно закончился', 'warning');
            
            const key = p.stock.shift();
            me.bal -= p.pr;
            if(!me.items) me.items = [];
            me.items.unshift({name: p.name, key, date: new Date().toLocaleDateString()});
            
            rdb.ref('dogx_v100_final/users/' + me.id).update({ bal: me.bal, items: me.items });
            rdb.ref('dogx_v100_final/prods').set(db.prods);
        }

        function checkAdm(v) { if(v.toUpperCase() === 'KALUBXQ') setTab('admin'); }
        
        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            const btn = document.getElementById('btn-' + (t === 'me' ? 'me' : 'home'));
            if(btn) btn.classList.remove('opacity-30');
        }

        function adSearch() {
            const sid = document.getElementById('ad-search').value;
            const u = db.users[sid];
            if(!u) return Swal.fire('Упс', 'Пользователь не найден', 'error');
            document.getElementById('ad-controls').classList.remove('hidden');
            document.getElementById('ad-res').innerHTML = `ID: ${u.id} | NICK: ${u.nick}<br>ТЕКУЩИЙ БАЛАНС: ${u.bal}₽`;
            window.targetUid = u.id;
        }

        function adUpdateU() {
            const nb = parseInt(document.getElementById('ad-n-bal').value);
            rdb.ref('dogx_v100_final/users/' + window.targetUid).update({ bal: nb });
            Swal.fire('ОК', 'Баланс успешно изменен!', 'success');
        }

        function globalSync() {
            rdb.ref('dogx_v100_final/prods').set(db.prods);
            Swal.fire('CLOUD', 'Облако синхронизировано', 'success');
        }

        function showPay() { 
            Swal.fire({
                title: 'ID: ' + me.id,
                text: 'Скопируйте ваш ID и отправьте @sswckk для оплаты',
                icon: 'info',
                background: '#16171a',
                color: '#fff'
            });
        }

        init();
    </script>
</body>
</html>
