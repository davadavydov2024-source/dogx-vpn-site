<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Ultimate Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const app = initializeApp(firebaseConfig);
        const db_firebase = getDatabase(app);

        window.db = {};
        window.allUsers = {};
        window.user = JSON.parse(localStorage.getItem('dog_v29_me')) || null;

        const dbRef = ref(db_firebase, 'dog_system_db');
        const usersRef = ref(db_firebase, 'dog_users');

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.db = data;
                renderProducts();
                renderGlobalBC();
                if(document.getElementById('admin').classList.contains('active')) loadAdmin();
            } else {
                const initialDb = {
                    products: [{ id: Date.now(), name: "START", pr: 150, h: 720, icon: "🛡️", discount: 0 }],
                    promos: [],
                    broadcast: { text: "", active: false }
                };
                set(dbRef, initialDb);
            }
        });

        onValue(usersRef, (snapshot) => {
            window.allUsers = snapshot.val() || {};
            if (window.user && window.allUsers[window.user.id]) {
                window.user = window.allUsers[window.user.id];
                localStorage.setItem('dog_v29_me', JSON.stringify(window.user));
                updateUI();
            }
        });

        window.saveSystem = () => set(dbRef, window.db);
        window.saveUser = (u) => set(ref(db_firebase, 'dog_users/' + u.id), u);
        window.updateAllUsers = () => set(usersRef, window.allUsers);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .discount-badge { position: absolute; top: 0; right: 0; background: #ef4444; color: white; padding: 2px 8px; font-size: 8px; font-weight: 900; border-bottom-left-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <div id="globalBC" class="max-w-xl mx-auto m-4 hidden">
        <div class="player-card border border-amber-500/30 p-4 text-center">
            <p id="bcTextDisplay" class="text-[11px] font-bold"></p>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div><div class="text-2xl font-extrabold text-blue-500 italic">DOG X</div><div id="userDisplay" class="text-[9px] opacity-40 uppercase">...</div></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-xs font-bold opacity-60">Маркет</button>
            <button onclick="showTab('me')" class="text-xs font-bold opacity-60">Профиль</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-xs font-bold uppercase">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <h2 class="text-xl font-extrabold italic">Тарифы</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center border-b-4 border-blue-600/20">
            <p class="text-[10px] opacity-40 uppercase mb-2">Мой Баланс</p>
            <h3 class="text-5xl font-extrabold text-blue-500" id="userBal">0.00₽</h3>
            <div class="mt-6"><button onclick="topUp()" class="w-full py-4 btn-primary text-xs uppercase italic">Пополнить баланс</button></div>
        </div>
        <div id="keysList" class="space-y-3"></div>
        <input type="text" id="promoInp" placeholder="Промокод или Пароль" class="w-full p-4 player-card bg-transparent text-center text-sm">
        <button onclick="checkInput()" class="w-full py-4 btn-primary bg-white/5 text-[10px] uppercase">Активировать</button>
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6 border border-red-500/20">
            <h2 class="text-red-500 font-black uppercase text-center">Панель управления</h2>
            
            <div class="p-4 bg-white/5 rounded-2xl space-y-3">
                <p class="text-[10px] font-bold text-blue-400">ИЗМЕНИТЬ БАЛАНС ЮЗЕРУ</p>
                <input id="adm_uid" class="w-full p-3 bg-black/20 rounded-xl text-xs" placeholder="ID Юзера (из профиля)">
                <input id="adm_sum" type="number" class="w-full p-3 bg-black/20 rounded-xl text-xs" placeholder="Сумма (+/-)">
                <button onclick="adminChangeBalance()" class="w-full py-3 bg-blue-600 rounded-xl text-[10px] font-bold uppercase">Обновить баланс</button>
            </div>

            <div class="p-4 bg-white/5 rounded-2xl space-y-3">
                <p class="text-[10px] font-bold text-green-400">СОЗДАТЬ ПРОМОКОД</p>
                <input id="adm_promo_name" class="w-full p-3 bg-black/20 rounded-xl text-xs uppercase" placeholder="Код (например NEW)">
                <input id="adm_promo_val" type="number" class="w-full p-3 bg-black/20 rounded-xl text-xs" placeholder="Сумма за активацию">
                <button onclick="adminCreatePromo()" class="w-full py-3 bg-green-600 rounded-xl text-[10px] font-bold uppercase">Создать промо</button>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-bold opacity-30 uppercase">Настройка тарифов</p>
                <div id="admin_stocks" class="space-y-4"></div>
                <button onclick="addTariff()" class="w-full py-4 border-2 border-dashed border-white/10 rounded-2xl text-[10px] opacity-40 uppercase font-bold">+ Добавить новый тариф</button>
            </div>

            <button onclick="saveAdmin()" class="w-full py-6 btn-primary bg-red-600 text-sm font-black italic uppercase">Сохранить изменения в облаке</button>
        </div>
    </section>

    <script>
        function updateUI() {
            if(!window.user) { initUser(); return; }
            document.getElementById('userDisplay').innerText = `${window.user.nick} | #${window.user.id}`;
            document.getElementById('userBal').innerText = window.user.bal.toFixed(2) + '₽';
            renderKeys();
        }

        async function initUser() {
            const { value: nick } = await Swal.fire({ title: 'ТВОЙ НИК', input: 'text', background: '#191c24', color: '#fff', confirmButtonText: 'Погнали' });
            if(!nick) return initUser();
            const id = Math.floor(1000 + Math.random() * 8999);
            window.user = { id, nick, bal: 0, keys: [] };
            localStorage.setItem('dog_v29_me', JSON.stringify(window.user));
            window.saveUser(window.user);
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if(!window.db.products) return;
            grid.innerHTML = window.db.products.map(p => {
                const discount = parseInt(p.discount) || 0;
                const finalPrice = discount > 0 ? p.pr - (p.pr * (discount / 100)) : p.pr;
                return `
                <div class="player-card p-5 flex justify-between items-center relative overflow-hidden">
                    ${discount > 0 ? `<div class="discount-badge">-${discount}%</div>` : ''}
                    <div class="flex items-center gap-4"><div class="text-3xl">${p.icon || '🛡️'}</div><div><h4 class="font-bold text-xs uppercase">${p.name}</h4><p class="text-[9px] opacity-40">${p.h} часов</p></div></div>
                    <div class="text-right">
                        ${discount > 0 ? `<p class="text-[8px] opacity-30 line-through">${p.pr}₽</p>` : ''}
                        <button onclick="buyKey(${p.id})" class="px-6 py-2 btn-primary text-[10px] uppercase font-black">${finalPrice.toFixed(0)}₽</button>
                    </div>
                </div>
            `}).join('');
        }

        function loadAdmin() {
            const container = document.getElementById('admin_stocks');
            container.innerHTML = window.db.products.map(p => `
                <div class="p-4 bg-white/5 rounded-2xl space-y-3 relative border-l-4 border-red-500/20">
                    <div class="flex gap-2">
                        <input id="p_i_${p.id}" value="${p.icon || '🛡️'}" class="bg-black/40 rounded-lg p-2 text-center w-12 text-lg">
                        <input id="p_n_${p.id}" value="${p.name}" class="bg-black/40 rounded-lg p-2 text-xs font-bold flex-1 uppercase">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div><p class="text-[7px] opacity-30 mb-1">ЦЕНА</p><input id="p_p_${p.id}" value="${p.pr}" class="w-full bg-black/40 rounded-lg p-2 text-[10px]"></div>
                        <div><p class="text-[7px] opacity-30 mb-1">ЧАСЫ</p><input id="p_h_${p.id}" value="${p.h}" class="w-full bg-black/40 rounded-lg p-2 text-[10px]"></div>
                        <div><p class="text-[7px] opacity-30 mb-1">СКИДКА %</p><input id="p_d_${p.id}" value="${p.discount || 0}" class="w-full bg-black/40 rounded-lg p-2 text-[10px] text-red-400"></div>
                    </div>
                    <button onclick="deleteProduct(${p.id})" class="w-full py-2 bg-red-500/10 text-red-500 text-[8px] font-black uppercase rounded-lg">Удалить этот тариф</button>
                </div>
            `).join('');
        }

        function deleteProduct(id) {
            Swal.fire({
                title: 'Удалить?',
                text: "Тариф исчезнет после сохранения",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Удалить'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.db.products = window.db.products.filter(p => p.id !== id);
                    loadAdmin();
                }
            })
        }

        function addTariff() {
            const newId = Date.now();
            window.db.products.push({ id: newId, name: "NEW", pr: 100, h: 24, icon: "⚡", discount: 0 });
            loadAdmin();
        }

        function saveAdmin() {
            window.db.products.forEach(p => {
                p.icon = document.getElementById(`p_i_${p.id}`).value;
                p.name = document.getElementById(`p_n_${p.id}`).value;
                p.pr = parseInt(document.getElementById(`p_p_${p.id}`).value) || 0;
                p.h = parseInt(document.getElementById(`p_h_${p.id}`).value) || 0;
                p.discount = parseInt(document.getElementById(`p_d_${p.id}`).value) || 0;
            });
            window.saveSystem();
            Swal.fire('ОБЛАКО ОБНОВЛЕНО', 'Изменения вступили в силу у всех', 'success');
        }

        function adminChangeBalance() {
            const uid = document.getElementById('adm_uid').value;
            const sum = parseFloat(document.getElementById('adm_sum').value);
            if(!window.allUsers[uid]) return Swal.fire('Ошибка', 'Юзер не найден', 'error');
            window.allUsers[uid].bal += sum;
            window.updateAllUsers();
            Swal.fire('Готово', 'Баланс обновлен', 'success');
        }

        function adminCreatePromo() {
            const name = document.getElementById('adm_promo_name').value.toUpperCase();
            const val = parseFloat(document.getElementById('adm_promo_val').value);
            if(!window.db.promos) window.db.promos = [];
            window.db.promos.push({ code: name, sum: val });
            window.saveSystem();
            Swal.fire('ПРОМО СОЗДАН', name, 'success');
        }

        function checkInput() {
            const val = document.getElementById('promoInp').value.trim();
            if(val === 'kalubxq') {
                document.getElementById('adminBtn').classList.remove('hidden');
                return Swal.fire('ДОСТУП', 'Админ-панель открыта', 'success');
            }
            if(window.db.promos) {
                const promo = window.db.promos.find(p => p.code === val.toUpperCase());
                if(promo) {
                    window.user.bal += promo.sum;
                    window.saveUser(window.user);
                    window.db.promos = window.db.promos.filter(p => p.code !== val.toUpperCase());
                    window.saveSystem();
                    return Swal.fire('БОНУС!', `Начислено ${promo.sum}₽`, 'success');
                }
            }
            Swal.fire('ОШИБКА', 'Код неверный', 'error');
        }

        function buyKey(id) {
            const p = window.db.products.find(x => x.id === id);
            const disc = p.discount || 0;
            const price = disc > 0 ? p.pr - (p.pr * (disc / 100)) : p.pr;
            if(window.user.bal < price) return Swal.fire('ОШИБКА', 'Недостаточно денег', 'error');
            window.user.bal -= price;
            if(!window.user.keys) window.user.keys = [];
            window.user.keys.unshift({ name: p.name, key: "DOG-" + Math.random().toString(36).substr(2, 9).toUpperCase() });
            window.saveUser(window.user);
            Swal.fire('УСПЕХ', 'Ключ в профиле', 'success');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'admin') loadAdmin();
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            if(!window.user.keys || window.user.keys.length === 0) {
                list.innerHTML = `<p class="text-center opacity-20 text-[10px] uppercase">Ваши ключи появятся здесь</p>`;
                return;
            }
            list.innerHTML = window.user.keys.map(k => `
                <div class="player-card p-4 border-l-2 border-blue-500">
                    <p class="text-[9px] font-bold opacity-40 mb-1 uppercase">${k.name}</p>
                    <div class="bg-black/20 p-2 rounded text-[11px] font-mono select-all">${k.key}</div>
                </div>
            `).join('');
        }
        
        function renderGlobalBC() {
            const bc = window.db.broadcast;
            const box = document.getElementById('globalBC');
            if(bc && bc.active) { box.classList.remove('hidden'); document.getElementById('bcTextDisplay').innerText = bc.text; }
            else { box.classList.add('hidden'); }
        }

        function topUp() { Swal.fire('ПОПОЛНЕНИЕ', 'Напишите в поддержку @sswckk', 'info'); }
    </script>
</body>
</html>
