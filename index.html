<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Professional System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .promo-banner { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #232733; border: 1px solid var(--accent); border-radius: 18px; z-index: 50; display: none; align-items: center; gap: 12px; padding: 12px; }
        .discount-badge { background: #ef4444; color: white; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: 800; position: absolute; top: -10px; right: 10px; }
        input, textarea { outline: none !important; }
    </style>
</head>
<body class="pb-32">

    <div id="bcBanner" class="max-w-xl mx-auto m-4 hidden">
        <div class="player-card p-4 border-amber-500/30 flex items-center gap-4 relative">
            <img id="bcImg" src="" class="w-12 h-12 rounded-lg object-cover hidden">
            <div class="flex-1 text-[11px] font-bold text-amber-400 italic" id="bcText"></div>
            <button onclick="this.parentElement.parentElement.remove()" class="text-xs opacity-30">✕</button>
        </div>
    </div>

    <div id="promoBanner" class="promo-banner">
        <img id="promoImg" src="" class="w-12 h-12 rounded-lg object-cover hidden">
        <div class="flex-1"><p id="promoText" class="text-[11px] font-bold"></p><a href="https://t.me/sswckk" target="_blank" class="text-[10px] text-blue-400 font-bold underline">Подробнее</a></div>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div><div class="text-2xl font-extrabold tracking-tighter text-blue-500 italic uppercase">Dog X</div><div id="userDisplay" class="text-[9px] font-bold opacity-40 uppercase mt-1">ID: #----</div></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-xs font-bold opacity-60 uppercase">Маркет</button>
            <button onclick="showTab('me')" class="text-xs font-bold opacity-60 uppercase">Кабинет</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-xs font-bold uppercase">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <h2 class="text-xl font-extrabold">VPN Тарифы</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center relative border-b-4 border-blue-600/20">
            <p class="text-[10px] opacity-40 font-bold uppercase mb-2">Баланс</p>
            <h3 class="text-5xl font-extrabold mb-8 text-blue-500" id="userBal">0.00₽</h3>
            <div class="flex gap-2"><button onclick="topUp()" class="flex-1 py-4 btn-primary text-xs uppercase">Пополнить</button><button onclick="installApp()" class="flex-1 py-4 player-card text-xs font-bold uppercase">Инфо</button></div>
        </div>
        <div id="keysList" class="space-y-3"></div>
        <div class="space-y-3">
            <input type="text" id="promoInp" placeholder="Промокод или Пароль" class="w-full p-4 player-card bg-transparent text-center text-sm border border-white/5 focus:border-blue-500/50">
            <button onclick="checkInput()" class="w-full py-3 text-[10px] font-bold opacity-50 uppercase tracking-widest">Активировать</button>
        </div>
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6 border border-red-500/20">
            <h2 class="text-red-500 font-black italic uppercase">Admin Settings</h2>
            
            <div class="space-y-4 p-4 bg-purple-500/10 rounded-2xl border border-purple-500/20">
                <h3 class="text-[10px] font-black uppercase text-purple-400">Промокоды на баланс</h3>
                <input id="new_p_code" class="w-full p-3 player-card bg-transparent text-xs uppercase" placeholder="КОД">
                <div class="grid grid-cols-2 gap-2"><input id="new_p_sum" class="p-3 player-card bg-transparent text-xs" placeholder="Сумма ₽"><input id="new_p_uses" class="p-3 player-card bg-transparent text-xs" placeholder="Лимит"></div>
                <button onclick="addPromo()" class="w-full py-3 btn-primary bg-purple-600 text-[10px]">СОЗДАТЬ</button>
                <div id="promo_active_list" class="text-[9px] opacity-60 space-y-1"></div>
            </div>

            <div id="admin_stocks" class="space-y-6"></div>
            <button onclick="addTariffPrompt()" class="w-full py-3 border-2 border-dashed border-blue-500/30 rounded-xl text-[10px] font-bold">+ НОВЫЙ ТАРИФ</button>

            <div class="space-y-4 p-4 bg-white/5 rounded-2xl">
                <h3 class="text-[10px] font-black opacity-40 uppercase text-blue-400">Контент и Реклама</h3>
                <input id="a_card" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Реквизиты">
                
                <input id="a_promo_text" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Текст рекламы">
                <button onclick="document.getElementById('promoFile').click()" class="w-full py-2 player-card text-[10px]">ФОТО РЕКЛАМЫ</button>
                <input type="file" id="promoFile" class="hidden" accept="image/*" onchange="handleImg(this, 'promo')">
                
                <hr class="opacity-10">
                
                <input id="a_bc_text" class="w-full p-3 player-card bg-transparent text-xs" placeholder="Текст рассылки">
                <button onclick="document.getElementById('bcFile').click()" class="w-full py-2 player-card text-[10px]">ФОТО РАССЫЛКИ</button>
                <input type="file" id="bcFile" class="hidden" accept="image/*" onchange="handleImg(this, 'bc')">
            </div>

            <button onclick="saveAdmin()" class="w-full py-5 btn-primary bg-red-600 uppercase italic">Сохранить изменения</button>
        </div>
    </section>

    <script>
        let allUsers = JSON.parse(localStorage.getItem('dog_users_db')) || {};
        let db = JSON.parse(localStorage.getItem('dog_v28_db')) || {
            card: "sswckk",
            promo_msg: { text: "", img: "" }, bc: { text: "", img: "" },
            products: [{ id: 1, name: "ПРОБНЫЙ", pr: 10, h: 24, icon: "⚡", discount: 0, stock: { ios: [], and: [] } }],
            promos: []
        };
        let user = JSON.parse(localStorage.getItem('dog_v28_me')) || null;

        window.onload = () => { if(!user) initUser(); else sync(); };

        async function initUser() {
            const { value: nick } = await Swal.fire({ title: 'DOG X', input: 'text', background: '#191c24', color: '#fff' });
            const id = Math.floor(1000 + Math.random() * 9000);
            user = { id, nick: nick || 'Player', bal: 0, keys: [] };
            allUsers[id] = user; save(); sync();
        }

        function sync() {
            if(allUsers[user.id]) user = allUsers[user.id];
            document.getElementById('userDisplay').innerText = `${user.nick} | #${user.id}`;
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            renderProducts(); renderKeys(); renderPromoMsg(); renderBC(); loadAdmin();
        }

        function checkInput() {
            const val = document.getElementById('promoInp').value.trim();
            if(val === 'kalubxq') { document.getElementById('adminBtn').classList.remove('hidden'); Swal.fire('ADMIN','Панель открыта','success'); return; }
            const p = db.promos.find(x => x.code.toUpperCase() === val.toUpperCase());
            if(p && p.uses > 0 && !p.used_by.includes(user.id)) {
                p.uses--; p.used_by.push(user.id); user.bal += p.sum;
                allUsers[user.id] = user; save(); sync(); Swal.fire('УСПЕХ', `+${p.sum}₽`, 'success');
            } else { Swal.fire('ОШИБКА', 'Код неверен или использован', 'error'); }
            document.getElementById('promoInp').value = '';
        }

        function handleImg(input, target) {
            const reader = new FileReader();
            reader.onloadend = () => { if(target === 'promo') db.promo_msg.img = reader.result; else db.bc.img = reader.result; save(); sync(); };
            reader.readAsDataURL(input.files[0]);
        }

        function renderProducts() {
            document.getElementById('productsGrid').innerHTML = db.products.map(p => {
                const finalPrice = p.discount > 0 ? Math.floor(p.pr * (1 - p.discount/100)) : p.pr;
                return `<div class="player-card p-5 flex justify-between items-center relative">
                    ${p.discount > 0 ? `<div class="discount-badge">-${p.discount}%</div>` : ''}
                    <div class="flex items-center gap-4"><div class="text-3xl">${p.icon}</div><div><h4 class="font-extrabold text-sm uppercase">${p.name}</h4><p class="text-[10px] opacity-40">${p.h} ч.</p></div></div>
                    <div class="text-right"><div>${p.discount > 0 ? `<span class="text-[10px] opacity-30 line-through">${p.pr}₽</span>` : ''}<span class="font-extrabold text-lg text-blue-400"> ${finalPrice}₽</span></div>
                    <button onclick="buyKey(${p.id})" class="mt-2 px-6 py-2 btn-primary text-[10px] uppercase">Купить</button></div></div>`;
            }).join('');
        }

        function buyKey(id) {
            const p = db.products.find(x => x.id === id);
            const price = p.discount > 0 ? Math.floor(p.pr * (1 - p.discount/100)) : p.pr;
            if(user.bal < price) return Swal.fire('Мало средств','','error');
            Swal.fire({ title: 'ОС', showCancelButton: true, confirmButtonText: 'iOS', cancelButtonText: 'Android' }).then((r) => {
                const os = r.isConfirmed ? 'ios' : 'and';
                if(!p.stock[os] || p.stock[os].length === 0) return Swal.fire('Нет ключей','','warning');
                user.keys.unshift({ key: p.stock[os].shift(), name: `${p.name} (${os.toUpperCase()})`, expire: Date.now() + (p.h * 3600000) });
                user.bal -= price; allUsers[user.id] = user; save(); sync(); Swal.fire('ОК','Ключ в кабинете','success');
            });
        }

        function loadAdmin() {
            document.getElementById('a_card').value = db.card;
            document.getElementById('a_promo_text').value = db.promo_msg.text;
            document.getElementById('a_bc_text').value = db.bc.text;
            document.getElementById('promo_active_list').innerHTML = db.promos.map(p => `• ${p.code} (${p.sum}₽) - ост. ${p.uses}`).join('<br>');
            document.getElementById('admin_stocks').innerHTML = db.products.map(p => `
                <div class="p-4 bg-white/5 rounded-2xl space-y-3 relative">
                    <button onclick="deleteTariff(${p.id})" class="absolute top-2 right-2 text-red-500 opacity-30">✕</button>
                    <h4 class="text-[10px] font-black uppercase text-blue-400">${p.name}</h4>
                    <div class="grid grid-cols-3 gap-2">
                        <input id="price_${p.id}" value="${p.pr}" class="p-2 player-card bg-transparent text-[10px]" placeholder="₽">
                        <input id="hour_${p.id}" value="${p.h}" class="p-2 player-card bg-transparent text-[10px]" placeholder="Ч">
                        <input id="disc_${p.id}" value="${p.discount || 0}" class="p-2 player-card bg-transparent text-[10px] border-red-500/30 border" placeholder="%">
                    </div>
                    <textarea id="stock_${p.id}_ios" class="w-full h-16 p-2 player-card bg-transparent text-[8px]" placeholder="iOS">${p.stock.ios.join('\n')}</textarea>
                    <textarea id="stock_${p.id}_and" class="w-full h-16 p-2 player-card bg-transparent text-[8px]" placeholder="Android">${p.stock.and.join('\n')}</textarea>
                </div>`).join('');
        }

        function saveAdmin() {
            db.card = document.getElementById('a_card').value;
            db.promo_msg.text = document.getElementById('a_promo_text').value;
            db.bc.text = document.getElementById('a_bc_text').value;
            db.products.forEach(p => {
                p.pr = parseInt(document.getElementById(`price_${p.id}`).value);
                p.h = parseInt(document.getElementById(`hour_${p.id}`).value);
                p.discount = parseInt(document.getElementById(`disc_${p.id}`).value);
                p.stock.ios = document.getElementById(`stock_${p.id}_ios`).value.split('\n').filter(l => l.length > 5);
                p.stock.and = document.getElementById(`stock_${p.id}_and`).value.split('\n').filter(l => l.length > 5);
            });
            save(); location.reload();
        }

        function renderPromoMsg() {
            if(db.promo_msg.text) {
                document.getElementById('promoBanner').style.display = 'flex';
                document.getElementById('promoText').innerText = db.promo_msg.text;
                if(db.promo_msg.img) { document.getElementById('promoImg').src = db.promo_msg.img; document.getElementById('promoImg').classList.remove('hidden'); }
            }
        }
        function renderBC() {
            if(db.bc.text) {
                document.getElementById('bcBanner').classList.remove('hidden');
                document.getElementById('bcText').innerText = db.bc.text;
                if(db.bc.img) { document.getElementById('bcImg').src = db.bc.img; document.getElementById('bcImg').classList.remove('hidden'); }
            }
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            if(user.keys.length === 0) { list.innerHTML = `<div class="p-10 text-center opacity-20 text-xs uppercase">Ключей нет</div>`; return; }
            list.innerHTML = user.keys.map(k => `<div class="player-card p-4 border-l-2 border-blue-500 mb-2"><div class="flex justify-between text-[10px] mb-2"><span>${k.name}</span><span>${new Date(k.expire).toLocaleDateString()}</span></div><div class="bg-black/40 p-3 rounded-lg text-[9px] font-mono break-all mb-3">${k.key}</div><button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('ОК','Скопировано','success')" class="w-full py-2 bg-white/5 rounded-lg text-[10px] font-bold">КОПИРОВАТЬ</button></div>`).join('');
        }

        async function addTariffPrompt() {
            const { value: name } = await Swal.fire({ title: 'Название', input: 'text', background: '#191c24', color: '#fff' });
            if(name) { db.products.push({ id: Date.now(), name, pr: 100, h: 720, icon: '🛡️', discount: 0, stock: { ios: [], and: [] } }); save(); sync(); }
        }
        function addPromo() {
            const code = document.getElementById('new_p_code').value.toUpperCase();
            const sum = parseFloat(document.getElementById('new_p_sum').value);
            const uses = parseInt(document.getElementById('new_p_uses').value);
            if(code && sum) { db.promos.push({ code, sum, uses, used_by: [] }); save(); sync(); }
        }
        function deleteTariff(id) { db.products = db.products.filter(p => p.id !== id); save(); sync(); }
        function save() { localStorage.setItem('dog_v28_db', JSON.stringify(db)); localStorage.setItem('dog_v28_me', JSON.stringify(user)); localStorage.setItem('dog_users_db', JSON.stringify(allUsers)); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function topUp() { Swal.fire({ title: 'ОПЛАТА', html: `Реквизиты: ${db.card}<br>@sswckk`, background: '#191c24', color: '#fff' }); }
        function installApp() { Swal.fire({ title: 'DOG X', text: 'Ключи для Happ Plus (VLESS)', background: '#191c24', color: '#fff' }); }
    </script>
</body>
</html>
