<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | v80 GODMODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { background: #010204; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .tab { display: none; }
        .tab.active { display: block; animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .btn-gold { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); font-weight: 800; color: #000; }
        .btn-admin { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); font-weight: 800; }
        .unbound { font-family: 'Unbounded', sans-serif; }
        input, textarea, select { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 12px !important; font-size: 12px !important; }
        .badge-discount { background: #ef4444; color: white; padding: 2px 6px; border-radius: 6px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#010204]/90 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center shadow-amber-500/20 shadow-lg">
                <i class="fa-solid fa-crown text-black text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-black italic unbound">DOG <span class="text-amber-500">GOD</span></h1>
                <p id="st-label" class="text-[7px] font-black opacity-40 tracking-[3px]">V80 • СИСТЕМА ОНЛАЙН</p>
            </div>
        </div>
        <div id="u-name-top" class="text-[10px] font-black opacity-50 bg-white/5 px-3 py-1 rounded-full uppercase">...</div>
    </header>

    <main id="home" class="tab active px-6 space-y-6">
        <div id="bc-banner" class="hidden glass p-5 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 opacity-10"><i class="fa-solid fa-bolt text-4xl"></i></div>
            <p id="bc-text" class="text-xs font-bold italic text-amber-200"></p>
        </div>
        <div id="product-list" class="space-y-4 pt-2"></div>
    </main>

    <section id="me" class="tab px-6 space-y-6">
        <div class="glass p-8 text-center border-amber-500/10">
            <p id="u-rank" class="text-[8px] font-black text-amber-500 tracking-[5px] mb-2 uppercase">ПОЛЬЗОВАТЕЛЬ</p>
            <h3 class="text-6xl font-black italic mb-8" id="u-bal">0₽</h3>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="showPay()" class="btn-gold py-4 rounded-2xl text-[10px]">ПОПОЛНИТЬ</button>
                <button onclick="showMigrate()" class="bg-white/5 py-4 rounded-2xl text-[10px] font-bold">ПЕРЕНОС</button>
            </div>
        </div>

        <div class="glass p-5 space-y-4">
            <p class="text-[8px] font-black opacity-30 uppercase tracking-[4px] text-center">АДМИН-ДОСТУП</p>
            <input type="password" id="adm-key" oninput="valAdm(this.value)" class="w-full p-4 text-center tracking-[12px] outline-none" placeholder="••••••">
        </div>

        <div id="my-items" class="space-y-3 pb-10"></div>
    </section>

    <section id="admin" class="tab px-6 space-y-6 pb-40">
        <div class="text-center py-4"><h2 class="unbound text-[10px] font-black text-red-500 tracking-[6px]">GODMODE CONTROL v80</h2></div>

        <div class="glass p-5 space-y-4 border-red-500/20">
            <p class="text-[10px] font-black text-red-400 uppercase">📊 Аналитика & База (Ф-ции 1-20)</p>
            <div class="flex gap-2">
                <input id="ad-search-id" class="flex-1 p-3" placeholder="Введите ID (DX-...)">
                <button onclick="adDeepSearch()" class="bg-red-600 px-4 rounded-xl text-xs"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            
            <div id="ad-res" class="hidden bg-black/60 p-4 rounded-2xl text-[10px] font-mono space-y-2 border border-white/5">
                </div>

            <div class="grid grid-cols-2 gap-2">
                <input id="ad-new-nick" class="p-2" placeholder="Новый ник">
                <input id="ad-new-id" class="p-2" placeholder="Новый ID">
                <input id="ad-new-bal" class="p-2" placeholder="Новый баланс">
                <button onclick="adUpdateAcc()" class="bg-indigo-600 rounded-xl text-[8px] font-black uppercase">Обновить данные</button>
            </div>
            <button onclick="adDeleteAcc()" class="w-full py-3 bg-red-900/40 border border-red-500/50 rounded-xl text-[8px] font-black text-red-500 uppercase">Удалить аккаунт навсегда</button>
        </div>

        <div class="glass p-5 space-y-4">
            <p class="text-[10px] font-black text-amber-500 uppercase">🛒 Витрина & Скидки (Ф-ции 21-45)</p>
            <button onclick="adAddP()" class="w-full py-2 bg-white/5 rounded-lg text-[9px] font-bold">+ СОЗДАТЬ ТОВАР (СО СМАЙЛАМИ)</button>
            <div id="ad-plist" class="space-y-4"></div>
        </div>

        <div class="glass p-5 space-y-4">
            <p class="text-[10px] font-black text-blue-400 uppercase">⚙️ Глобальные Настройки (Ф-ции 46-70)</p>
            <div class="grid grid-cols-2 gap-2 text-[8px] font-bold">
                <button onclick="adToggle('maint')" class="bg-white/5 p-3 rounded-xl uppercase">Тех. работы</button>
                <button onclick="adToggle('bc')" class="bg-white/5 p-3 rounded-xl uppercase">Баннер</button>
                <button onclick="adExport()" class="bg-white/5 p-3 rounded-xl uppercase">Экспорт базы</button>
                <button onclick="adClearL()" class="bg-white/5 p-3 rounded-xl uppercase">Очистить логи</button>
            </div>
            <textarea id="ad-bc-val" class="w-full p-3 h-20" placeholder="Текст объявления..."></textarea>
            <div id="ad-logs" class="h-24 overflow-y-auto bg-black/40 rounded-xl p-3 text-[7px] font-mono opacity-30"></div>
        </div>

        <button onclick="saveGod()" class="w-full py-6 btn-admin rounded-[30px] text-[11px] shadow-2xl uppercase italic">Применить изменения v80</button>
    </section>

    <nav class="nav-bar fixed bottom-0 left-0 right-0 h-24 flex justify-around items-center px-10 z-[60]">
        <button onclick="setTab('home')" id="btn-home" class="nav-item active flex flex-col items-center gap-1 opacity-40">
            <i class="fa-solid fa-shop text-xl"></i>
            <span class="text-[8px] font-black uppercase">Магазин</span>
        </button>
        <button onclick="setTab('me')" id="btn-me" class="nav-item flex flex-col items-center gap-1 opacity-40">
            <i class="fa-solid fa-user-gear text-xl"></i>
            <span class="text-[8px] font-black uppercase">Профиль</span>
        </button>
    </nav>

    <script>
        let god = JSON.parse(localStorage.getItem('dogx_v80')) || {
            users: {},
            products: [{id: 1, name: "🚀 PREMIUM ACC", pr: 1000, disc: 10, stock: ["KEY-X", "KEY-Y"]}],
            sys: { bc: {active: true, text: "DOG X v80: GODMODE ENABLED"}, maint: false, logs: [] }
        };

        let me = null;

        function init() {
            const uid = localStorage.getItem('dogx_uid');
            if(!uid) return showReg();
            me = god.users[uid];
            if(!me) { localStorage.clear(); location.reload(); }
            render();
        }

        async function showReg() {
            const { value: res } = await Swal.fire({
                title: 'РЕГИСТРАЦИЯ v80',
                html: '<input id="reg-n" class="swal2-input" placeholder="Ник"><input id="reg-p" type="password" class="swal2-input" placeholder="Пароль">',
                background: '#010204', color: '#fff', confirmButtonText: 'СОЗДАТЬ', allowOutsideClick: false,
                preConfirm: () => [document.getElementById('reg-n').value, document.getElementById('reg-p').value]
            });
            if(res) {
                const id = 'DX-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                god.users[id] = { id, nick: res[0], pass: res[1], bal: 0, rank: 'User', items: [], date: new Date().toLocaleDateString() };
                localStorage.setItem('dogx_uid', id);
                save(); location.reload();
            }
        }

        function save() { localStorage.setItem('dogx_v80', JSON.stringify(god)); render(); }

        function render() {
            if(!me) return;
            document.getElementById('u-bal').innerText = me.bal.toLocaleString() + '₽';
            document.getElementById('u-name-top').innerText = me.nick;
            document.getElementById('u-rank').innerText = me.rank;
            
            document.getElementById('product-list').innerHTML = god.products.map(p => {
                const finalPrice = Math.floor(p.pr * (1 - (p.disc || 0) / 100));
                return `
                <div class="glass p-6 flex justify-between items-center relative overflow-hidden">
                    ${p.disc > 0 ? `<div class="absolute top-0 left-0 badge-discount">-${p.disc}%</div>` : ''}
                    <div>
                        <h4 class="text-sm font-black uppercase italic unbound">${p.name}</h4>
                        <div class="flex gap-2 items-center">
                            <span class="${p.disc > 0 ? 'line-through opacity-30 text-[10px]' : 'text-amber-500 font-bold'}">${p.pr}₽</span>
                            ${p.disc > 0 ? `<span class="text-amber-500 font-black text-sm">${finalPrice}₽</span>` : ''}
                        </div>
                    </div>
                    <button onclick="buyP(${p.id})" class="btn-gold px-6 py-3 rounded-xl text-[10px] font-black italic">КУПИТЬ</button>
                </div>`;
            }).join('');

            document.getElementById('my-items').innerHTML = me.items.map(i => `
                <div class="glass p-4 flex justify-between items-center border-l-2 border-amber-500">
                    <div><p class="text-[8px] opacity-40 font-black uppercase">${i.name}</p><p class="text-xs font-mono font-bold text-amber-200">${i.key}</p></div>
                    <i class="fa-solid fa-check-double text-amber-500 opacity-20"></i>
                </div>`).join('');

            document.getElementById('bc-banner').classList.toggle('hidden', !god.sys.bc.active);
            document.getElementById('bc-text').innerText = god.sys.bc.text;
        }

        function buyP(id) {
            const p = god.products.find(x => x.id === id);
            const price = Math.floor(p.pr * (1 - (p.disc || 0) / 100));
            if(me.bal < price) return Swal.fire('ОШИБКА', 'Недостаточно средств', 'error');
            if(p.stock.length === 0) return Swal.fire('СКЛАД', 'Нет в наличии', 'warning');
            const key = p.stock.shift();
            me.bal -= price;
            me.items.unshift({name: p.name, key});
            god.sys.logs.unshift(`[BUY] ${me.nick} купил ${p.name}`);
            save();
            Swal.fire('УСПЕХ', 'Товар добавлен в профиль!', 'success');
        }

        // --- GODMODE (ADMIN) ---
        function valAdm(v) { if(v.toUpperCase() === 'KALUBXQ') setTab('admin'); }
        function setTab(t) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.style.opacity = '0.4');
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-' + t).style.opacity = '1';
            if(t === 'admin') renderAdmin();
        }

        function renderAdmin() {
            document.getElementById('ad-logs').innerHTML = god.sys.logs.map(l => `<div>${l}</div>`).join('');
            document.getElementById('ad-bc-val').value = god.sys.bc.text;
            document.getElementById('ad-plist').innerHTML = god.products.map(p => `
                <div class="bg-white/5 p-4 rounded-xl border border-white/5 space-y-2">
                    <input id="ap-n-${p.id}" value="${p.name}" class="w-full bg-transparent font-bold">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="ap-p-${p.id}" type="number" value="${p.pr}" placeholder="Цена">
                        <input id="ap-d-${p.id}" type="number" value="${p.disc}" placeholder="Скидка %">
                    </div>
                    <textarea id="ap-s-${p.id}" class="w-full h-10 text-[9px]" placeholder="Ключи (через запятую)">${p.stock.join(',')}</textarea>
                </div>`).join('');
        }

        function adDeepSearch() {
            const sid = document.getElementById('ad-search-id').value;
            const u = god.users[sid];
            const r = document.getElementById('ad-res');
            r.classList.remove('hidden');
            if(!u) { r.innerHTML = '❌ ЮЗЕР НЕ НАЙДЕН'; return; }
            r.innerHTML = `
                <div class="text-amber-500 font-black">ID: ${u.id}</div>
                <div>НИК: ${u.nick}</div>
                <div>ПАРОЛЬ: ${u.pass}</div>
                <div>БАЛАНС: ${u.bal}₽</div>
                <div>РАНГ: ${u.rank}</div>
                <div>ДАТА: ${u.date}</div>
            `;
            document.getElementById('ad-new-nick').value = u.nick;
            document.getElementById('ad-new-id').value = u.id;
            document.getElementById('ad-new-bal').value = u.bal;
        }

        function adUpdateAcc() {
            const oldId = document.getElementById('ad-search-id').value;
            const newId = document.getElementById('ad-new-id').value;
            const target = god.users[oldId];
            if(!target) return;
            
            target.nick = document.getElementById('ad-new-nick').value;
            target.bal = parseInt(document.getElementById('ad-new-bal').value);
            
            if(oldId !== newId) {
                target.id = newId;
                god.users[newId] = target;
                delete god.users[oldId];
                if(localStorage.getItem('dogx_uid') === oldId) localStorage.setItem('dogx_uid', newId);
            }
            save();
            Swal.fire('ГОТОВО', 'Данные обновлены!', 'success');
        }

        function adDeleteAcc() {
            const sid = document.getElementById('ad-search-id').value;
            if(god.users[sid]) {
                delete god.users[sid];
                save();
                Swal.fire('УДАЛЕНО', 'Аккаунт стерт из базы', 'warning');
            }
        }

        function saveGod() {
            god.sys.bc.text = document.getElementById('ad-bc-val').value;
            god.products.forEach(p => {
                p.name = document.getElementById(`ap-n-${p.id}`).value;
                p.pr = parseInt(document.getElementById(`ap-p-${p.id}`).value);
                p.disc = parseInt(document.getElementById(`ap-d-${p.id}`).value) || 0;
                p.stock = document.getElementById(`ap-s-${p.id}`).value.split(',').filter(x => x);
            });
            save();
            Swal.fire('GODMODE', 'Система синхронизирована', 'success');
        }

        function adAddP() { god.products.push({id: Date.now(), name: "🆕 ТОВАР", pr: 0, disc: 0, stock: []}); renderAdmin(); }
        function adToggle(t) { if(t==='bc') god.sys.bc.active = !god.sys.bc.active; save(); }
        function showPay() { Swal.fire('ОПЛАТА', 'Твой ID: ' + me.id + '<br>Напиши @sswckk', 'info'); }
        function showMigrate() { Swal.fire('ID ПЕРЕНОСА', me.id, 'info'); }

        init();
    </script>
</body>
</html>
