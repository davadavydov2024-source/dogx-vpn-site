<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | Ultimate Admin & Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base",
            storageBucket: "dogx-base.firebasestorage.app",
            messagingSenderId: "81713249793",
            appId: "1:81713249793:web:1b44a13e6faf5acfa78a00"
        };

        const app = initializeApp(firebaseConfig);
        const db_firebase = getDatabase(app);

        window.db = {};
        window.allUsers = {};
        window.user = JSON.parse(localStorage.getItem('dog_v29_me')) || null;

        const dbRef = ref(db_firebase, 'dog_system_db');
        const usersRef = ref(db_firebase, 'dog_users');

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.db = data;
                renderProducts();
                renderGlobalBC();
                renderFooterAd();
                if(document.getElementById('admin').classList.contains('active')) loadAdmin();
            }
        });

        onValue(usersRef, (snapshot) => {
            window.allUsers = snapshot.val() || {};
            if (window.user && window.allUsers[window.user.id]) {
                window.user = window.allUsers[window.user.id];
                localStorage.setItem('dog_v29_me', JSON.stringify(window.user));
                updateUI();
            } else if (window.user && !window.allUsers[window.user.id]) {
                localStorage.removeItem('dog_v29_me');
                window.user = null;
                location.reload();
            }
        });

        window.saveSystem = () => set(dbRef, window.db);
        window.saveUser = (u) => set(ref(db_firebase, 'dog_users/' + u.id), u);
        window.firebase_db_mod = { getDatabase, ref, set, remove, get };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        :root { --bg: #0f1117; --card: #191c24; --accent: #5865f2; }
        body { background: var(--bg); color: #fff; font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .player-card { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--accent); color: #fff; border-radius: 12px; font-weight: 700; transition: 0.2s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .footer-ad { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: var(--card); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px; display: none; }
        .swal2-popup { border-radius: 25px !important; background: #191c24 !important; color: #fff !important; }
    </style>
</head>
<body class="pb-40">

    <div id="globalBC" class="max-w-xl mx-auto m-4 hidden">
        <div class="player-card border border-amber-500/30 p-4 flex items-center gap-4">
            <img id="bcImgDisplay" src="" class="w-12 h-12 rounded-lg object-cover hidden">
            <div class="flex-1">
                <p id="bcTextDisplay" class="text-[11px] font-bold"></p>
                <div id="bcBtnBox" class="mt-2"></div>
            </div>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div><div class="text-2xl font-extrabold text-blue-500 italic uppercase">Dog X</div><div id="userDisplay" class="text-[9px] opacity-40">...</div></div>
        <div class="flex gap-4">
            <button onclick="showTab('home')" class="text-xs font-bold opacity-60">Маркет</button>
            <button onclick="showTab('me')" class="text-xs font-bold opacity-60">Профиль</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500 text-xs font-bold uppercase">Admin</button>
        </div>
    </header>

    <main id="home" class="tab-content active px-6 space-y-4">
        <h2 class="text-xl font-extrabold italic">Тарифы</h2>
        <div id="productsGrid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <section id="me" class="tab-content px-6 space-y-6">
        <div class="player-card p-8 text-center border-b-4 border-blue-600/20">
            <p class="text-[10px] opacity-40 uppercase mb-2">Баланс</p>
            <h3 class="text-5xl font-extrabold text-blue-500" id="userBal">0.00₽</h3>
            <div class="mt-6"><button onclick="topUp()" class="w-full py-4 btn-primary text-xs uppercase italic">Пополнить</button></div>
        </div>
        <div id="keysList" class="space-y-3"></div>
        <input type="text" id="promoInp" placeholder="Промокод" class="w-full p-4 player-card bg-transparent text-center text-sm">
        <button onclick="checkInput()" class="w-full py-4 btn-primary bg-white/5 text-[10px] uppercase">Активировать</button>
    </section>

    <section id="admin" class="tab-content px-6 pb-20 space-y-6">
        <div class="player-card p-6 space-y-6 border border-red-500/20">
            <h2 class="text-red-500 font-black uppercase text-center text-sm">Панель Управления</h2>
            
            <div class="p-4 bg-green-500/5 rounded-2xl space-y-3">
                <p class="text-[10px] font-bold text-green-500 uppercase">📊 Аналитика</p>
                <div id="adm_users_list" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="p-4 bg-amber-500/5 rounded-2xl space-y-2">
                    <p class="text-[10px] font-bold text-amber-500 uppercase">Рассылка (Верх)</p>
                    <textarea id="adm_bc_text" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Текст"></textarea>
                    <input id="adm_bc_url" class="w-full p-2 bg-black/20 rounded text-[10px]" placeholder="URL кнопки">
                    <button onclick="toggleStatus('bc')" id="bc_status_btn" class="w-full py-2 bg-amber-600/20 text-amber-500 text-[9px] font-bold rounded uppercase">ВКЛ / ВЫКЛ</button>
                </div>
                <div class="p-4 bg-blue-500/5 rounded-2xl space-y-2">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">Реклама (Низ)</p>
                    <textarea id="adm_ad_text" class="w-full p-2 bg-black/20 rounded text-xs" placeholder="Текст"></textarea>
                    <input id="adm_ad_url" class="w-full p-2 bg-black/20 rounded text-[10px]" placeholder="URL кнопки">
                    <button onclick="toggleStatus('ad')" id="ad_status_btn" class="w-full py-2 bg-blue-600/20 text-blue-400 text-[9px] font-bold rounded uppercase">ВКЛ / ВЫКЛ</button>
                </div>
            </div>

            <div class="p-4 bg-purple-500/5 rounded-2xl space-y-2">
                <p class="text-[10px] font-bold text-purple-400 uppercase">Промокоды</p>
                <div class="flex gap-2">
                    <input id="new_promo_code" class="flex-1 p-2 bg-black/20 rounded text-xs uppercase" placeholder="КОД">
                    <input id="new_promo_sum" type="number" class="w-20 p-2 bg-black/20 rounded text-xs" placeholder="₽">
                    <button onclick="addPromo()" class="px-4 bg-purple-600 rounded text-[10px] font-bold">+</button>
                </div>
                <div id="adm_promos_list" class="space-y-1 pt-2"></div>
            </div>

            <div class="p-4 bg-white/5 rounded-2xl space-y-3">
                <p class="text-[10px] font-bold text-blue-400 uppercase">Действия с юзером</p>
                <input id="adm_uid" class="w-full p-3 bg-black/20 rounded-xl text-xs" placeholder="ID (напр. 1)">
                <div class="grid grid-cols-2 gap-2">
                    <input id="adm_sum" type="number" class="p-3 bg-black/20 rounded-xl text-xs" placeholder="Сумма ₽">
                    <button onclick="adminChangeBalance()" class="bg-blue-600 rounded-xl text-[9px] font-bold uppercase">Обновить ₽</button>
                </div>
                <div class="pt-2 border-t border-white/5 space-y-2">
                    <input id="adm_new_id_val" class="w-full p-3 bg-black/20 rounded-xl text-xs" placeholder="Новый ID (напр. 1000000)">
                    <button onclick="adminForceChangeID()" class="w-full py-3 bg-purple-600 text-white rounded-xl text-[10px] font-black uppercase">Сменить ID</button>
                </div>
                <button onclick="adminDeleteAccount()" class="w-full py-3 bg-red-600 text-white rounded-xl text-[10px] font-black uppercase italic">УДАЛИТЬ (БАН)</button>
            </div>

            <div id="admin_stocks" class="space-y-4"></div>
            <button onclick="addTariff()" class="w-full py-4 border-2 border-dashed border-white/10 rounded-2xl text-[10px] opacity-40 uppercase font-bold">+ Тариф</button>
            <button onclick="saveAdmin()" class="w-full py-6 btn-primary bg-red-600 text-sm font-black italic uppercase">Сохранить всё</button>
        </div>
    </section>

    <div id="footerAd" class="footer-ad">
        <div class="max-w-xl mx-auto flex items-center gap-4">
            <p id="adTextDisplay" class="text-[11px] font-bold flex-1"></p>
            <div id="adBtnBox"></div>
        </div>
    </div>

    <script>
        // --- РЕНДЕР И ЛОГИКА ---
        function updateUI() {
            if(!window.user) return;
            document.getElementById('userDisplay').innerText = `${window.user.nick} | #${window.user.id}`;
            document.getElementById('userBal').innerText = window.user.bal.toFixed(0) + '₽';
            renderKeys();
        }

        async function initUser() {
            if(window.user) return;
            const { value: nick } = await Swal.fire({ title: 'РЕГИСТРАЦИЯ', input: 'text', background: '#191c24', color: '#fff' });
            if(!nick) return initUser();
            const id = (Object.keys(window.allUsers).length + 1).toString();
            window.user = { id, nick, bal: 0, keys: [], username: "@" + nick };
            localStorage.setItem('dog_v29_me', JSON.stringify(window.user));
            window.saveUser(window.user);
        }
        setTimeout(() => { if(!window.user) initUser(); }, 1000);

        function renderAnalytics() {
            const list = document.getElementById('adm_users_list');
            const users = Object.values(window.allUsers);
            list.innerHTML = users.map(u => `
                <div onclick="inspectUser('${u.id}')" class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5 mb-1 active:scale-95 transition">
                    <span class="text-[10px] font-bold text-blue-400">#${u.id} ${u.nick}</span>
                    <span class="text-[11px] font-black">${u.bal.toFixed(0)}₽</span>
                </div>
            `).join('');
        }

        function inspectUser(uid) {
            const u = window.allUsers[uid];
            if(!u) return;
            Swal.fire({
                title: `ИНФО #${u.id}`,
                html: `<div class="text-left text-[11px]"><b>НИК:</b> ${u.nick}<br><b>TG:</b> ${u.username || 'Нет'}<br><b>КЛЮЧЕЙ:</b> ${(u.keys || []).length}</div>`,
                showCancelButton: true,
                confirmButtonText: 'Выбрать'
            }).then((res) => { if(res.isConfirmed) document.getElementById('adm_uid').value = u.id; });
        }

        // Исправленное удаление аккаунта
        function adminDeleteAccount() {
            const uid = document.getElementById('adm_uid').value;
            if(!uid || !window.allUsers[uid]) return Swal.fire('Ошибка', 'ID не выбран или не найден', 'error');
            
            Swal.fire({
                title: 'Удалить аккаунт?',
                text: "Это действие нельзя отменить!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Да, УДАЛИТЬ'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.firebase_db_mod.remove(window.firebase_db_mod.ref(window.firebase_db_mod.getDatabase(), 'dog_users/' + uid))
                    .then(() => {
                        Swal.fire('Удалено!', 'Аккаунт полностью стерт из базы.', 'success');
                        document.getElementById('adm_uid').value = "";
                    });
                }
            });
        }

        function adminForceChangeID() {
            const oldId = document.getElementById('adm_uid').value;
            const newId = document.getElementById('adm_new_id_val').value.trim();
            if(!window.allUsers[oldId] || !newId) return;
            const data = {...window.allUsers[oldId]};
            data.id = newId;
            window.firebase_db_mod.set(window.firebase_db_mod.ref(window.firebase_db_mod.getDatabase(), 'dog_users/' + newId), data).then(() => {
                window.firebase_db_mod.remove(window.firebase_db_mod.ref(window.firebase_db_mod.getDatabase(), 'dog_users/' + oldId));
                Swal.fire('ID Изменен', '', 'success');
            });
        }

        function adminChangeBalance() {
            const uid = document.getElementById('adm_uid').value;
            const sum = parseFloat(document.getElementById('adm_sum').value);
            if(!window.allUsers[uid] || isNaN(sum)) return;
            window.allUsers[uid].bal += sum;
            window.saveUser(window.allUsers[uid]);
            Swal.fire('Баланс обновлен', '', 'success');
        }

        function loadAdmin() {
            renderAnalytics();
            document.getElementById('adm_bc_text').value = window.db.broadcast?.text || '';
            document.getElementById('adm_bc_url').value = window.db.broadcast?.url || '';
            document.getElementById('adm_ad_text').value = window.db.footerAd?.text || '';
            document.getElementById('adm_ad_url').value = window.db.footerAd?.url || '';
            document.getElementById('adm_promos_list').innerHTML = (window.db.promos || []).map((p, i) => `<div class="flex justify-between items-center bg-black/40 p-2 rounded text-[10px] mb-1"><span>${p.code} (+${p.sum}₽)</span><button onclick="deletePromo(${i})" class="text-red-500">❌</button></div>`).join('');
            document.getElementById('admin_stocks').innerHTML = (window.db.products || []).map(p => `<div class="p-4 bg-white/5 rounded-2xl space-y-2 border-l-2 border-blue-500 mb-2"><div class="flex gap-2"><input id="p_i_${p.id}" value="${p.icon || '🛡️'}" class="bg-black/40 rounded p-1 w-10 text-center"><input id="p_n_${p.id}" value="${p.name}" class="bg-black/40 rounded p-1 text-[10px] font-bold flex-1 uppercase"></div><div class="grid grid-cols-3 gap-2"><input id="p_p_${p.id}" value="${p.pr}" class="bg-black/40 rounded p-1 text-[10px]"><input id="p_h_${p.id}" value="${p.h}" class="bg-black/40 rounded p-1 text-[10px]"><input id="p_d_${p.id}" value="${p.discount || 0}" class="bg-black/40 rounded p-1 text-[10px] text-red-400"></div><button onclick="deleteProduct(${p.id})" class="w-full text-[8px] text-red-500 opacity-50 uppercase">Удалить</button></div>`).join('');
        }

        function saveAdmin() {
            if(!window.db.broadcast) window.db.broadcast = {};
            if(!window.db.footerAd) window.db.footerAd = {};
            window.db.broadcast.text = document.getElementById('adm_bc_text').value;
            window.db.broadcast.url = document.getElementById('adm_bc_url').value;
            window.db.footerAd.text = document.getElementById('adm_ad_text').value;
            window.db.footerAd.url = document.getElementById('adm_ad_url').value;
            window.db.products.forEach(p => {
                p.icon = document.getElementById(`p_i_${p.id}`).value;
                p.name = document.getElementById(`p_n_${p.id}`).value;
                p.pr = parseInt(document.getElementById(`p_p_${p.id}`).value);
                p.h = parseInt(document.getElementById(`p_h_${p.id}`).value);
                p.discount = parseInt(document.getElementById(`p_d_${p.id}`).value) || 0;
            });
            window.saveSystem();
            Swal.fire('Сохранено', '', 'success');
        }

        function toggleStatus(type) {
            if(type === 'bc') window.db.broadcast.active = !window.db.broadcast?.active;
            if(type === 'ad') window.db.footerAd.active = !window.db.footerAd?.active;
            window.saveSystem();
            loadAdmin();
        }

        function addPromo() {
            const code = document.getElementById('new_promo_code').value.trim().toUpperCase();
            const sum = parseInt(document.getElementById('new_promo_sum').value);
            if(!code || !sum) return;
            if(!window.db.promos) window.db.promos = [];
            window.db.promos.push({ code, sum });
            window.saveSystem();
            loadAdmin();
        }

        function deletePromo(index) { window.db.promos.splice(index, 1); window.saveSystem(); loadAdmin(); }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = (window.db.products || []).map(p => {
                const finalPrice = p.discount > 0 ? p.pr - (p.pr * (p.discount / 100)) : p.pr;
                return `<div class="player-card p-5 flex justify-between items-center"><div><h4 class="font-bold text-xs uppercase">${p.icon} ${p.name}</h4><p class="text-[9px] opacity-40">${p.h} ч.</p></div><button onclick="buyKey(${p.id})" class="px-6 py-2 btn-primary text-[10px] uppercase font-bold">${finalPrice.toFixed(0)}₽</button></div>`;
            }).join('');
        }

        function buyKey(id) {
            const p = window.db.products.find(x => x.id === id);
            const price = p.discount > 0 ? p.pr - (p.pr * (p.discount / 100)) : p.pr;
            if(window.user.bal < price) return Swal.fire('Ошибка', 'Нет денег', 'error');
            window.user.bal -= price;
            const newKey = "DOG-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            if(!window.user.keys) window.user.keys = [];
            window.user.keys.unshift({ name: p.name, key: newKey });
            window.saveUser(window.user);
            Swal.fire('Успех!', 'Ключ куплен', 'success');
        }

        function checkInput() {
            const val = document.getElementById('promoInp').value.trim().toUpperCase();
            if(val === 'KALUBXQ') { document.getElementById('adminBtn').classList.remove('hidden'); return Swal.fire('ADMIN', 'OK', 'success'); }
            if(window.db.promos) {
                const promo = window.db.promos.find(p => p.code === val);
                if(promo) {
                    window.user.bal += promo.sum;
                    window.saveUser(window.user);
                    window.db.promos = window.db.promos.filter(p => p.code !== val);
                    window.saveSystem();
                    return Swal.fire('Ура!', `+${promo.sum}₽`, 'success');
                }
            }
            Swal.fire('Ошибка', 'Неверный код', 'error');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'admin') loadAdmin();
        }

        function renderGlobalBC() {
            const bc = window.db.broadcast;
            const el = document.getElementById('globalBC');
            if(!bc || !bc.active) return el.classList.add('hidden');
            el.classList.remove('hidden');
            document.getElementById('bcTextDisplay').innerText = bc.text;
            document.getElementById('bcBtnBox').innerHTML = bc.url ? `<a href="${bc.url}" class="px-4 py-1 bg-amber-500 text-black text-[10px] font-bold rounded-lg uppercase">ОТКРЫТЬ</a>` : '';
        }

        function renderFooterAd() {
            const ad = window.db.footerAd;
            const el = document.getElementById('footerAd');
            if(!ad || !ad.active) return el.style.display = 'none';
            el.style.display = 'block';
            document.getElementById('adTextDisplay').innerText = ad.text;
            document.getElementById('adBtnBox').innerHTML = ad.url ? `<a href="${ad.url}" class="px-4 py-2 bg-blue-500 text-white text-[10px] font-bold rounded-lg uppercase">ПЕРЕЙТИ</a>` : '';
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            if(!window.user.keys || window.user.keys.length === 0) { list.innerHTML = `<p class="text-center opacity-20 text-[10px] uppercase">Нет ключей</p>`; return; }
            list.innerHTML = window.user.keys.map(k => `<div class="player-card p-4 border-l-2 border-blue-500 mb-2"><p class="text-[9px] font-bold opacity-40 uppercase mb-1">${k.name}</p><div class="bg-black/20 p-2 rounded text-[11px] font-mono select-all">${k.key}</div></div>`).join('');
        }

        function topUp() { Swal.fire('Оплата', 'Свяжитесь с @sswckk', 'info'); }
        function deleteProduct(id) { window.db.products = window.db.products.filter(p => p.id !== id); window.saveSystem(); loadAdmin(); }
        function addTariff() { if(!window.db.products) window.db.products = []; window.db.products.push({ id: Date.now(), name: "NEW", pr: 100, h: 24, icon: "⚡", discount: 0 }); window.saveSystem(); loadAdmin(); }
    </script>
</body>
</html>
