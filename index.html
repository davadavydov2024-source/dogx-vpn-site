<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOG X | v56 SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY96OYOpqFgCI-Bxtt0Q3xj1BtzdnmWMI",
            authDomain: "dogx-base.firebaseapp.com",
            databaseURL: "https://dogx-base-default-rtdb.firebaseio.com",
            projectId: "dogx-base"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.f_db = db;

        window.db_data = { products: [], broadcast: {active:false}, stock: {} };
        window.allUsers = {};
        window.allTickets = {};
        window.mySecret = localStorage.getItem('dog_v56_sec');
        window.isAuthChecking = true;
        
        // Главный слушатель системы
        onValue(ref(db, 'system_v56'), (s) => { 
            window.db_data = s.val() || { products: [], broadcast: {active:false}, stock: {} };
            renderProducts(); renderBC();
        });

        // Слушатель пользователей с фиксом бесконечной регистрации
        onValue(ref(db, 'users_v56'), (s) => { 
            window.allUsers = s.val() || {}; 
            if (window.mySecret && window.allUsers[window.mySecret]) {
                window.user = window.allUsers[window.mySecret];
                window.isAuthChecking = false;
                updateUI();
            } else if (!window.isRegOpen) {
                window.isAuthChecking = false;
                startAuthProcess();
            }
        });

        onValue(ref(db, 'support_v56'), (s) => { 
            window.allTickets = s.val() || {}; 
            checkSupportNotif();
            if(window.currentTab === 'admin') renderAdmSupport();
            if(window.isChatOpen) renderUserChat();
        });

        window.saveSys = () => set(ref(db, 'system_v56'), window.db_data);
        window.saveUsr = (u, sec) => set(ref(db, 'users_v56/' + (sec || window.mySecret)), u);
        window.saveTicket = (id, data) => set(ref(db, 'support_v56/' + id), data);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background: #020408; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; }
        .tab { display: none; }
        .tab.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-supreme { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); transition: 0.3s; font-weight: 800; text-transform: uppercase; }
        .btn-supreme:active { transform: scale(0.95); }
        .nav-btn { width: 54px; height: 54px; border-radius: 18px; display: flex; align-items: center; justify-content: center; transition: 0.3s; color: rgba(255,255,255,0.2); }
        .nav-btn.active { background: rgba(79, 70, 229, 0.15); color: #4f46e5; border: 1px solid rgba(79, 70, 229, 0.2); }
        .gold-id { background: linear-gradient(90deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-40 bg-[#020408]/80 backdrop-blur-xl">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-indigo-500/20 shadow-lg">
                <i class="fa-solid fa-bolt-auto text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-black italic">DOG <span class="text-indigo-500">X</span></h1>
                <p id="topInfo" class="text-[8px] font-bold opacity-30 tracking-[3px] uppercase">Supreme v56</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="setTab('home')" id="nav-home" class="nav-btn active"><i class="fa-solid fa-house"></i></button>
            <button onclick="setTab('me')" id="nav-me" class="nav-btn relative"><i class="fa-solid fa-user"></i><div id="notif-dot" class="hidden absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full border-2 border-[#020408]"></div></button>
            <button id="adm-btn" onclick="setTab('admin')" class="hidden nav-btn text-amber-500 bg-amber-500/5 border border-amber-500/10"><i class="fa-solid fa-crown"></i></button>
        </div>
    </header>

    <main id="home" class="tab active px-6 space-y-6">
        <div id="bc-banner" class="hidden glass overflow-hidden h-40 relative">
            <img id="bc-img" class="w-full h-full object-cover opacity-30">
            <div class="absolute inset-0 bg-gradient-to-t from-[#020408] to-transparent"></div>
            <p id="bc-text" class="absolute bottom-4 left-4 right-4 text-xs font-bold italic"></p>
        </div>
        <div id="product-list" class="space-y-4"></div>
    </main>

    <section id="me" class="tab px-6 space-y-6">
        <div class="glass p-10 text-center relative overflow-hidden">
            <p id="u-rank" class="text-[10px] font-black text-indigo-500 tracking-[5px] uppercase mb-2 italic">Standard</p>
            <h3 class="text-6xl font-black italic mb-8" id="u-bal">0₽</h3>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="showPay()" class="btn-supreme py-4 rounded-2xl text-[11px] italic">Пополнить</button>
                <button onclick="copyMySecret()" class="bg-white/5 py-4 rounded-2xl text-[11px] font-bold uppercase italic">Ключ</button>
            </div>

            <button onclick="toggleChat(true)" class="w-full py-4 bg-indigo-500/10 rounded-2xl text-indigo-400 text-[10px] font-black uppercase flex items-center justify-center gap-3 border border-indigo-500/20">
                <i class="fa-solid fa-comments"></i> Поддержка
            </button>

            <div class="mt-8 pt-6 border-t border-white/5">
                <input type="password" id="admin-code" oninput="checkAdm(this.value)" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-center text-[10px] tracking-[6px] outline-none" placeholder="ADMIN CODE">
            </div>
        </div>

        <div class="space-y-4">
            <p class="text-[10px] font-black opacity-30 uppercase tracking-[3px] ml-2 italic">Мои Лицензии</p>
            <div id="user-keys" class="space-y-3 pb-20"></div>
        </div>
    </section>

    <section id="admin" class="tab px-6 space-y-6 pb-40">
        <div class="glass p-6 space-y-8">
            <h2 class="text-center text-xs font-black tracking-[10px] text-indigo-500 uppercase">Supreme Panel</h2>
            
            <div class="p-5 bg-indigo-500/5 rounded-3xl border border-indigo-500/10 space-y-3">
                <p class="text-[10px] font-black text-indigo-400 uppercase italic">Управление Пользователем</p>
                <input id="adm-find-id" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-xs" placeholder="Введите ID юзера">
                <div class="grid grid-cols-2 gap-2">
                    <input id="adm-set-bal" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-xs" placeholder="Баланс">
                    <input id="adm-set-id" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-xs" placeholder="Новый ID (крутой)">
                </div>
                <button onclick="admUpdateUser()" class="w-full py-3 bg-indigo-600 rounded-xl text-[10px] font-black">ПРИМЕНИТЬ</button>
            </div>

            <div id="adm-support-list" class="space-y-3"></div>
            <div id="adm-products" class="space-y-4"></div>
            
            <button onclick="admSaveAll()" class="w-full py-6 btn-supreme rounded-[30px] text-xs italic">Зафиксировать v56</button>
        </div>
    </section>

    <div id="chat-window" class="fixed inset-0 bg-[#020408] z-[100] hidden flex-col">
        <header class="p-6 border-b border-white/5 flex justify-between items-center">
            <h3 class="text-sm font-black italic uppercase">Live Support</h3>
            <button onclick="toggleChat(false)" class="text-xs opacity-40 uppercase font-bold">Закрыть</button>
        </header>
        <div id="chat-content" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col"></div>
        <div class="p-6 bg-[#020408] flex gap-2 border-t border-white/5 pb-12">
            <input type="text" id="chat-input" class="flex-1 bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none" placeholder="Сообщение...">
            <button onclick="sendUserMsg()" class="w-14 h-14 btn-supreme rounded-2xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        function checkAdm(v) { if(v.toUpperCase() === 'KALUBXQ') document.getElementById('adm-btn').classList.remove('hidden'); }
        
        function setTab(t) {
            window.currentTab = t;
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('nav-' + t)?.classList.add('active');
            if(t === 'admin') renderAdmin();
            if(t === 'me') document.getElementById('notif-dot').classList.add('hidden');
        }

        // --- AUTH SYSTEM (FIXED) ---
        async function startAuthProcess() {
            if(window.isRegOpen || window.user) return;
            window.isRegOpen = true;

            const { value: form } = await Swal.fire({
                title: 'ВХОД / РЕГИСТРАЦИЯ',
                html: `
                    <input id="swal-nick" class="swal2-input" placeholder="Ваш Ник" style="font-size: 14px">
                    <input id="swal-pass" type="password" class="swal2-input" placeholder="Пароль" style="font-size: 14px">
                `,
                background: '#020408', color: '#fff',
                confirmButtonText: 'ПРОДОЛЖИТЬ',
                preConfirm: () => {
                    return [document.getElementById('swal-nick').value, document.getElementById('swal-pass').value]
                }
            });

            if(form && form[0] && form[1]) {
                const nick = form[0]; const pass = form[1];
                // Пытаемся найти существующего по нику и паролю
                const foundKey = Object.keys(window.allUsers).find(k => window.allUsers[k].nick === nick && window.allUsers[k].pass === pass);
                
                if(foundKey) {
                    window.mySecret = foundKey;
                    localStorage.setItem('dog_v56_sec', foundKey);
                    location.reload();
                } else {
                    // Создаем нового
                    const s = 'SUP-' + Math.random().toString(36).substr(2,10).toUpperCase();
                    const newUser = {
                        id: Math.floor(Math.random()*90000+10000),
                        nick: nick, pass: pass, bal: 0, 
                        purchases: [], rank: 'Member', secret: s
                    };
                    window.mySecret = s;
                    localStorage.setItem('dog_v56_sec', s);
                    await window.saveUsr(newUser, s);
                    location.reload();
                }
            }
        }

        function updateUI() {
            if(!window.user) return;
            document.getElementById('u-bal').innerText = (window.user.bal || 0).toLocaleString() + '₽';
            document.getElementById('u-rank').innerText = window.user.rank || 'Member';
            
            const isGold = String(window.user.id).length <= 4 || /^(.)\1+$/.test(String(window.user.id));
            const idHtml = isGold ? `<span class="gold-id">ID: ${window.user.id}</span>` : `ID: ${window.user.id}`;
            document.getElementById('topInfo').innerHTML = `${idHtml} • ${window.user.nick}`;
            
            const list = document.getElementById('user-keys');
            list.innerHTML = (window.user.purchases || []).map(k => `
                <div class="glass p-5 flex justify-between items-center">
                    <div><p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">${k.name}</p><p class="text-xs font-mono font-bold">${k.key}</p></div>
                    <button onclick="copy('${k.key}')" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center"><i class="fa-solid fa-copy text-[10px]"></i></button>
                </div>`).join('');
        }

        // --- ADMIN LOGIC ---
        function renderAdmin() {
            document.getElementById('adm-products').innerHTML = (window.db_data.products || []).map(p => `
                <div class="bg-white/5 p-5 rounded-3xl border border-white/5 space-y-2">
                    <input id="pn_${p.id}" value="${p.name}" class="bg-transparent text-xs font-bold w-full outline-none">
                    <textarea id="ps_${p.id}" class="w-full bg-black/40 p-3 rounded-xl text-[9px] h-20 outline-none" placeholder="Ключи..."></textarea>
                    <button onclick="admDelP(${p.id})" class="text-[8px] text-red-500 font-bold uppercase">Удалить тариф</button>
                </div>`).join('');
            renderAdmSupport();
        }

        function admUpdateUser() {
            const findId = document.getElementById('adm-find-id').value;
            const targetSec = Object.keys(window.allUsers).find(k => String(window.allUsers[k].id) === String(findId));
            if(!targetSec) return Swal.fire('Error', 'User not found', 'error');
            
            const u = window.allUsers[targetSec];
            const newBal = document.getElementById('adm-set-bal').value;
            const newId = document.getElementById('adm-set-id').value;
            
            if(newBal) u.bal = parseInt(newBal);
            if(newId) u.id = parseInt(newId);
            
            window.saveUsr(u, targetSec);
            Swal.fire('Updated', 'User data saved', 'success');
        }

        function renderProducts() {
            document.getElementById('product-list').innerHTML = (window.db_data.products || []).map(p => `
                <div class="glass p-6 flex justify-between items-center group active:scale-95 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-indigo-500/10 rounded-2xl flex items-center justify-center text-indigo-500"><i class="fa-solid fa-key"></i></div>
                        <div><h4 class="text-sm font-black italic uppercase">${p.name}</h4><p class="text-[9px] font-bold opacity-40 uppercase">Stock: ${(window.db_data.stock && window.db_data.stock[p.id]) ? window.db_data.stock[p.id].length : 0}</p></div>
                    </div>
                    <button onclick="buy(${p.id})" class="btn-supreme px-8 py-4 rounded-2xl text-[11px] italic">${p.pr}₽</button>
                </div>`).join('');
        }

        async function buy(id) {
            const p = window.db_data.products.find(x => x.id === id);
            if(window.user.bal < p.pr) return Swal.fire('Error', 'Баланс 0', 'error');
            const stock = window.db_data.stock[id];
            if(!stock || stock.length === 0) return Swal.fire('Error', 'Нет ключей', 'warning');

            const key = stock.shift();
            window.user.bal -= p.pr;
            if(!window.user.purchases) window.user.purchases = [];
            window.user.purchases.unshift({name: p.name, key: key});
            await window.saveUsr(window.user); await window.saveSys();
            Swal.fire('Success', 'Ключ получен', 'success');
        }

        // --- SUPPORT ---
        function toggleChat(o) { window.isChatOpen = o; document.getElementById('chat-window').classList.toggle('hidden', !o); if(o) renderUserChat(); }
        async function sendUserMsg() {
            const i = document.getElementById('chat-input'); if(!i.value.trim()) return;
            if(!window.allTickets[window.mySecret]) window.allTickets[window.mySecret] = {nick: window.user.nick, msgs: []};
            window.allTickets[window.mySecret].msgs.push({text: i.value, sender: 'user'});
            await window.saveTicket(window.mySecret, window.allTickets[window.mySecret]); i.value = '';
        }
        function renderUserChat() {
            const c = document.getElementById('chat-content'); const t = window.allTickets[window.mySecret];
            if(!t) return;
            c.innerHTML = t.msgs.map(m => `<div class="p-4 rounded-2xl max-w-[80%] ${m.sender==='user'?'bg-indigo-600 self-end':'bg-white/10 self-start'}"><p class="text-xs font-bold">${m.text}</p></div>`).join('');
            c.scrollTop = c.scrollHeight;
        }
        function renderAdmSupport() {
            document.getElementById('adm-support-list').innerHTML = Object.keys(window.allTickets).map(id => `
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-3">
                    <p class="text-[10px] font-black">${window.allTickets[id].nick}</p>
                    <div class="text-[9px] opacity-60">${window.allTickets[id].msgs.slice(-1)[0].text}</div>
                    <div class="flex gap-2"><input id="rep_${id}" class="flex-1 bg-black/40 rounded-xl p-2 text-[10px]" placeholder="Ответ..."><button onclick="admReply('${id}')" class="bg-indigo-600 px-3 rounded-xl text-[10px]">OK</button></div>
                </div>`).join('');
        }
        function admReply(id) {
            const m = document.getElementById('rep_'+id).value; if(!m) return;
            window.allTickets[id].msgs.push({text: m, sender: 'admin'});
            window.saveTicket(id, window.allTickets[id]);
        }

        function checkSupportNotif() {
            const t = window.allTickets[window.mySecret];
            if(t && t.msgs.length && t.msgs[t.msgs.length-1].sender === 'admin' && !window.isChatOpen) document.getElementById('notif-dot').classList.remove('hidden');
        }

        function copy(t) { navigator.clipboard.writeText(t); Swal.fire({title:'Copied', toast:true, position:'top', timer:1000, showConfirmButton:false, icon:'success'}); }
        function showPay() { Swal.fire('ПОПОЛНЕНИЕ', 'Напишите @sswckk свой ID: ' + window.user.id, 'info'); }
        function copyMySecret() { Swal.fire('SECRET KEY', window.mySecret, 'info'); }
        function renderBC() { /* Banner Logic */ }
        function admSaveAll() { window.saveSys(); Swal.fire('Saved', 'System updated', 'success'); }
    </script>
</body>
</html>
