<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐕DOG X | Premium VPN❤️‍🔥</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/733/733641.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { --bg: #050810; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); --accent: #3b82f6; }

        body { 
            background: radial-gradient(circle at top right, #1e293b, #050810); 
            color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
        }

        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; }
        
        .btn-premium { 
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.6); }

        .tab-content { display: none; opacity: 0; transform: translateY(10px); }
        .tab-content.active { display: block; animation: appear 0.5s forwards; }
        @keyframes appear { to { opacity: 1; transform: translateY(0); } }

        input { background: rgba(255,255,255,0.05) !important; border: 1px solid var(--border) !important; color: #fff !important; }
        input:focus { border-color: var(--accent) !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }

        .key-text { word-break: break-all; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.6; color: #cbd5e1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="authBox" class="fixed inset-0 z-[100] bg-[#050810] flex items-center justify-center hidden p-6">
        <div class="max-w-md w-full glass p-10 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/20 blur-3xl"></div>
            <h2 class="text-4xl font-black mb-2 italic">DOG <span class="text-blue-500">X</span></h2>
            <p class="text-gray-500 text-xs uppercase tracking-widest mb-10">Premium Proxy System</p>
            
            <input type="text" id="uNameInp" placeholder="Твой уникальный ник" class="w-full p-5 rounded-2xl mb-4 text-center font-bold outline-none transition">
            <button onclick="login()" class="w-full py-5 btn-premium rounded-2xl font-black uppercase tracking-wider mb-6">Войти в систему</button>
            
            <button onclick="installApp()" class="text-[10px] text-blue-400 font-black uppercase border-b border-blue-400/30 pb-1">
                <i class="fas fa-plus-circle mr-1"></i> Добавить на рабочий стол
            </button>
        </div>
    </div>

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-10 p-5 glass">
        <div class="font-black text-xl italic tracking-tighter">DOG <span class="text-blue-500">X</span></div>
        <div class="flex gap-6 text-[10px] font-black uppercase tracking-[2px]">
            <button onclick="showTab('home')" class="hover:text-blue-400 transition">Магазин</button>
            <button onclick="showTab('me')" class="hover:text-blue-400 transition">Кабинет</button>
            <button id="adminBtn" onclick="showTab('admin')" class="hidden text-red-500">Admin</button>
        </div>
    </nav>

    <main id="home" class="tab-content active max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-10 flex flex-col justify-between hover:bg-white/[0.05] transition">
                <div class="text-[10px] font-black opacity-30 uppercase italic mb-4">Trial Pack</div>
                <div class="text-5xl font-black mb-2">10₽</div>
                <p class="text-gray-500 text-xs mb-8">24 часа без лимитов</p>
                <button onclick="openBuy(0)" class="w-full py-4 btn-premium rounded-xl font-bold">АКТИВИРОВАТЬ</button>
            </div>
            
            <div class="glass p-10 flex flex-col justify-between border-blue-500/30 bg-blue-500/[0.05] relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-blue-600 px-4 py-1 text-[8px] font-black rounded-bl-xl uppercase">Best</div>
                <div class="text-[10px] font-black text-blue-400 uppercase italic mb-4">Pro Month</div>
                <div class="text-5xl font-black mb-2">250₽</div>
                <p class="text-gray-400 text-xs mb-8">30 дней стабильной работы</p>
                <button onclick="openBuy(1)" class="w-full py-4 btn-premium rounded-xl font-bold shadow-blue-500/40 shadow-lg">ВЫБРАТЬ PRO</button>
            </div>

            <div class="glass p-10 flex flex-col justify-between">
                <div class="text-[10px] font-black opacity-30 uppercase italic mb-4">Lifetime</div>
                <div class="text-5xl font-black mb-2">1000₽</div>
                <p class="text-gray-500 text-xs mb-8">Навсегда. Без ограничений.</p>
                <button onclick="openBuy(2)" class="w-full py-4 btn-premium rounded-xl font-bold">СТАТЬ VIP</button>
            </div>
        </div>
    </main>

    <section id="me" class="tab-content max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-8 text-center space-y-6">
                <div class="inline-block p-1 rounded-3xl bg-gradient-to-tr from-blue-600 to-cyan-400">
                    <div class="w-20 h-20 bg-[#050810] rounded-[22px] flex items-center justify-center text-3xl font-black" id="ava">?</div>
                </div>
                <div class="text-3xl font-black" id="userBal">0.00₽</div>
                
                <button onclick="topUp()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-xs uppercase hover:bg-blue-500 hover:text-white transition">Пополнить баланс</button>
                
                <div class="pt-4 border-t border-white/5">
                    <button onclick="installApp()" class="w-full py-3 glass text-[9px] font-black uppercase mb-4 text-blue-400 border-blue-400/20">
                        Установить приложение <i class="fas fa-arrow-down ml-1"></i>
                    </button>
                    <input type="text" id="promoInp" placeholder="ПРОМОКОД" class="w-full p-4 rounded-xl text-center text-[10px] font-bold outline-none mb-2" oninput="checkAdmin()">
                    <button onclick="usePromo()" class="text-[10px] font-black opacity-30 uppercase tracking-widest hover:opacity-100 transition">Применить</button>
                </div>
            </div>

            <div class="md:col-span-2 glass p-8">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[3px] mb-8">Мои активные ключи</h3>
                <div id="keysList" class="space-y-4"></div>
            </div>
        </div>
    </section>

    <section id="admin" class="tab-content max-w-5xl mx-auto">
        <div class="glass p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <h2 class="font-black text-red-500 uppercase italic">Key Stock Manager</h2>
                    <textarea id="stock_ios" class="w-full h-40 glass p-4 text-[10px] font-mono outline-none" placeholder="iPhone Keys..."></textarea>
                    <textarea id="stock_and" class="w-full h-40 glass p-4 text-[10px] font-mono outline-none" placeholder="Android Keys..."></textarea>
                    <button onclick="saveAdmin()" class="w-full py-4 btn-premium bg-red-600">Sync Databases</button>
                </div>
                <div class="space-y-4">
                    <h2 class="font-black text-blue-500 uppercase italic">Balance Codes</h2>
                    <div class="flex gap-2">
                        <input id="a_prCode" class="flex-1 p-4 rounded-xl font-bold uppercase" placeholder="NAME">
                        <input id="a_prVal" class="w-24 p-4 rounded-xl text-center font-bold" placeholder="RUB">
                        <button onclick="addPromo()" class="px-6 btn-premium rounded-xl">➕</button>
                    </div>
                    <div id="a_promos" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let db = JSON.parse(localStorage.getItem('dog_v13_db')) || { prices:[10, 250, 1000], card: "sswckk", stock_ios: [], stock_and: [], promos: [] };
        let user = JSON.parse(localStorage.getItem('dog_v13_user')) || null;

        window.onload = () => { if(!user) document.getElementById('authBox').classList.remove('hidden'); else sync(); };

        function login() {
            const n = document.getElementById('uNameInp').value.trim();
            if(n) { user = { name: n, bal: 0, keys: [] }; save(); location.reload(); }
        }

        function sync() {
            document.getElementById('userBal').innerText = user.bal.toFixed(2) + '₽';
            document.getElementById('ava').innerText = user.name[0].toUpperCase();
            document.getElementById('stock_ios').value = db.stock_ios.join('\n');
            document.getElementById('stock_and').value = db.stock_and.join('\n');
            renderKeys();
            renderPromos();
        }

        function installApp() {
            const isiOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            Swal.fire({
                title: 'DOG X INSTALL',
                background: '#050810', color: '#fff',
                html: isiOS ? `
                    <div class="text-left text-sm space-y-4 p-2 opacity-80">
                        <p>1. Нажми <b>"Поделиться"</b> <i class="fas fa-share-square text-blue-500"></i></p>
                        <p>2. Выбери <b>"На экран Домой"</b> <i class="fas fa-plus-square text-blue-500"></i></p>
                        <p>3. Нажми <b>"Добавить"</b></p>
                    </div>` : `
                    <div class="text-left text-sm space-y-4 p-2 opacity-80">
                        <p>1. Нажми <b>три точки (⋮)</b> в углу Chrome</p>
                        <p>2. Нажми <b>"Установить приложение"</b></p>
                    </div>`,
                confirmButtonText: 'Понял!',
                confirmButtonColor: '#3b82f6'
            });
        }

        function openBuy(idx) {
            const cost = db.prices[idx];
            const hours = [24, 720, 99999][idx];
            Swal.fire({
                title: 'DEVICE SELECT',
                background: '#050810', color: '#fff',
                html: `
                    <div class="grid gap-4 mt-4">
                        <button onclick="buyKey(${cost},${hours},'ios')" class="p-6 glass flex justify-between items-center hover:bg-white/10 transition"><span>Apple iPhone</span><i class="fab fa-apple"></i></button>
                        <button onclick="buyKey(${cost},${hours},'and')" class="p-6 glass flex justify-between items-center hover:bg-white/10 transition"><span>Android OS</span><i class="fab fa-android text-green-500"></i></button>
                    </div>`,
                showConfirmButton: false
            });
        }

        function buyKey(cost, h, plat) {
            if(user.bal < cost) return Swal.fire('Low Balance','Пополни счет в кабинете!','error');
            const stock = plat === 'ios' ? 'stock_ios' : 'stock_and';
            if(db[stock].length === 0) return Swal.fire('No Keys','Напиши @sswckk за ключом!','warning');
            
            const raw = db[stock].shift();
            user.bal -= cost;
            user.keys.unshift({ 
                key: raw.split('#')[0] + "#DOG_X_" + (plat === 'ios' ? 'iPhone' : 'Android'), 
                expire: Date.now() + (h*3600000) 
            });
            save();
            Swal.fire('Unlocked!','Ключ добавлен в профиль','success').then(() => { showTab('me'); sync(); });
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            user.keys = user.keys.filter(k => k.expire > Date.now());
            if(user.keys.length === 0) { list.innerHTML = `<p class="text-center opacity-20 py-20 italic">No Active Keys</p>`; return; }
            list.innerHTML = user.keys.map(k => `
                <div class="glass p-6 border-blue-500/10 relative group">
                    <div class="flex justify-between text-[8px] font-black uppercase opacity-40 mb-3">
                        <span>Config Data</span>
                        <span class="text-red-500">Time Limited</span>
                    </div>
                    <div class="key-text mb-4 bg-black/40 p-4 rounded-xl border border-white/5 select-all">${k.key}</div>
                    <button onclick="navigator.clipboard.writeText('${k.key}'); Swal.fire('Copied!','','success')" class="w-full py-3 btn-premium rounded-xl text-[10px] font-black uppercase tracking-widest">Copy Connection String</button>
                </div>
            `).join('');
        }

        function checkAdmin() { if(document.getElementById('promoInp').value === '67АРТЁМ67') document.getElementById('adminBtn').classList.remove('hidden'); }
        function saveAdmin() { 
            db.stock_ios = document.getElementById('stock_ios').value.split('\n').filter(l => l.length > 5); 
            db.stock_and = document.getElementById('stock_and').value.split('\n').filter(l => l.length > 5); 
            save(); Swal.fire('Database Synced','','success');
        }
        function addPromo() { 
            const c = document.getElementById('a_prCode').value.toUpperCase();
            const v = parseInt(document.getElementById('a_prVal').value);
            if(c && v) { db.promos.push({code:c, val:v}); save(); renderPromos(); document.getElementById('a_prCode').value=''; }
        }
        function renderPromos() {
            document.getElementById('a_promos').innerHTML = db.promos.map((p,i) => `
                <div class="flex justify-between items-center p-3 glass text-[9px] font-black">
                    <span>${p.code} (+${p.val}₽)</span>
                    <button onclick="db.promos.splice(${i},1); save(); renderPromos();" class="text-red-500"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }
        function topUp() { Swal.fire({ title: 'Top-Up', background:'#050810', color:'#fff', text: `Send money to card: ${db.card} and send receipt to @sswckk` }); }
        function save() { localStorage.setItem('dog_v13_db', JSON.stringify(db)); localStorage.setItem('dog_v13_user', JSON.stringify(user)); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
